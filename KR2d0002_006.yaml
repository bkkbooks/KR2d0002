body:
  text: 東觀漢記卷六列傳一外戚光烈陰皇后有陰子公者生子方方生幼公公生君孟名睦即后之父也初光武適新野聞陰后美心悅之後至長安見執金吾車騎甚盛因歎曰仕宦當作執金吾娶妻當得陰麗華更始元年遂納后于宛上即位立為貴人上以后性賢仁宜母天下欲授以尊位后輒退讓自陳不足以當大位明德馬皇后明德皇后嘗久病至卜者家為卦問咎祟所在卜者卦定釋蓍仰天歎息問之卜者乃曰此女雖年少後必將貴遂為帝妃不可言也后長七尺二寸青白色方口美髮為四起大髻但以髮成尚有餘繞髻三匝眉不施黛獨左眉角小缺補之如粟常稱疾而終身得意永平三年有司奏請立長秋宮以率八妾上未有所言皇太后曰馬貴人德冠後宮遂登至尊先是數日后夢有小飛蟲萬數隨著身入皮膚中復飛出既處椒房大官上飯纍肴膳備副重加幕覆輒撤去譴勑令與諸舍相望也不喜出入遊觀希嘗臨御窗牖袍極粗疏諸主朝望見反以為綺后曰此繒染色好故直用之后嘗有不安時在敬法殿東廂上令太夫人及兄弟得入見后志在克己輔上不以私家干朝廷兄為虎賁中郎將弟為黃門郎訖永平世不遷時上欲封諸舅外間白太后太后曰吾自念親屬皆無柱石之功俗語曰時無赭澆黃土因詔曰吾萬乘之主身衣大練縑裙食不求所甘左右旁人皆無薰香之飾前過濯龍門見外家問起居車如流水馬如游龍亦不譴怒但絶歲用冀以默止歡耳及上欲封諸舅太后輒斷絶曰吾計之熟矣勿有疑也至孝之行安親為上今遭變異穀價數倍憂惶晝夜不安坐臥而欲封爵違逆慈母之拳拳吾素剛急有胸中氣不可不順穰歲之後惟子之志吾但當含飴弄孫不能復知政事太后素謹慎小感慨輒自責如平生事舅姑時新平主家御者失火及北閣後殿深以自過起居不欣至正月當上原陵言我守備不精慚見原陵不上太后置蠶室織室于濯龍中數往來觀視以為娛樂廣平巨鹿樂成王在邸入朝問起居上望見車騎鞍勒皆純黑無金銀采飾馬不踰六尺于是白太后即賜錢各五百萬太后詔書流布咸稱至德莫敢犯禁敬隱宋皇后敬隱宋后以王莽末年生遭世倉卒其母不舉棄之南山下時天寒冬十一月再宿不死外家出過于道南聞有兒啼聲憐之因往就視有飛鳥紆翼覆之沙石滿其口鼻能喘心怪偉之以有神靈遂取而持歸養長至年十三歲乃以歸宋氏時竇皇后內寵方盛以貴人名族節操高妙心內害之欲為萬世長計陰設方略讒毀貴人由是母子見疏數月誣奏貴人使婢為蠱道祝詛七年遂被譖暴卒孝和陰皇后孝和陰皇后聰慧敏達有才能善史書永元二年選入掖庭為貴人託以先后近屬故有寵和熹鄧皇后后年五歲太夫人為剪髮夫人年高目冥并中后額雖痛忍不言一額盡傷左右怪而問之后言夫人哀我為斷髮難傷老人意故忍之耳六歲諸兄持后髮后曰身體髮膚受之父母不敢毀傷孝之始也奈何弄人髮乎七歲讀論語志在書傳母常非之曰當習女工今不是務寧當學博士耶后重違母意晝則縫紉夜私買脂燭讀經傳宗族外內皆號曰諸生嘗夢捫天體蕩蕩正青滑如磄磃有若鍾乳后仰嗽之以訊占夢言堯夢攀天而上湯夢及天舐之此皆聖王之夢吉不可言后遜位手書謝表深陳德薄不足以奉宗廟充少君之位太后賜馮貴人步搖一具時新遭大憂法禁未設宮中亡大珠一篋主名不立念欲考問必有不辜太后乃親自臨見宮人一一問閲察其顏色開示恩信宮人盜者即時首服不加鞭箠不敢隱情宮人驚咸稱神明太后臨朝萬國貢獻悉令禁絶歲時但貢紙墨而已上林鷹犬悉斥放之永初二年三月京師旱至五月朔太后幸洛陽寺省庶獄舉冤囚杜令不殺人自誣被掠羸困便輿見畏吏不敢自理吏將去微疾舉頸若欲有言太后察視覺之即呼還問狀遂得申理即時收令下獄抵罪尹左遷行未還宮澍雨大降太后雅性不好淫祀嘗不安左右憂惶至令禱祠願以身代牲太后聞之甚怒即敕令禁止以為何故乃有此不祥之言左右咸流涕嘆息曰太后臨大病不自顧而念兆民後病遂瘳豈非天地之應歟太后自遭大憂及新野君仍喪諸兄常悲傷思慕羸瘦骨立不能自勝順烈梁皇后永建三年春三月丙申選入掖庭相工茅通見之矍然驚駭卻再拜賀曰此所謂日角偃月相之極貴臣所未嘗見也太史卜之兆得壽房又筮之得坤之比順帝陽嘉元年立為皇后是時自冬至春不雨立后之日嘉澍沾渥竇貴人竇章女年十二能屬文以才貌選入掖庭有寵與梁皇后並為貴人早卒帝追思之詔史官樹碑頌德帝自為之詞孝崇匽皇后申貴人生孝穆皇趙夫人生孝崇皇匽夫人生桓帝帝既立追諡趙夫人為穆皇后匽夫人為博園貴人和平元年桓帝詔曰博園匽貴人履高明之懿德資淑美之嘉會與天合靈篤生朕躬欲報之德詩所感歎今以貴人為孝崇皇后孝桓鄧皇后孝桓帝鄧后字猛父香早死母宣改嫁為掖庭民梁紀妻紀者襄成縣君孫壽之舅也壽引進令入掖庭得寵為貴人故冒姓為梁氏
