body:
  text: 東觀漢記卷一帝紀一世祖光武皇帝光武皇帝諱秀高帝九世孫也承文景之統出自長沙定王發王生舂陵節侯舂陵本在零陵郡節侯孫考侯以土地下濕元帝時求封南陽蔡陽白水鄉因故國名曰舂陵皇考初為濟陽令有武帝行過宮常封閉帝將生皇考以令舍下濕開宮後殿居之建平元年十二月甲子夜帝生時有赤光室中盡明如晝皇考異之使卜者王長卜之長曰此善事不可言是歲有嘉禾生一莖九穗長大于凡禾縣界大豐熟因名帝曰秀先是有鳳凰集濟陽故宮中皆畫鳳凰聖瑞萌兆始形于此帝為人隆準日角大口美鬚眉長七尺三寸在舂陵時望氣者言舂陵城中有喜氣曰美哉王氣鬱鬱葱葱年九歲而南頓君卒隨其叔父在蕭入小學後之長安受尚書于中大夫廬江許子威資用乏與同舍生韓子合錢買驢令從者僦以給諸公費大義略舉因學世事朝政每下必先聞知具為同舍解說高才好學然亦喜遊俠鬭雞走馬具知閭里姦邪吏治得失時會朝請舍長安尚冠里南陽大人賢者往來長安為之邸暗稽疑議嘗為季父故舂陵侯訟逋租于大司馬嚴尤尤見而奇之時宛人朱祜亦為舅訟租于尤尤止車獨與帝語不視祜帝歸戲祜曰嚴公寧視卿耶王莽時雒陽以東米石二千莽遣三公將運關東諸倉賑貸窮乏又分遣大夫謁者教民煮木為酪酪不可食重為煩擾流民入關者數十萬人置養贍官以廩之盜發其廩民餓死者十七八人民相食末年天下大旱蝗蟲蔽天盜賊群起四方潰畔荊州下江平林兵起王匡王鳳為之渠率時南陽旱饑而帝田獨收帝仁智明達多權略樂施愛人在家重慎畏事勤于稼穡兄伯升好俠笑帝事田作比之高祖兄仲宛大姓李伯玉從弟軼數遣客求帝帝欲避之先是時伯玉同母兄公孫臣為醫伯升請呼難伯升殺之帝恐其怨故避之使來者言李氏欲相見款誠無他意帝乃見之懷刀自備入見固始侯兄弟為帝言天下擾亂飢餓下江兵盛南陽豪右雲擾因具言讖文事劉氏當復起李氏為輔帝殊不意獨內念李氏富厚父為宗卿師語言譎詭殊非次第嘗疾毒諸家子數犯法令李氏家富厚何為如是不敢諾其言諸李遂與南陽府掾史張順等連謀帝深念良久天變已成遂市兵弩絳衣赤幘時伯升在舂陵亦已聚會客矣帝歸舊廬望見廬南若火光以為人持火呼之光遂盛赫然屬天有頃不見異之遂即歸宅乃與伯升相見初伯升之起也諸家子弟皆亡逃自匿曰伯升殺我及聞帝至絳衣大冠服將軍服乃驚曰以為獨伯升如此也仲謹厚亦如之皆合會共勞饗新市平林兵王匡王鳳等因率舂陵子弟隨之兵合七八千人帝騎牛與俱殺新野尉後乃得馬帝起義兵攻南陽暮聞冢上有哭聲後有人著大冠絳單衣使劉終僞稱江夏吏誘殺湖陽尉嚴尤擊下江兵帝奉糗一斛脯三十朐進圍宛城王莽懼遣大司徒王尋大司空王邑將兵來征更始立以帝為太常偏將軍時無印得定武侯家丞印佩之入朝尋邑兵到潁州嚴尤陳茂與合尤問城中出者言帝不敢取財物但合會諸兵為之計策尤笑言曰是美鬚眉目者耶欲何為乃如此初莽遣尋邑欲盛威武以振山東兵甲衝輣干戈旌旗戰攻之具甚盛至驅虎豹犀象奇偉猛獸以長人巨無霸為中壘校尉自秦漢以來師出未曾有也帝邀之于陽關尋邑兵盛漢兵反走帝馳入昆陽諸將惶恐各欲散歸帝與諸將議城中兵穀少宛城未拔力不能相救今昆陽即破一日之間諸將亦滅不同力救之反欲歸守其妻子財物耶諸將怒曰劉將軍何以敢如此帝乃笑且去惟王常是帝計會候騎還言尋邑兵已來長數百里望不見其後尾前已至城北矣諸將遽請帝帝到為陳相救之勢諸將素輕帝及迫急帝為畫成敗皆從所言時漢兵八九千人留王鳳令守城夜出城南門尋邑兵已五六萬到遂環昆陽城作營且圍之數十重雲車十餘丈瞰臨城中旗幟蔽野塵熛連雲金鼓之聲數十里或為地突或為衝車撞城積弩射城中矢下如雨城中負戶而汲尋邑自以為成功漏刻有流星墜尋營中正晝有雲氣如壞山直營而霣不及地尺而散吏士皆壓伏時漢兵在定陵郾者聞尋邑兵盛皆怖帝歷說其意為陳大命請為前行諸部堅陳帝將步騎千餘前去尋邑軍四五里而陳尋邑遣步騎數千乘合戰帝奔之斬首數十級諸部將喜曰劉將軍平生見小敵怯今見大敵勇甚可怪也帝復進尋邑兵卻諸部共乘之斬首數百千級連勝乃遂令輕足將書與城中諸將言宛下兵復到而陽墜其書尋邑得書讀之恐帝遂選精兵三千人從城西水上奔陳尋邑兵大奔北于是殺尋而昆陽城中兵亦出中外竝擊會天大雷風暴雨下如注水潦成川滍水盛溢邑大衆遂潰亂奔走赴水溺死者以數萬滍水為之不流邑與嚴尤陳茂輕騎乘死人渡滍水逃去漢軍盡獲其珍寶輜重車甲連月不盡五月齊武王拔宛城後數日更始收齊武王部將劉稷齊武王強爭之遂用譖訴復收齊武王即日皆物故帝降潁陽雖得入意不安門下有繫馬著鼓者馬驚硠磕鄧晨起走出視之乃馬也帝在父城徵詣宛拜帝為破虜大將軍封武信侯更始害齊武王帝飲食語笑如平常獨居輒不御酒肉坐臥枕席有涕泣處更始欲北之雒陽以帝為司隸校尉先到雒陽整頓官府文書移與屬縣三輔官府吏東迎雒陽者見更始諸將過者已數十輩皆冠幘衣婦人衣諸于繡擁䘿大為長安所笑知者或畏其衣奔亡入邊郡避之及見司隸官屬皆相指視之極望老吏或垂涕曰粲然復見漢官威儀賢者蟻附更始欲以近親巡行河北大司徒賜言帝第一可用更始以帝為大司馬遣之河北十月帝持節渡孟津鎮撫河北安集百姓帝至邯鄲趙王庶兄胡子進狗䐑馬醢故趙繆王子臨說帝決水灌赤眉胡子立邯鄲卜者王郎為天子移檄購求帝十萬戶王郎追帝帝自薊東南馳至饒陽官屬皆乏食帝乃自稱邯鄲使者入傳舍傳吏方進食從者饑爭奪之傳吏疑其僞乃椎鼓數十通紿言邯鄲將軍至官屬皆失色帝升車欲馳而懼不免還坐曰請邯鄲將軍入久乃駕去夜止蕪蔞亭大風雨馮異進一笥麥飯兔肩聞王郎兵至復驚去至南宮天大雨帝引車入道旁空舍竈中有火馮異抱薪鄧禹吹火帝對竈炙衣大會真定帝自擊筑帝率鄧禹等擊王郎橫野將軍劉奉大破之還過鄧禹營禹進食炙魚帝大餐啖時百姓以帝新破大敵欣喜聚觀見帝餐啖勞勉吏士威嚴甚厲于是皆竊言曰劉公真天人也帝引兵攻邯鄲連戰郎兵挫折郎遣諫議大夫杜長威持節詣軍門帝遣棨戟迎延請入軍見上據地曰實成帝遺體子輿也帝曰正使成帝復生天下不可復得也況詐子輿乎長威請降得萬戶侯帝曰一戶不可得長威曰邯鄲雖鄙君臣并力城守尚可支一歲終不君臣相率而降但得全身也辭去而郎少傅李立反郎開城門漢軍破邯鄲誅郎入王宮收文書得吏民謗毀帝言可擊者數千章帝會諸將燒之曰令反側者自安也帝圍邯鄲未下彭寵遺米糒魚鹽以給軍糧由是破邯鄲更始遣使者即立帝為蕭王諸將議上尊號帝不許帝擊銅馬大破之受降適畢封降賊渠率諸將未能信賊亦兩心帝敕降賊各歸營勒兵待帝輕騎入案行賊營賊曰蕭王推赤心置人腹中安得不投死由是皆自安詔馮異軍鴈門卒萬餘人降之帝已乘王豐小馬先到矣而營門不覺帝破賊入漁陽諸將上尊號帝不許議曹掾張祉言俗以為燕人愚方定大事反與愚人相守非計也帝大笑帝發薊還士衆喜樂師行鼓舞歌詠雷聲八荒震動至范陽命諸將收葬吏士至中山諸將復請上尊號上奏曰大王社稷為計萬姓為心耿純說帝曰天時人事已可知矣初王莽時帝與伯叔及姊壻鄧晨穰人蔡少公燕語少公道讖言劉秀當為天子或曰是國師劉子駿也帝戲言曰何知非僕耶坐者皆大笑時傳聞不見赤伏符文軍中所帝未信到鄗帝所與在長安同舍諸生彊華自長安奉赤伏符詣鄗與帝會群臣復固請曰符瑞之應昭然著聞矣乃命有司設壇于鄗南千秋亭五成陌建武元年夏六月己未即皇帝位燔燎告天禋于六宗改元為建武改鄗為高邑詔曰故密令卓茂束身自修執節惇固斷斷無他其心休休焉夫士誠能為人所不能為則名冠天下當受天下重賞故武王誅紂封比干之墓表商容之閭今以茂為太傅封宣德侯食邑二千戶賜安車一乘衣一襲金五斤冬十月帝入雒陽幸南宮遂定都焉帝破聖公與朱伯然書曰交鋒之日神星晝見太白清明二年春正月益吳漢鄧禹等封自漢草創德運正朔服色未有所定高祖因秦以十月為正以漢水德立北畤而祠黑帝至孝文賈誼公孫臣以為秦水德漢當為土德至孝武倪寬司馬遷猶從土德自帝即位按圖讖推五運漢為火德周蒼漢赤木生火赤代蒼故帝都雒陽制郊兆于城南七里北郊四里行夏之時時以平旦服色犧牲尚黑明火德之運常服徽幟尚赤四時隨色季夏黃色議者曰昔周公郊祀后稷以配天宗祀文王以配上帝圖讖著伊堯赤帝之子俱與后稷竝受命而為王漢劉祖堯宜令郊祀帝堯以配天宗祀高祖以配上帝有司奏議曰追跡先代無郊其五運之祖者故禹不郊白帝周不郊帝嚳漢雖唐之苗堯以歷數命舜高祖赤龍火德承運而起當以高祖配堯之後元復于漢宜以時修奉濟陽城陽縣堯帝之冢雲臺致敬祭祀之禮儀亦如之帝遣游擊將軍鄧隆與幽州牧朱浮擊彭寵隆軍潞浮軍雍奴相去百餘里遣吏上奏言寵破在旦暮帝讀檄未竟怒曰兵必敗比汝歸可知吏還未至隆軍果為寵兵掩擊破浮軍遠至不能救以兵走幽州咸曰上神三年帝征秦豐幸舊宅冬十月帝幸舂陵祠園廟大置酒與舂陵父老故人為樂以皇祖皇考墓為昌陵後改為章陵以舂陵為章陵縣隗囂上書報以殊禮四年夏五月帝幸盧奴為征彭寵故也自王莽末天下旱霜連年百穀不成元年之初耕作者少民飢饉黃金一斤易粟一石至二年秋天下野穀旅生麻菽尤盛或生苽菜果實野蠶成繭被山民收其絮採穫穀果以為蓄積至是歲野穀生者稀少而南畝亦益闢矣五年初起太學諸生吏子弟及民以義助作帝自齊歸幸太學賜博士弟子有差六年春二月吳漢下朐城天下悉定惟獨公孫述隗囂未平帝曰取此兩子置度外乃休諸將置酒賞賜之每幸郡國下輿見吏輒問以數十百歲能吏次第下至掾史簡練臣下之行下無所隱其情道數十歲事若案文書吏民驚惶不知所以人自以見識家自以蒙恩遠臣受顏色之惠坐席之間以要其死力當此之時賊檄日以百數憂不可勝帝猶以餘閒講經藝發圖讖制告公孫述署曰公孫皇帝囂雖遣子入侍尚持兩心囂故吏馬援謂囂曰到朝廷凡數十見自事主未嘗見明主如此也材直驚人其勇非人之敵開心見誠與人語好醜無所隱諱圖講天下事極盡下恩兵事方略量敵校勝闊達多大節與高帝等經學博覽政事文辨前世無比囂曰如卿言勝高帝耶曰不如也高帝大度無可無不可今上好吏事動如節度不飲酒囂大笑曰如卿言反復勝也代郡太守劉興將數百騎攻賈覽上狀檄至帝知其必敗報書曰欲復進兵恐失其頭首也詔書到興已為覽所殺長史得檄以為國家坐知千里也七年春正月詔群臣奏事無得言聖人又舊制上書以青布囊素裹封書不中式不得上既上詣北軍待報前後相塵連歲月乃決帝躬親萬機急于下情乃令上書啓封則用不得刮璽書取具文字而已奏詣闕平旦上其有當見及冤結者常以日而出時騶騎馳出召入其餘以俟中使者出報即罷去所見如神遠近不偏幽隱上達民莫敢不用情追念前世園陵至盛王侯外戚葬埋僭侈吏民相效寖以無限詔告天下令薄葬八年閏四月車駕西征河西大將軍竇融與五郡太守步騎二萬迎帝隗囂士衆震壞皆降囂走入城吳漢岑彭追守之九年春正月隗囂餓出城餐糗糒腹脹死十一年幸章陵修園廟舊宅田里舍十二年吳漢引兵擊公孫述入犍為界小縣多城守未下詔書告漢直擁兵到成都據其心腹後城營自解散漢意難前獨言朝廷以為我縛賊手足矣遣輕騎至成都燒市橋武陽以東小城營皆奔走降竟如詔書漢兵乘勝追奔述拒守詔書又戒漢曰成都十萬餘衆不可輕也且堅據廣都城去之五十里待其即營攻城罷倦引去乃首尾擊之勿與爭鋒述兵不敢來轉營即之移徙輒自堅十一月衆軍至城門述自將背城而戰吳漢攻之述軍大破刺傷述扶輿入壁其夜死夷述妻子傳首于洛陽縱兵大掠舉火燔燒帝聞之下詔讓吳漢副將劉禹曰城降嬰兒老母口以萬數一旦放兵縱火聞之可為酸鼻家有敝帚享之千金禹宗室子孫故嘗更職何忍行此仰視天俯視地觀于放麑啜羹之義二者孰仁矣失斬將弔民之義又議漢殺述親屬太多是時名都王國有獻名馬寶劍直百金馬以駕鼓車劍以賜騎士苑囿池籞之官廢弋獵之事不御雅性不喜聽音樂手不持珠玉衣服大絹而不重綵征伐嘗乘革輿羸馬公孫述故哀帝時即以數郡備天子用述破益州乃傳送瞽師郊廟樂葆車乘輿物是後乃稍備具焉述伏誅之後而事少閒官曹文書減舊過半下縣吏無百里之繇民無出門之役十三年封殷紹嘉公為宋公周承休公為衛公十四年封孔子後孔志為褒成侯十五年詔曰刺史太守多為詐巧不務實核苟以度田為名聚人田中并度廬屋里落聚人遮道啼呼十七年帝以日食避正殿讀圖讖多御坐廡下淺露中風發疾苦眩甚左右有白大司馬史病苦如此不能動搖自強從公出乘以車行數里病差四月二日車駕宿偃師病差數日入南陽界到葉以車騎省留數日行黎陽兵馬千餘匹遂到章陵起居平愈鳳凰五高八尺九寸毛羽五采集潁川群鳥從之蓋地數頃留十七日乃去商賈重寶單車露宿牛馬放牧道無拾遺十九年帝下詔曰惟孝宣皇帝有功德其上尊號曰中宗幸南陽汝南至南頓止令舍大置酒賜吏民復南頓田租一歲吏民叩頭言皇考居此日久陛下識知寺舍每來輒加厚恩但復一歲少薄願復十歲帝曰天下之重寶大器常恐不任日慎一日安敢自遠期十歲復增一歲二十年夏六月帝風眩黃疸病發甚以衛尉關內侯陰興為侍中興受詔雲臺廣室甘露降四十五日二十五年烏桓獻貂豹皮詣闕朝賀二十六年春正月詔曰前以用度不足吏祿薄少今益其俸自三公下至佐史各有差四月始營陵地于臨平亭南詔曰無為山陵陂池裁令流水而已迭興之後亦無丘壟使合古法今日月已逝當豫自作臣子奉承不得有加乃令陶人作瓦器又曰臨平望平陰河水洋洋舟船泛泛善矣夫周公孔子猶不得存安得松喬與之而共遊乎文帝曉終始之義景帝所謂孝子也故遭反覆霸陵獨完非成法耶初作壽陵將作大匠竇融上言園陵廣袤無慮所用帝曰古帝王之葬皆陶人瓦器木車茅馬使後世之人不知其處太宗識終始之義景帝能遵孝道遭天下反覆而獨完其福豈不美哉今所制地不過二三頃無為陵池帝常自細書一札十行報郡縣旦聽朝至日晏夜講經聽誦坐則功臣特進在側論時政畢道古行事次說在家所識鄉里能吏次第比類又道忠臣孝子義夫節士坐者莫不激揚悽愴欣然和悅群臣爭論上前常連日皇太子嘗承間言陛下有禹湯之明而失黃老養性之道今天下大安少省思慮養精神帝答曰我自樂此時城郭丘墟掃地更為帝悔前徙之草創苟合未有還人三十年有司奏封禪詔曰災異連仍日月薄食百姓怨嘆而欲有事于太山污七十二代編録以羊皮雜貂裘何強顏耶三十二年群臣復奏宜封禪遂登太山勒石紀號改元為中元中元元年帝幸長安祠長陵還雒陽宮是時醴泉出于京師郡國飲醴泉者痼疾皆愈獨眇蹇者不瘥有赤草生于水涯郡國上甘露降群臣上言地祇靈應而朱草萌宜命太史撰具郡國所上帝不聽是以史官鮮紀冬十月甲申使司空馮魴告祠高祖廟曰高皇呂太后不宜配食薄太后慈仁孝文皇帝賢明子孫賴福延至于今宜配食地祇高廟今上薄太后尊號為高皇后遷呂太后于園四時上祭是歲初起明堂靈臺辟雍及北郊兆域宣布圖讖于天下二年春二月戊戌帝崩于南宮前殿在位三十三年時年六十二遺詔曰朕無益百姓如孝文皇帝舊制葬務從省約刺史二千石長吏皆無離城郭無遣吏及因郵奏太子襲尊號為皇帝群臣奏諡曰光武皇帝廟曰世祖三月葬原陵帝詔曰明設丹青之信廣開束手之路功臣鄧禹等二十八人皆為侯封餘功臣一百八十九人帝以天下既定思念欲完功臣爵土不令以吏職為過故皆以列侯就第恩遇甚厚遠方貢甘珍必先遍賜列侯而大官無餘有功輒增封邑故皆保全帝封新野主子鄧泛為吳侯伯父皇皇考姊子周均為富波侯追封外祖樊重為壽張侯重子丹射陽侯孫茂平望侯尋玄鄉侯從子沖更父侯后父陰睦為宣恩侯子識原鹿侯就信陽侯皇考女弟子來歙為征羌侯弟由宜西鄉侯以寧平公主子李雄為新市侯后父郭昌為陽安侯子流綿曼侯兄子竟新郪侯匡發干侯姨子馮邯為鍾離侯帝蒙犯霜雪雖發師旁縣人馬席薦羈靽皆有成賈而貴不侵民樂與官市漢以炎精布耀或幽而光帝既有仁聖之明氣勢形體天然之姿固非人之敵翕然龍舉雲興三雨而濟天下蕩蕩人無能名焉
