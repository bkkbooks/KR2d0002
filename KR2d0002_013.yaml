body:
  text: 東觀漢記卷十三列傳八伏湛上自將擊彭寵伏湛上疏諫曰臣聞文王享國五十伐崇七年而三分天下有二至武王四海乃賓陛下承大亂之極出入四年中國未化遠者不服而遠征邊郡四方聞之莫不怪疑願思之杜詩薦湛疏曰竊見故大司徒陽都侯伏湛自行束修訖無毀玷篤信好學守死善道經為人師行為儀表秉節持重有不可奪衆賢百姓嚮望德義微過斥退久不復用識者愍惜儒士痛心湛容貌堂堂國之光輝智略謀慮朝之淵藪齠齔勵志白首不衰實足以先後王室名足以光示遠人武公莊公所以砥礪蕃屏勸進忠信令四方諸侯咸樂回首仰望京師柱石之臣宜居輔弼出入禁門補闕拾遺伏盛伏盛字伯明張步遣其掾孫昱隨盛詣闕上書獻鰒魚伏恭伏恭字叔齊湛同産兄子也伏晨伏晨尚高平公主侯霸侯霸字君房有威重為太子舍人從鍾寧君受律為淮平大尹政理有能名王莽敗霸保守臨淮更始元年遣謁者侯盛荊州刺史費遂齎璽書徵霸百姓號呼哭泣遮使者車或當道而臥皆曰願復留霸期年民至乃誡乳婦勿得舉子侯君當去必不能全使者慮就徵臨淮必亂不敢授璽書而具以狀聞霸為尚書令深見任用宋弘宋弘為司空上嘗問弘通博之士弘薦沛國桓談才學洽聞幾及揚雄劉向父子於是召談拜議郎給事中上每宴輒令鼓琴好其繁聲弘聞之不悅悔於薦舉聞談內出正朝服坐府上遣吏召之談至不與席而讓之曰吾所以薦子者欲令輔國家以道而今數進鄭聲以亂雅樂非碩德忠正也後大會群臣上使談鼓琴見弘失其常度上怪而問之弘乃離席免冠謝曰臣所以薦桓談者望能以忠正導主而令朝廷耽悅鄭聲臣之罪也其後不復令談給事中嘗受俸得鹽令諸生糶諸生以賤不糶弘怒悉賤糶不與民爭利弘嘗燕見御坐新施屏風圖畫列女上數顧視之弘正容言曰未見好德如好色者上即為撤之上姊湖陽公主新寡上與共論朝臣微觀其意主曰宋公威容德器群臣莫及上曰方且圖之後弘見上令主坐屏風後因謂弘曰諺言貴易交富易妻人情乎弘曰臣聞貧賤之交不可忘糟糠之妻不下堂上顧謂主曰事不諧矣韓歆韓歆字翁君南陽人以從征伐有功封扶陽侯好直言為司徒嘗因朝會帝讀隗囂公孫述相與書歆曰亡國之君皆有才桀紂亦有才上大怒以為激發免歸田里上猶不釋復詔就責歆及子嬰皆自殺歐陽歙歐陽歙其先和伯從伏生受尚書至于歙七世皆為博士敦於經學恭儉好禮歙遷汝南太守推用賢俊吏民從化為大司徒坐在汝南贓罪死獄中歙掾陳元上書追訟之言甚切至帝乃賜棺木贈賻三千匹朱浮朱浮與彭寵書責之曰伯通自伐以為功高天下往時遼東有豕生子白頭異而獻之行至河東見群豕皆白懷慚而還若以子之功論於朝廷則為遼東豕也上不征彭寵浮上疏切諫曰連年拒守吏士疲勞甲胄生蟣蝨弓弩不得弛上下相率焦心大兵冀蒙救護生活之恩陛下輒忘之於河北誠不知所以然浮上疏曰陛下率禮無違浮為司空賣國恩以為威福張湛張湛字子孝右扶風人以篤行純淑鄉里歸德雖居幽室暗處必自整頓三輔以為儀表為馮翊見府寺門即下主簿進曰位尊德重不宜自輕湛曰禮下公門何謂輕哉為光祿大夫數正諫威儀不如法度者湛常乘白馬光武每有異政輒曰白馬生且復諫矣為太子太傅及郭后廢因稱疾拜太中大夫病居中東門侯舍故時人號中東門君帝數存問賞賜後大司徒戴涉被誅帝強起湛以代之至朝堂遺失溲便因自陳疾篤不能復任朝事遂罷之杜林杜林字伯山扶風人於河西得漆書古文尚書經一卷每遭困厄握抱此經寄隗囂地終不降志辱身至簪蒿席草不食其粟囂乃出令曰杜伯山天子所不能臣諸侯所不能友蓋伯夷叔齊恥食周粟令且從師友之位須道開通使順其志林雖拘於囂而終不屈節建武六年弟成物故囂乃聽林持喪東歸既遣而悔追令刺客楊賢於隴坻遮殺之賢見林身推鹿車載致成喪乃歎曰當今之世誰能行義我雖小人何忍殺義士因亡去林為侍御史先與鄭興同寓隴右乃薦之上徵興為大中大夫時議郊祀制以為漢當祀堯林上疏曰臣聞營河雒以為民刻肌膚以為刑封疆畫界以建諸侯井田什一以供國用三代之所同及至漢興因時宜趨世務省煩苛取實事不苟貪高亢之論是以去土中之京師就關內之遠都除肉刑之重律用髡鉗之輕法郡縣不置世祿之家農人三十而取一政卑易行禮簡易從人無愚智思仰漢德樂承漢祀基業特起不因緣堯堯遠於漢民不曉信言提其耳終不悅諭后稷近於周民戶知之世據以興基由其祚本與漢異祀郊高帝誠從民望得萬國之歡心天下福應莫大于此民奉種祀且猶世主不失先俗群臣僉薦鯀考績不成九載乃殛宗廟至重衆心難違不可卒改詩云不愆不忘率由舊章明當尊用祖宗之故文章也宜如舊制以解天下之惑合於易之所謂先天而天不違後天而奉天時義方軍師在外祭可且如元年郊祭故事建武八年間郡國比大水涌泉盈溢林以為倉卒時兵擅權作威張氏雖皆降散猶尚有遺脫長吏制御無術令得復熾元元侵陵之所致也上疏曰臣聞先王無二道明聖用而治見惡如農夫之務去草焉芟夷蘊崇之絶其本根勿使能殖畏其易也古今通道傳其法于有根狼子野心奔馬善驚成王深知其終卒之患故以殷民六族分伯禽七族分康叔懷姓九宗分唐叔檢押其姦宄又遷其餘于成周舊地雜俗旦夕拘録所以挫其強禦之力詘其驕恣之節也及漢初興上稽舊章合符重規徙齊諸田楚昭屈景燕趙韓魏之後以稍弱六國強宗邑里無營利之家野澤無兼并之民萬里之統海內賴安後輒因衰粗之痛脅以送終之義故遂相率而陪園陵無反顧之心追觀往法政皆神道設教強幹弱枝本支百世之要也是以皆永享康寧之福無怵惕之憂繼嗣承業恭己而治蓋此助也其被災害民輕薄無纍重者兩府遣吏護送饒穀之郡或懼死亡卒為傭賃亦足以消散其口救贍全其性命也昔魯隱有賢行將致國於桓公乃流連貪位不能早退況草創兵長卒無德能直以擾亂乘時擅權作威玉食狙猱之意徼幸之望蔓延無足張步之計是也小民負縣官不過身死負兵家滅門殄世陛下昭然獨見成敗之端或屬諸侯宮府元元少得舉首仰視而尚遺脫二千石失制御之道令得復昌熾縱橫比年大雨水潦暴長涌泉盈溢災壞城郭官寺吏民廬舍潰徙離處潰成坑坎臣聞水陰類也易卦地上有水比言性不相害故曰樂也而猥相毀墊淪失常敗百姓安居殆陰下相為蠹賊有大小負勝不齊均不得其所侵陵之象也詩云畏天之威于時保之惟陛下留神明察往來懼思天下幸甚遷大司徒司直百僚知林以明德用甚敬憚之為光祿勳與馬援同鄉里素相親厚援從南方還時林馬適死援遣子持馬一匹遺林曰朋友有車馬之饋可具以備乏林受之居數月林遣子奉書曰將軍內施九族外有賓客望恩者多林父子兩人食列卿祿祿出常有盈今送錢五萬援受之謂子曰人當以此為法是杜伯山所以勝我也林為東海王傅王以師故數加饋遺林不敢受常辭以道上稟假有餘苦以車重無所置之代張純為大司空務于無為張純張純字伯仁建武初先詣闕封武始侯為大中大夫在朝纍世明習故事時舊典多闕每有疑義輒以訪純自郊廟婚冠喪紀禮儀多所正定一日或數四引見為虎賁中郎將純素重慎周密時上封事輒削去草建武二十六年詔純曰禘祫之祭不行已久矣宜據經典詳為其制純奏曰禮三年一祫五年一禘春秋傳曰大祫者何合祭也毀廟及未毀廟之主皆登合食入太祖廟五年而再殷漢舊制三年一祫毀廟主合食高廟存廟主未嘗合祭元始五年諸王公列侯廟會始為禘祭又前十八年親幸長安亦行此禮禘之為言諦諦定昭穆尊卑之義也禘祭以夏四月夏者陽氣在上陰氣在下故正尊卑之義也祫祭以冬十月冬者五穀成熟物備禮成故合聚飲食也斯典之廢于茲八年請可如禮施行以時定議帝從之自是禘祫遂定純臨終謂家丞翕曰吾無功于時猥蒙爵土身死之後勿議傳國爵子奮字稚通兄根常被病純薨大行移書問嗣翕上奮詔封奮奮上書曰根不病哀臣小稱病令翕移臣臣時在河南冢廬見純前告翕語自以兄弟不當蒙爵土之恩願下有司帝以奮違詔收下獄奮惶怖乃襲封謙儉節約閨門中和馮勤馮勤字偉伯魏郡人曾祖揚宣帝時為弘農太守生八男皆典郡趙魏間號為馮萬石兄弟形皆偉壯惟勤祖偃長不滿七尺為黎陽令常自謂短陋恐子孫似之乃為子伉娶長妻生勤長八尺三寸魏郡太守范橫上疏薦勤為郎中給事尚書以圖議軍糧在事精勤遂見親識由是使典諸侯封事勤差量功次輕重國土遠近地勢豐薄不相踰越莫不厭服焉自是封爵之制非勤不定遷司徒是時三公多見罪退上賢勤欲令以善自珍乃因燕見從容誡之曰朱浮上不忠于君下淩轢同列竟以中傷人臣放逐遭誅雖追加賞賜不足以償不訾之身忠臣孝子覽照前世以為鏡誡能盡忠於國事君無二則爵賞光於當世功名列於不朽可不勉哉中元元年車駕西幸長安祀園陵還勤燕見前殿盡日歸府因病喘逆上使太醫療視賞賜錢帛遂薨馮魴馮魴字孝孫其先魏之別封曰華侯華侯孫長卿食采馮城因以氏焉魴父名揚明帝詔曰馮魴以忠孝典兵出入八年數進忠言正諫其還故爵為楊邑侯賜以玉玦帝東巡郡國留魴宿衛南宮敕魴車駕發後將緹騎宿玄武門復道上領南宮吏士南宮復道多惡風寒老人居之且病痱若向南者多取帷帳東西完塞諸窗望令緻密子孫得到魴所魴父子兄弟並帶青紫三代侍中馮石馮石襲母公主封獲嘉侯亦為侍中稍遷衛尉能取悅當世為安帝所寵帝嘗幸其府留飲十許日賜駮犀具劍佩刀紫艾綬玉玦各一趙喜趙喜字伯陽奮迅行伍少有節操從兄為人所殺無子喜常思欲報之遂往復讎而讎家皆疾病喜以因疾報殺非仁者心且釋之而去顧謂讎曰爾曹若健遠相避後病愈悉自縛詣喜喜不與相見後竟殺之更始即位舞陰大姓李氏擁城不下更始遣柱天將軍李寶降之不肯云聞宛之趙氏有孤孫喜信義著聞願得降之更始徵喜使詣舞陰李氏遂降喜為赤眉兵所圍迫急乃亡走與友人韓仲伯等數十人攜小弱越山出武關仲伯以其婦有色恐有強暴者而己受其害欲棄之於道喜責怒仲伯以泥塗其婦面載以鹿車身自推之每逢賊欲逼奪輒為求哀言其病遂脫遇更始親屬皆裸跣塗炭饑困不能前喜見之悲感所裝縑帛資糧悉以與之光武以喜守簡陽侯相敕從騎都尉儲融受兵二百人通利道路喜白上不願受融兵單車馳往度其形況上許之為平原太守於是擢舉義行誅鋤姦惡後青州大蝗入平原界輒死歲屢有年百姓歌之建武二十六年上延集內戚宴會諸夫人各前言為趙喜所濟活上甚嘉之後徵喜入為太僕引見謂曰卿非但為英雄所保也婦人亦懷卿之恩厚加賞賜拜太尉以日食免為衛尉性周密盡心事上夙夜匪懈恩寵甚厚母歿乞身行服顯宗不許遣使者為釋服賞賜恩寵甚渥喜內典宿衛外幹宰職正身立朝未嘗懈惰及帝崩復典喪事再奉大行禮事修舉肅宗即位進為太傅詔曰行太尉事趙喜三葉在位為國元老其以喜為太傅
