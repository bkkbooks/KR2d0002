body:
  text: 東觀漢記卷十七列傳十二虞延虞延字子大陳留人為郡功曹世祖聞而奇之建武二十年東巡路過小黃高帝母昭靈后園陵在焉時延為郡督郵詔呼引見問園陵之事延進止從容瞻拜可觀其園陵樹蘖皆諳其數俎豆犧牲頗曉其禮帝善之敕延從駕到魯還經封邱城門下小不容羽蓋上怒使撻侍御史延因下見引咎以為罪在督郵上詔曰以陳留督郵虞延故貸御史罪賜延錢及帶劍佩刀還郡永平初有新野功曹鄧寅以外戚小侯每預朝會而容止趨步有出于眾上目之顧左右曰朕之儀貌豈若此人特賜輿馬衣服延以寅雖有容儀而無實行未嘗加禮上乃詔令自稱南陽功曹詣闕拜郎中遷玄武司馬寅在職不服父喪帝聞乃嘆曰知人則哲惟帝難之信哉斯言寅聞慚而退郭丹郭丹字少卿南陽人累世千石父稚為丹買田宅居業丹從師長安從宛人陳洮買符入函谷關既入關封符乞人乃慨然而歎曰丹不乘使者車不出此關既至京師常為都講更始二年三公舉丹賢能徵為諫議大夫持節使歸南陽安集受降自去家十二年果乘高車出關如其志焉更始敗諸將軍悉歸上普賜封爵丹無所歸節傳以敝布纏裹節晝伏夜行求謁更始妻子奉還節傳因歸鄉里為郡功曹薦陰亶程胡魯歆自代太守杜詩曰古者卿士讓位今功曹稽古含經可謂至德編署黃堂以為後法丹師事公孫昌敬重常待重編席顯異之為司徒在朝名清廉公正永平五年薨詔問丹家時宗正劉匡對曰郭丹為三公典牧州郡田畝不增周澤周澤字穉都北海安邱人少修高節耿介特立好學問治嚴氏春秋門徒數百人隱居山野不汲汲于時俗建武十六年辟大司馬府署議曹祭酒為黽池令奉公克己妻子自親釜竈拜太常果敢直言數有據爭朝廷嘉其清廉北地太守廖信貪污下獄詔以信田宅奴婢錢財賜廉吏太常周澤牟融牟融字子優遷大司農性明達居職修治又善論議朝廷稱為名卿帝數嗟嘆以為才堪宰相孫堪孫堪為光祿勳以清廉見稱與周澤相類魏應魏應字君伯任城人拜五官中郎將諸儒于白虎觀講論五經同異使應專掌難問劉般劉般字伯興彭城人代名忠孝兼屯騎校尉時五校尉官顯職閒府寺寬敞輿服光麗伎巧畢給故多以宗室肺腑居之為太僕在朝竭忠盡謀建初元年拜為宗正憂勤國事夙夜不怠數納嘉謀劉愷劉愷字伯豫以當襲父般爵封居巢侯讓與其弟憲遁逃避封久之章和中有司奏請絕國上美其義特優嘉之愷猶不出有司復奏之侍中賈逵上書曰孔子稱能以禮讓為國於從政乎何有和帝納之下詔曰故居巢侯劉般嗣子愷當襲父般爵而稱父遺意致國弟憲遯亡七年所守彌固蓋王法崇善成人之美其聽憲嗣爵乃徵愷拜為郎稍遷侍中愷之入朝在位者莫不仰其風行郭賀郭賀字喬卿洛陽人為荊州刺史百姓歌之曰厥德文明治有殊政顯宗巡狩賜以三公之服黻冕之旒吳良吳良字大儀齊國人習大夏侯尚書為郡議曹掾歲旦與掾吏入賀門下掾王望言曰齊郡敗亂遭離盜賊人民饑餓不聞鷄鳴犬吠之音明府視事五年土地開闢盜賊息滅五穀豐登家給人足今日歲首請上雅壽掾吏皆稱萬歲良時跪曰門下掾佞諂明府勿受其觴盜賊未盡人庶困乏不能家給人足今良曹掾尚無袴寧為家給人足耶望曰議曹惰窳自無袴寧足為不家給人足耶太守歛容而止曰此生言是遂不舉觴賜良鰒魚百枚轉良為功曹良恥以言受進終不肯謁東平王蒼辟為西曹掾數諫蒼多善策蒼上表薦良上以章示公卿曰前見良頭鬚皎然衣冠甚偉求賢助國宰相之職蕭何舉韓信設壇即拜不復考試今以良為議郎遷司徒長史以清白方正稱劉平劉平字公子楚郡人以仁孝著聞更始時天下亂平弟仲為賊所殺其後賊忽然而至平扶侍其母奔走逃難抱仲遺腹女而棄其子母欲還取之平不聽曰力不能兩活仲不可以絕類遂去不顧與母俱匿野澤中平朝出求食為餓賊所得將烹之叩頭曰今旦為老母求菜老母饑少氣待歸為命願得歸飯母畢還就死因涕泣賊哀而遣之平還食母訖因白曰屬與賊期義不可負遂還詣賊眾皆大驚相謂曰嘗聞烈士今乃見之去矣吾不忍食子於是得全平既免乃摭莢得三升豆以謝賊恩永平三年為宗正數薦達名士承宮郇恁等承宮承宮琅邪姑幕人少孤年八歲為人牧豬鄉里徐子盛明春秋經授諸生數百人宮過其廬下見諸生講誦好之因忘其豬而聽經豬主怪其不還行求索見宮欲笞之門下生共禁乃止因留精舍門下樵薪執苦數十年間遂通其經遭王莽篡位天下擾攘盜賊并起遂避世漢中建武四年將妻子之華陰山谷耕種禾黍臨熟人就認之宮悉推與而去由是顯名永平中徵為博士遷左中郎將數納忠諫論議切直名播匈奴時單于遣使求欲得見宮詔敕宮自整飭對曰彼徒炫名非實識也臣狀醜不可以示遠宜選長大威容者帝乃以大鴻臚魏應代之鍾離意鍾離意辟大司徒侯霸府詔部送徒詣河內時冬寒徒病不能行路過弘農意輒移屬縣使作徒衣縣不得已與之而上書言狀意亦具以聞上得奏以見霸曰君所使掾何乃仁于用心誠良吏也意在堂邑為政愛利輕刑慎罰撫循百姓如赤子初到縣市無屋意出奉錢帥人作屋人齎茅竹或持材木爭赴趨作浹日而成功作既畢為解土祝曰興功役者令百姓無事如有禍祟令自當之人皆大悅顯宗時意為尚書交趾太守坐贓千金徵還伏法詔以其貲物班賜群臣意得珠璣悉以委地而不拜賜上怪問其故對曰臣聞孔子忍渴於盜泉之水曾參迴車于勝母之閭惡其名也此贓穢之物誠不敢拜受上嗟嘆曰清乎尚書之言乃更以庫錢三十萬賜之詔賜降胡縑尚書案事誤以十為百上見司農上簿大怒召郎將笞之意因叩頭曰過誤之失常人所容若以懈慢為愆則臣位大罪重郎位小罪輕咎皆在臣臣當先笞乃解衣就格上意乃解上欲起北宮意上書諫出為魯相後起德陽殿殿成百官大會上謂公卿曰鍾離尚書若在不得成此殿宋均宋均字叔庠為九江太守有兩山名曰唐后山有神祠眾至共為嫁娶皆取百姓男女不復要娶巫家女百姓患之長吏莫敢改之均乃移書曰自今已去當為山娶巫家女其後乃絕建武中山陽楚郡多蝗蜚南到九江輒東西別去由是名稱永平七年徵為尚書令忠正直言數納策謀每駮議未嘗不合上意朱酺朱酺梁國寧陵人明帝時為益州刺史移書屬郡喻以聖德白狼王等百餘國重譯來庭歌詩三章酺獻上觟陽鴻觟陽鴻字孟孫中山人為世名儒永平中拜少府楊政楊政字子行京兆人治梁邱易與京兆祁聖元同好俱名善說經書京師號曰說經鏗鏗楊子行論難僠僠祁聖元政師事博士范升建武中升為太常丞為去妻所誣告坐事繫獄當服重罪政以車駕出時伏道邊抱升子持車叩頭武騎虎賁恐驚馬引弓射之不去旄頭以戟叉政傷胸前政涕泣求哀上即尺一出升政嘗過揚虛侯馬武武稱疾見政對几據床欲令政拜床下政入戶前排武徑上床坐武帳言語不擇因把臂責之曰卿蒙國恩備位藩臣不思求賢報國而驕天下英俊今日搖動者刀入脅左右大驚以為見劫操兵滿側政顏色自若會信陽侯至責數武令為朋友其果勇敢折皆此類也薛漢薛漢字子公淮陽人才高名遠兼通書傳無不照覽道術尤精教授常數百弟子自遠方至者著為錄郇恁郇恁字君大鴈門人也隱居教授東平憲王蒼為驃騎開東閣延賢士辟恁署為祭酒敬禮焉後朝會明帝戲之曰先帝徵君不來驃騎辟君而來何也恁曰先君秉德以惠下臣可以禮進退驃騎執法御臣臣懼法而至月餘遂去官徐匡永平中車駕出信陽侯陰就於干突車騎簿車府令齊國徐匡鉤就車收御者送獄詔書譴匡匡自繫獄吳良上言信陽侯驕慢干突車騎大不敬無人臣禮匡執法守正而下獄恐政化由是而墜詔出匡左遷即邱長張重張重日南計吏形容短小明帝問云何郡小吏對曰臣日南計吏非小吏也姜詩姜詩字士遊廣漢雒人也適值年荒與婦傭作養母詩性至孝母好飲江水令兒常取水溺死夫婦痛恐母知詐曰行學歲歲作衣投於江中俄而湧泉出舍側味如江水日生鯉一雙賊經詩里不敢驚孝子致肉米詩埋之後吏譴詩詩掘示之趙孝趙孝字長平沛國蘄人父為田禾將軍孝為郎每告歸往來常白衣步擔嘗從長安來過直上郵亭但稱書生寄止於亭門塾亭長難之告有貴客過灑掃不欲穢污地良久乃聽止吏因問曰田禾將軍子從長安來何時發幾日至孝曰尋到矣時天下亂人相食弟禮為賊所得孝聞即自縛詣賊曰禮久餓羸瘦不如孝肥賊并放之建武初天下新定穀食尚少孝得穀炊將熟令弟禮夫妻俱出外孝夫妻共蔬食比禮夫妻歸即曰我已食訖以穀飯獨與之積久禮心怪疑後掩伺見之亦不肯食遂共蔬食兄弟怡怡鄉里歸德孝辟太尉府顯宗聞其行官至長樂衛尉弟禮為御史中丞帝嘉其篤行寵異之詔禮十日就長樂衛尉府太官送供具相對盡歡數年禮卒令孝從官屬送喪歸也魏譚魏譚字少閒琅邪人王莽末政亂盜賊起人民相食譚為賊所得等輩數十皆縛束當稍就噉見譚貌謹敕獨放令主炊養有賊長公哀譚謂曰汝曹皆當以次死哀縱汝急從此去譚不肯去叩頭曰我嘗為諸君主炊養食馨肉肌香餘皆菜食羸瘦肉腥臊不可食願先等輩死長公義之即相謂此兒有義可哀縱也賊遂皆放之數十人皆得脫譚有一孤兄子年一二歲常自養視遭饑饉分升合以相存活譚時有一女生裁數月念無穀食終不能兩全棄其女養活兄子州郡高其義李善李善字次孫南陽人本同縣李元蒼頭建武中疫病元家相繼死沒惟孤兒續始生數旬而有資財千萬諸奴婢私共計議欲謀殺續分財產善乃潛負逃亡隱山陽瑕邱界中親自哺養乳為生湩續孩抱奉之不異長君有事輒長跪請白然後行之閭里感其行皆相率修義續年十歲善與歸本縣修里舊業告奴婢于長吏悉收殺之時鍾離意為瑕邱令上書薦善行狀
