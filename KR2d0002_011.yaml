body:
  text: 東觀漢記卷十一列傳六鄧晨鄧晨南陽人曾祖父隆揚州刺史祖父勳交趾刺史晨與上共載出逢使者不下車使者怒頗加恥辱上稱江夏卒史晨更名侯家丞使者以其詐將至亭欲罪之新野宰潘叔為請得免晨與上起兵新野吏乃燒晨先祖祠堂汙池室宅焚其冢墓宗族皆怒曰家自富足何故隨婦家入湯鑊中晨終無恨色上微時與晨觀讖云劉秀當為天子或言國師公劉秀當之上曰安知非僕乎建武三年上徵晨還京師數燕見説故舊平生為欣樂晨從容謂帝曰僕竟辦之帝大笑晨為陳留郡興鴻郤陂益地數千頃溉郡稻常以豐熟兼流給他郡來歙來歙字君叔南陽人也有大志慷慨治左氏春秋與劉嘉俱詣雒陽世祖見歙與之大歡曰君叔獨勞苦解所被襜襦以衣歙拜大中大夫建武五年持節送馬援奉璽書于隗囂囂遣子恂隨入侍時山東略定帝謀西收囂兵與俱伐蜀囂將王元説囂故狐疑不決歙素剛直遂發憤責之曰國家以公知臧否曉廢興故以手書暢至意足下推忠誠遣伯春委質是君臣父子信也今乃欲從佞惑之言為族滅之計叛主負子違背忠信吉凶之決在于今日因欲前刺囂囂起入部勒兵將殺歙歙徐仗節就車而去歙與征虜將軍祭遵襲略陽因保其城上聞甚悅左右怪上數破大敵今得小城何足以喜然上以略陽囂所依阻心腹已壞則制其支體易也囂圍歙于略陽上詔曰桃花水出船槃皆至郁夷陳倉分部而進上大發關東兵自將上隴討囂囂衆潰走圍解于是置酒高會賜歙班絶席坐在諸將之右賜歙妻縑千匹上使歙監諸將因歙上疏宜益選兵馬儲積資糧詔于汧積穀六萬斛驢四百頭負馱隗囂破後有五溪六種寇侵見便鈔掠退阻營塹歙乃大治攻具衝車度塹遂與五溪戰大破之與蓋延攻公孫述將王元破之蜀人大懼使刺客刺歙歙未死馳告蓋延延見歙伏悲不能仰視歙叱曰故呼卿欲屬以軍事而反效兒女子泣涕乎延收淚強起受所誡歙自書表投筆抽刃而死樊重樊重字君雲南陽人世善農稼好貨殖治家産業起廬舍高樓連閣陂池灌注竹木成林閉門成市家素富外孫何氏兄弟爭財重恥之以田二頃解其忿訟縣中稱美推為三老年八十餘臨終其素所假貸人間數百萬遺令焚削文契債家聞者皆慚爭往償之諸子從敕竟不肯受世祖即位追封重為壽張敬侯樊宏樊宏字靡卿拜光祿大夫位特進封長羅侯建武十三年徙都尉封謝侯十五年徙封壽張侯宏為人謙慎常戒其子曰富貴盈溢未有能終者天道惡滿而好謙前世貴戚皆明戒也保身全己豈不樂哉宏每當朝會迎期先到俯伏待事時至乃起上聞之敕騶臨朝乃告勿令豫到宏病困車駕臨問其所欲言宏頓首自陳無功享食大國願還壽張食小鄉亭上悲傷其言而不許樊鯈樊鯈字長魚事後母至孝母嘗病癰鯈晝夜匍伏不離左右至為吮癰母終上遣中黃門朝暮餐食野王獻甘膠膏餳每作大發吏以為饒利鯈知之臨薨奏焉樊梵樊梵字文高為尚書郎每當直事常晨駐馬待漏雖在間署冠劍不解于身每齋祠恐失時乃張燈俯伏為郎二十三歲未嘗被奏三署服其慎也樊準樊準字幼陵為別駕從事臨職公正不發私書世稱冰清準見當時學者少憫先王道術陵遲乃上疏曰光武皇帝受命中興之初群雄擾於冀州旌旗亂于大澤然猶投戈講學息馬論道孝明皇帝尤垂情古典遊意經藝刪定乖疑稽合圖讖封師太常桓榮為關內侯親自制作五行章句每享射禮畢正坐自講諸儒並聽四方欣欣是時學者大盛冠帶搢紳遊辟雍觀化者以億萬計為御史中丞執憲御下舉正非法官寮震栗轉尚書令明習漢家舊事周密畏慎張況張況遷涿郡太守時年八十不任兵馬上疏乞身詔許之後詔問起居何如子歆對曰如故詔曰家人居不足贍且以一縣自養以況為常山關長會赤眉攻關城況出戰死上甚哀之張歆張歆守皋長有執父仇賊自出歆召囚詣閣曰欲自受其辭既入解械飲食便發遣遂棄官亡命逢赦出由是鄉里服其高義後仕為淮陽相時王新歸國賓客放縱干亂去禁歆將令尉入宮搜捕王白上歆坐左遷為汲令卒官張禹張禹好學習歐陽尚書事太常桓榮惡衣食永平六年禹為廷尉府北曹吏處事執平為京師所稱明帝以其明達法理有張釋之風超遷非次拜廷尉徐縣北界有蒲陽陂坡水廣二十里徑且百里在道西其東有田可萬頃禹為開水門通引灌溉率吏民假與糧種禹巡行守舍止大樹下食糒乾飯屑飲水而已後年鄰國貧人來歸之者茅屋草廬千餘戶屠酤成市墾田四千餘頃得穀百萬餘斛功曹史戴閏當從行縣從書佐假車馬什物禹聞知令直符責問閏具以實對禹以宰士惶恐首實令自致徐獄和帝南巡祠廟園禹以太尉留守北宮大官朝夕送食賜毾㲪具物除子男盛為郎禹為太傅録尚書事鄧太后以殤帝初育欲令重臣居禁內乃詔禹舍宮中給帷帳床褥大官朝夕進食五日一歸府每朝見特贊與三公絶席郭況郭況為城門校尉況皇后弟貴重賓客輻輳而況恭儉謙遜尊奉法度不敢一奢為鴻臚上數幸其宅飲酒賞金帛甚盛京師號況家為金穴言富實也陰睦建武二年追尊貴人父睦為宣恩侯陰識陰識為守執金吾居位數十年對賓客語不及國家其慎重如此陰興陰興字君陵為期門僕射從上出入常操小蓋疾風暴雨屏翳左右泥塗狹隘自投車下脫袴解履涉淖至踝上欲封興置印綬于前興固讓曰臣未有先登陷陳之功而一家數人並蒙爵土令天下觖望上嘉興之讓不奪其志興盡忠竭思其無益于國雖在骨肉不以私好害公義與同郡張宗上谷鮮于褒不相好知其有用猶稱其所長而達之友人張汜杜禽與興厚善以為華而少實但私之以財終不為言是以世稱其忠平興夫人薨會葬詔使五官中郎將持節至墓賜印綬追封加諡興曰鮦陽翼侯陰傅陰傅封濦強侯七年以濦強屬西徙封于丹陽為期思侯
