body:
  text: 東觀漢記卷十六列傳十一班彪班彪避地河西大將軍竇融以為從事深相敬愛接以師友之道班固班固字孟堅年九歲能屬文詞詩賦及長遂博貫載籍九流百家之言無不窮究學無常師不為章句舉大義而已性寬和容眾不以才能高人諸儒以此慕之時人有上言班固私改作史記詔下京兆收繫固弟超詣闕上書具陳固不敢妄作但續父所記述漢事固徵詣校書除蘭臺令史遷為郎典校閟書令卒前所續史記固數入讀書禁中每行巡狩輒獻賦頌班超班超字仲升扶風平陵人徐令彪之子也為人大志不修小節然內孝謹居家常執勤苦不恥勞辱有口辯而涉獵書傳持公羊春秋多所窺覽家貧恒為官傭寫書以供養久勞苦嘗輟業投筆歎曰大丈夫無他志略猶當效傅介子張騫立功異域以取封侯安能久事筆研間乎超行詣相者相者曰祭酒布衣諸生耳而當封侯萬里之外超問其狀相者曰生燕頷虎頸飛而食肉此萬里侯相也永平中竇固擊匈奴超為假司馬將兵別擊伊吾戰於蒲類海多斬首虜固又遣與從事郭恂俱使西域鄯善王廣禮敬甚備後更疏懈超謂其官屬曰寧覺廣志意薄乎此必有匈奴使來也召侍胡詐之曰匈奴使來數日安在侍胡具服超悉會其吏士三十六人酒酣激怒曰不探虎穴不得虎子當今之計獨有因夜以火攻虜使彼不知我多少必大驚怖可殄盡鄯善破膽功成事立也眾曰善遂將吏士往奔虜營超手格殺三人斬得匈奴節使屋類帶副使比離支首及節明日乃還告郭恂恂大驚既而色動超知其意舉手曰掾雖不行班超何心獨擅之乎恂乃悅鄯善一國驚怖竇固具上超功并求更選使使西域帝壯超詔固曰吏若班超何故不遣而選乎今以超為假司馬令遂前功固欲益其兵超曰願得本所從三十餘人足以備有餘多益為重累超至西域于闐王廣德禮意甚疏其俗信巫巫言神怒何故向漢漢使有驪馬急求取以祠我廣德就超請馬超許之而令巫自來取馬有頃巫至超即斬其首送廣德因辭讓之超曰臣乘聖漢威神出萬死之志冀立鉛刀一割之用建初八年拜超為將兵長史假鼓吹幢麾超討焉耆焉耆王廣遣其左將北鞬支奉迎超賜而遣焉耆國有葦橋之險廣乃絕橋不欲令漢軍入國超更從他道渡超定西域五十餘國乃以漢中郡南鄭之西鄉戶千封超為定遠侯超自以久在絕域年老思土上疏曰臣常恐年衰奄忽僵仆不敢望到酒泉郡但願生入玉門關安息遣使獻大爵師子超遣子勇隨入塞超為都護以任尚代超尚謂超曰君在外國三十餘年而小人猥承君後宜有以誨之超曰塞外吏士本非孝子順孫皆以罪過徙補邊而蠻夷懷鳥獸之心難禁易敗今君性嚴急水清無大魚察政不得下和宜陽為簡易寬小過總大綱而已超在西域三十一歲還洛陽拜射聲校尉班始班始尚陰城公主名賢得鄭興鄭興從博士金子嚴為左氏春秋鄭眾鄭眾字仲師建武中太子及山陽王因虎賁中郎將梁松請眾欲為通籍遺練帛眾悉不受謂松曰太子儲君無外交義漢有舊防諸王不宜通客松風以長者難逆不可不慮眾曰犯禁觸罪不如守正而死廬江獻鼎有詔召眾問齊桓公之鼎在柏寢臺見何書春秋左氏有鼎事幾眾對狀除郎中永平中北匈奴遣使求和親上遣眾持節使匈奴眾素剛烈至北庭虜欲令拜眾不為屈單于大怒圍守閉之不與水火欲脅服眾眾拔刀自誓單于恐而止復遣眾使北匈奴眾因上書言臣前奉使不為匈奴拜單于恚怒放兵圍臣今臣銜命必見陵折臣恐不忍將大漢節對氈裘獨拜如令匈奴遂能服臣將有損大漢之強上不聽眾不得已既行後果為匈奴所殺范升范升遷博士每有大議輒見訪問陳元陳元上疏曰抉瑕摘釁掩其弘美光武興立左氏而桓譚衛宏並共毀訾故中道而廢桓榮桓榮字春卿沛國人也本齊桓公後桓公作伯支庶用其諡立族命氏焉榮少勤學講論不怠治歐陽尚書事九江朱文剛窮極師道貧窶無資常客傭以自給精力不倦十五年不窺園拜議郎授皇太子經每朝會輒令榮於公卿前敷奏經書帝稱善曰得卿幾晚歐陽尚書博士缺上欲用榮榮叩頭讓曰臣經術淺薄不如同門生郎中彭閎揚州從事皋弘帝曰俞往汝諧因拜榮為博士弘閎為議郎車駕幸太學會諸博士論難于前榮被服儒衣溫恭有蘊藉明經義每以禮讓相厭不以辭長勝人儒者莫之及特為加賞賜又詔諸生雅吹擊磬盡日乃罷後入會庭中詔賜奇果受者懷之榮獨舉手奉以拜帝笑指之曰此真儒生也愈見敬厚榮嘗寢病太子朝夕遣中人問疾賜以帷帳奴婢曰如有不諱無憂家室也後病愈入復侍講太子報榮書曰君慎疾加餐重愛玉體建武二十八年以榮為少傅賜以輜車乘馬榮大會諸生陳車馬印綬曰今日所蒙稽古之力也可不勉乎初榮遭倉卒困厄時嘗與族人桓元卿俱捃拾投閒輒誦詩元卿謂榮曰卿但盡氣爾當安復施用時乎榮笑而不應後榮為太常元卿來候榮榮諸弟子謂曰平生笑君盡氣今何如元卿曰我農民安能預知如此顯宗即位尊榮以師禮嘗幸太常府令榮坐東面設几杖會百官驃騎將軍東平王蒼以下榮門生數百人天子親自執業時執經生避位發難上輒謙曰太師在是既罷悉以太官供具賜太常家其恩禮如此永平二年辟雍初成拜榮為五更每大射養老禮畢上輒引榮及弟子升堂執經自為辯說詔曰五更沛國桓榮以尚書授朕十有餘年詩云日就月將示我顯德行其賜爵關內侯食邑五千戶後以五更祿終厥身子郁以明經復為太常桓郁桓榮卒子郁當襲爵讓於兄子顯宗不許不得已受封而悉以租入與之上以郁先師子有禮讓甚見親厚郁以永平十四年為議郎遷侍中上自制五家要說章句令郁校定於宣明殿上謂郁曰卿經及先師致復文雅其冬上親於辟雍自講所制五行章句已復令郁說一篇上謂郁曰我為孔子卿為子夏起予者商也又問郁曰子幾人能傳學郁曰臣子皆未能傳學孤兄子一人學方起上曰努力教之有起者即白之皇太子賜郁鞍馬刀劍郁乃上疏皇太子曰伏見太子體性自然包含今古謙謙允恭天下共見郁父子受恩無以明益夙夜慚懼誠思自竭愚以為太子上當合聖心下當卓絕於眾宜思遠慮以光朝廷永元二年西謁園陵郁兼羽林中郎將上賜馬二匹并鞍勒防汗桓焉桓焉為太子太傅以母憂自乞聽以大夫行喪踰年詔使賜牛酒奪服即拜光祿大夫遷太常桓鸞桓鸞父良龍舒侯相鸞貞亮之性著乎幼沖學覽六經莫不貫綜推財孤寡分賄友朋泰於待賢狹於養己常著大布縕袍糲食麤餐除陳留巳吾長旬月間遷河內汲令桓典桓典字公雅舉孝廉為郎中居無幾相王吉以罪被誅故人親戚莫敢至者典獨棄官收歛歸葬服喪三年負土成墳為立祠堂盡禮而去為御史是時宦者執政典無所迴避常乘驄馬京師畏憚為之語曰行行且止避驄馬御史桓礹桓礹字文林尤修志介一餐不受于人不應辟命初平中天下亂礹到吳郡刺史劉繇振給穀食衣服所乏者悉不受後東適會稽住止山陰縣故魯相鍾離意舍太守王朗餉給糧食布帛牛羊一無所留臨去之際屋中尺寸之物悉疏付主人纖微不漏移居揚州從事屈豫室中中庭橘樹一株遇實熟乃以竹藩樹四面風吹落兩實以繩繫著樹枝每當危亡之急其志彌固賓客從者皆肅其行也張佚建武二十八年大會百官詔問誰可傅太子者群臣承意皆言太子舅執金吾陰識可博士張佚正色曰今陛下立太子為陰氏乎為天下乎即為陰氏則陰侯可為天下則固宜用天下之賢才上稱善曰欲置傅者以輔太子今博士不難正朕況太子乎即拜為太子太傅桓譚桓譚字君山沛人少好學徧治五經能文有絕才而喜非毀俗儒由是多見排詆哀平間位不過郎光武即位拜議郎譚上書曰富商大賈多收田貨中家子為之保役受計上疏趨走俯伏譬若臣僕坐而分利又賈人多通侈靡之物羅紈綺繡雜綵玩好以淫人耳目而竭盡其財是為下樹奢媒而置貧本也求人之儉約富足何可得乎夫俗難卒變而人不可暴化宜抑其路使之稍自衰焉矯稱孔子為讖記以誤人主譚譏訕圖讖有詔會議靈臺所處上謂譚曰吾欲以讖決之何如譚默然良久對曰臣生不讀讖上問其故譚復極言讖之非經上大怒曰桓譚非聖無法將下斬之譚叩頭流血良久乃得解由是失旨遂不復轉遷出為六安郡丞之官意忽忽不樂道病卒時年七十餘譚著書言當世行事號曰新論光武讀之敕言卷大令皆別為上下凡二十九篇惟琴道未畢但有發首一章章帝元和中行巡狩至沛令使者祠譚冢鄉里甚榮之劉昆劉昆字桓公少治施氏易篤志經學教授弟子常五百餘人每春秋享射常備列典儀以素木刳瓠葉為俎豆為光祿勳授皇太子及諸王小侯五十人經昆老退位以二千石祿終其身劉軼劉軼字君文永平中以中庶子入侍講洼丹洼丹字子玉世傳孟氏易作通論七篇世重之號洼君通論戴憑戴憑字次仲為侍中數進見問得失上謂憑曰侍中當匡輔國政勿有隱情憑對曰陛下嚴曰朕何用嚴憑曰伏見前太尉西曹掾蔣遵清亮忠孝學通古今陛下納膚受之愬遂至禁錮世以是為嚴上怒曰汝南子欲復黨乎憑出自繫廷尉詔出引見憑謝曰臣無謇諤之節而有狂瞽之言不能以尸伏諫偷生苟活誠慚聖朝上即敕尚書解遵禁錮拜憑虎賁中郎將以侍中兼領之正旦朝賀百僚畢會上令群臣能說經者更相難詰義有不通輒奪其席以益通者憑遂重坐五十餘席故京師為之語曰解經不窮戴侍中牟長牟長字君高少篤學治歐陽尚書諸生著錄前後萬人建武十四年徵為中散大夫拜少府詔曰少府大儒不失法度其見優如此尹敏尹敏字幼季拜郎中辟大司空府上以敏博通經記令校圖讖敏對曰讖書非聖人所作其中多近鄙別字頗類世俗之辭恐疑誤後生遷長陵令永平五年詔書捕男子周慮慮素有名稱與敏善過候敏敏坐繫免官出乃歎曰瘖聾之徒真世之有道者也何謂察察而遇斯禍也敏與班彪親善每相遇與談常日旰忘食晝即至暝夜則達旦彪曰相與久語為俗人所怪然鍾子期死伯牙破琴曷為陶陶哉高詡高詡字季回以儒學徵拜大司農在朝以清白方正稱丁恭上封功臣皆為列侯大國四縣縣各有差博士丁恭等議曰古帝王封諸侯不過百里故利以建侯取法於雷強幹弱枝所以為治也今封諸侯四縣不合法制上曰古之亡國皆以無道未嘗聞功臣地多而滅亡者乃遣謁者即授印綬甄宇甄宇字長文北海人治嚴氏春秋持學精微以白衣教授常數百人建武中為青州從事徵拜博士每臘詔賜博士羊人一頭羊有大小肥瘦時博士祭酒議欲殺羊稱分其肉宇曰不可又欲投鉤宇復恥之宇因先自取其最瘦者由是不復有爭訟後召會詔問瘦羊甄博士京師因以稱之拜太子少傅清淨少欲常稱老氏知足之分也宇傳子晉晉傳子承周澤董魯平叔叔子軼並以儒學拜議郎也張玄張玄字君夏欲專意經書方其講問乃不食終日忽然如不饑渴為博士其學兼通數家李躬三老常山李躬年耆學明以二千石祿養終身蘇竟蘇竟與劉歆兄子恭書曰前世以磨研編簡之才與國右史公從事出入者惟硯也丁邯丁邯高節正直不撓舉為孝廉溫序溫序字次房為護羌校尉行部為隗囂別將苟宇所拘劫宇謂序曰子若與我并威同力天下可圖也序素有氣力大怒叱宇等曰虜何敢迫脅漢將因以節檛殺數人賊眾爭欲殺之宇止之曰此義士也可賜以劍序受劍銜鬚於口顧左右曰既為賊所迫殺無令鬚污土遂伏劍而死周嘉周嘉仕郡為主簿王莽末群賊入汝陽城嘉從太守何敞討賊敞為流矢所中賊圍繞數十重嘉乃擁敞以身扞之呵賊曰卿曹皆人隸也為賊既逆豈有還害其君者耶嘉請以死贖君命因仰天號泣群賊于是相視曰此義士也給車馬遣送之為零陵太守視事七年卒零陵頌其遺愛吏民為立祠焉劉茂劉茂字子衛為郡門下掾赤眉攻太原茂負太守孫福踰牆出藏城西門下空穴中擔穀給福及妻子百餘日福表為議郎索盧放索盧放字君陽東郡人署門下掾更始時使者督行郡國太守有事當斬放前對曰今天下苦王氏之虐政戴仰漢德傳車所過未聞恩澤而斬郡守恐天下惶懼各自疑也使有功不如使有過遂解衣而前願代太守斬使者義而赦之由是顯名朱勃朱勃字叔陽扶風平陵人年十二能誦詩書嘗候馬援兄況勃衣方領能矩步辭言嫻雅援裁知書見之自失兄知其意乃自酌酒慰援曰朱勃小器速成智盡此耳卒當從汝稟學勿畏也勃未二十右扶風請試守渭城宰及援為將軍封侯而勃位不過縣令援後雖貴常待以舊恩而卑侮之勃卒自親及援遇讒惟勃能終焉勃上書理援曰車駕討隗囂豪彊略城酋長殺吏惟獨狄道為國堅守士民饑饉煮履啖弩寄命漏刻援謀如涌泉勢如轉規救倒懸之急存幾亡之城飛鳥跱衡馬驚觸虎物類相生亦無不有章帝下詔曰告平陵令丞縣人故雲陽令朱勃建武中以伏波將軍爵土不傳上書陳狀不顧罪戾懷旌善之志有烈士之風詩云無言不讎無德不報其以縣見穀二千石賜勃子若孫勿令遠詣闕謝樊顯上嘗召見諸郡計吏問其風土及前後守令能否蜀郡計掾樊顯進曰漁陽太守張堪昔在蜀其仁以惠下威能討姦前公孫述破時珍寶山積捲握之物足富十世而堪去職之日乘折轅車布被囊而已上聞歎息以顯陳堪行有效即除漁陽令楊正楊正為京兆功曹光武崩京兆尹出西域賈胡共起帷帳設祭尹車過帳賈牽車令拜尹疑止車正在前導曰禮天子不食支庶況夷乎敕壞祭乃去崔篆崔篆涿郡安平人王莽時為郡文學以明經徵詣公車太保甄豐舉為步兵校尉篆辭曰吾聞伐國不問仁人戰陣不訪儒士此舉奚至哉遂投劾歸為建新大尹篆歎曰吾生值澆羿之君上有老母下有兄弟安得獨潔己而危所生哉乃單車到官稱疾三年不視事行縣門下掾倪敞諫篆乃強起班春所至之縣獄犴填滿篆垂涕曰嗟乎刑罰不中乃陷民於穽此皆何罪而至於是乎遂平理所出二千餘人掾吏叩頭諫曰誠仁者之心然獨為君子將有悔乎篆曰邾文公不以一人易其心君子謂之知命如殺一大尹贖二千人蓋所願也遂稱疾去崔駰竇憲為車騎將軍辟崔駰為掾憲府貴重掾屬三十人皆故刺史二千石惟駰以處士年少擢在其間憲擅權驕恣駰數諫之及出征匈奴道路愈多不法駰為主簿前後奏記數十指切長短憲不能容稍疏之因察駰高第出為長岑長駰自以遠去不得意遂不之官而歸卒於家崔瑗崔瑗愛士好賓客盛修殽膳殫極滋味不問餘產崔寔崔寔為五原太守五原土宜麻桑而民不知紡績而冬月無衣積細草而臥其中見吏則衣草而出寔至官勸種麻命工伐木作機紡車教民紡績倪萌倪萌字子明齊國臨淄人仁孝敦篤不好榮貴常勤身田農遭歲倉卒兵革並起人民餒餓相啖與兄俱出城採蔬為赤眉賊所得欲殺啖之詣賊叩頭言兄年老羸瘠不如萌肥健願代兄賊義而不啖命歸求豆來贖兄萌歸不能得豆復自縛詣賊賊遂放之古初長沙有義士古初遭父喪未葬鄰人火起及初舍棺不可移初冒火伏棺上會火滅以為孝感所致云王琳汝南王琳字巨尉十餘歲喪親遭大亂百姓奔逃惟琳兄弟獨守冢廬弟季出遇赤眉賊將為餔琳自縛請先季死賊矜而放之蔡順蔡順字君仲汝南人至孝王莽亂人相食順取桑椹赤黑異器賊問所以君仲云黑與母赤自食賊異之遺鹽二斗受而不食李業公孫述欲徵李業為博士業固不起乃遣人持鴆不起便賜藥業乃飲鴆而死逄萌逄萌字子慶北海人少有大節志意抗厲家貧給事為縣亭長尉過迎拜問事微久尉去舉拳撾地歎曰大丈夫安能為人役耶遂去學問王莽居攝子宇諫莽而莽殺之萌謂其友人曰三綱絕矣不去禍將及人解冠挂東都城門歸將家浮海客於遼東萌素明陰陽知莽將敗乃首戴齏器哭於市曰辛乎辛乎遂潛藏不見隱琅邪之勞山非禮不動聚落化之北海太守遣使奉謁萌不答太守遣吏捕之民相率以石擿吏皆流血奔走萌被徵上道迷不知東西云朝所徵我者為聰明睿智有益於政方面不知安能濟政即駕而歸王霸王霸建武初連徵不至安貧賤居茅屋蓬戶藜藿不厭然樂道不怠以壽終嚴光嚴光字子陵耕於富春山後人名其釣處為嚴陵瀨閔貢閔貢字仲叔太原人也恬靜養神勿役于物與周黨相友黨每過貢共啜菽飲水無菜茹黨嘗遺貢生蒜貢歎曰我欲省煩耳受而不食司徒侯霸辟貢到與相見勞問之不及政事貢曰始被明公辟且喜且懼及奉見明公喜懼皆去所望明公問屬何以為政美俗成化以貢為不足耶不當辟也如以為任用而不使臣之則為失人是以喜懼皆去便辭而出客居安邑老病家貧不能得錢買肉日買一片豬肝屠者或不肯為斷安邑令候之問諸子何飯食對曰但食豬肝屠者或不肯與之令出敕市吏後買輒得貢怪問其子道狀如此乃歎曰閔仲叔豈以口腹累安邑耶遂去之沛周黨周黨字伯況太原人鄉佐發黨徭道於人中辱之黨學春秋長安聞復讎之義輟講下辭歸到與鄉佐相聞期鬭日鄉佐多從兵往使鄉佐先拔刀然後與相擊鄉佐服其義勇建武中徵黨著短布單衣榖皮幓頭待見尚書欲令更服黨曰朝廷本以是故徵之安可復更遂以見自陳願守所志上聽之博士范升奏曰伏見太原周黨東海王良山陽王成使者三到乃肯就車脫衣解履升於華轂陛見帝廷偃蹇傲慢逡巡進退臣願與並論雲臺之下井丹井丹字大春通五經時人為之語曰五經紛綸井大春耿嵩耿嵩字文都鉅鹿人履清高之節齔童介然特立不隨於俗鄉黨大人莫不敬異之王莽敗賊盜起宗族在兵中穀食貴人民相食宗家數百人升合分糧時嵩年十二三宗人少長咸共推之主稟給莫不稱平
