body:
  text: 東觀漢記卷九列傳四寇恂寇恂仕郡為功曹太守耿況甚器重之更始時大司馬朱鮪在雒陽上欲南定河內難其守問鄧禹曰諸將誰可使守河內者禹曰寇恂文武備足有牧民御衆之才河內富實南迫雒陽非寇恂莫可使也上乃用之以恂為河內太守行大將軍事恂移書屬縣講兵肄射伐淇園之竹治矢百餘萬上傳聞朱鮪破河內有頃恂檄至上大喜曰吾知寇子翼可任也諸將軍賀因上尊號恂同門生董崇說恂曰上新即位四方未定而君以此時據大郡此讒人所側目怨禍之府也宜思功遂身退之計恂然其言因病不視事建武二年為潁川太守便道之官郡大生旅豆收得一萬餘斛以應給諸營執金吾賈復在汝南部將殺人恂捕得乃戮之于市復以為恥過潁川謂左右曰吾今見恂必手劍之恂知其謀不欲與相見曰昔藺相如屈于廉頗者為國也乃敕屬縣盛供具一人皆兼二人之饌恂乃出迎于道稱疾還賈復勒兵欲追之而吏士皆醉遂過去恂以狀聞上乃徵恂恂至乃見時復先在座欲起相避上曰天下未定兩虎安得私鬭恂在潁川郡中政理賊不入境徵入為金吾潁川盜賊群起車駕南征恂從至潁川盜賊悉降百姓遮道曰願從陛下復借寇君一年上乃留恂隗囂死其將高峻擁兵據高平上入關將自征之恂時從上議遣使降之上乃謂恂曰卿前止吾此舉今為吾行也若峻不即降引耿弇等諸營擊之恂奉璽書至高平峻遣軍師皇甫文謁辭禮不屈恂怒將誅文諸將諫曰高峻精兵萬人率多強弩西遮隴道連年不下今欲降之反戮其使無乃不可乎恂不應遂斬之遣其副歸告峻曰軍師無禮已戮之矣欲降則降不欲固守峻惶恐即日開城降諸將皆賀因曰敢問戮其使而降城何也恂曰皇甫文峻之腹心其所計事者也今來不屈無心降耳諸將曰非所及也岑彭岑彭亡歸宛與二師嚴尤共城守光武使吳漢收謝躬令彭助漢為方略拜為刺姦大將軍督察衆營授以所持節從平河北彭伐樹木開道直出黎丘彭以將伐蜀漢而津鄉當荊揚之咽喉乃自引兵還屯津鄉因喻告諸蠻夷諸蠻夷相率遣使貢獻于是江南之珍奇食物始流通焉彭圍隗囂于西城以縑囊盛土為隄灌西城谷水從地中數丈涌出故城不拔囂尾擊諸營彭師殿東入弘農界百姓持酒肉迎軍曰蒙將軍為後拒全子弟得生還也彭發桂陽零陵長沙委輸櫂卒凡六萬人騎五千匹皆會荊門詔彭守益州牧所下郡輒行太守事彭若出界即以太守號付後將軍選官屬守州中長吏岑起岑起元初中坐事免馮異馮異字公孫潁川人異薦邑子銚期叔壽殷建左隆等光武皆以為掾史齊武王以譖訴遇害上與衆會飲食笑語如平常異侍從親近見上獨居不御酒肉枕席有泣涕處異獨入叩頭寬解上意因間進說曰天下同苦王氏思漢久矣更始諸將縱橫虐暴所至虜掠百姓失望今專命方面施行恩德夫有桀紂之亂乃見湯武之功民人饑渴易為充飽宜急分遣屬官徇行郡縣理冤結布惠澤上納之王郎起兵上自薊東南馳晨夜草舍夜至饒陽蕪蔞亭時天寒烈衆皆饑疲異上豆粥明旦上謂諸將曰昨日得公孫豆粥饑寒俱解及至南宮聞王郎軍將至異進一笥麥飯兔肩因渡滹沱河至信都更始遣舞陰王李軼廩丘王田立大司馬朱鮪白虎公陳僑將兵三十萬共守雒陽上以異為孟津將軍屯河上上報異曰軼多詐不信人不能得其要領今移其書令朱鮪知之異擊走朱鮪追至雒陽城門環城一匝乃還上聞之大喜諸將皆賀並上奏勸上立曰帝王不可以久曠上乃召異異曰更始敗亡天下無主上曰我夢乘龍上天覺寤心中動悸異因下席再拜賀曰此天命發于精神心中動悸大王重慎之性也異遂與諸將定議上尊號建武中征賊還過陽翟詔異上冢別下潁川太守都尉及三百里內長吏皆會使大中大夫致牛酒宗族會郡縣給費遣討赤眉車駕送至河南賜以乘輿七尺玉具劍敕曰念自修整無為郡縣所笑異頓首受命西行布威信黽池霍郎陝王長湖濁惠華陰陽沈等稱將軍者皆降與赤眉遇于華陰相拒六十餘日降其將劉始王重等拜為征西大將軍與赤眉相拒上命諸將士屯黽池為赤眉所乘反走上回溪阪異復合兵追擊大破之殽底璽書勞異曰垂翅回溪奮翼黽池失之東隅收之桑榆人有上章言異威權至重專治關中百姓歸心使者宋嵩西上因以章示異上引見異誦于公卿曰是我起兵時主簿為我披荊棘定關中者也賜異璽書曰聞吏士精鋭水火不避購賞之賜必不使將軍負丹青失斷金異敕吏士非交戰受敵常行諸營之後相逢引車避之由是無爭道變鬭者異為人謙退與諸將相逢輒引車避道每止頓諸將共論功伐異常屏止樹下軍中號大樹將軍馮彰永平五年徙封彰為平鄉侯食鬱林潭中彰子普坐鬭殺游徼會赦國除朱祜朱祜朱祜字仲先少孤歸外家復陽劉氏上以祜為護軍常舍止于中祜侍燕從容曰長安兵亂公有日角之相從以觀上風采上曰召刺姦收護軍祜由是不復言以祜為建義將軍攻朱鮪祜斬張成延岑敗走收得所盜茂陵武帝廟衣印綬封祜為鬲侯邑七千三百戶祜自陳功薄而國大願受南陽五百戶足矣上不許上在長安時常與祜共車而出與共買蜜合藥後追念之乃賜祜白蜜一石問何如在長安時共買蜜乎又過祜宅祜嘗留上須講竟乃談話及登位車駕幸祜第上謂祜曰主人得無去我講乎祜曰不敢祭遵上過潁陽祭遵以縣吏數進見上愛其容儀署為門下吏從征河北為軍市令上舍中兒犯法遵格殺之上怒命收遵主簿陳副諫曰明公常欲衆軍整齊今遵奉法不避是教令行也上乃貸之以為刺姦將軍語諸將曰當備祭遵吾舍中兒犯法尚殺之必不私諸卿也為征虜將軍將兵北入箕關與弘農厭新柏華蠻中賊合戰弩矢入口洞出舉袖掩口血流袖中衆見遵傷卻退遵呵吏士吏士進戰皆一人擊十大破之遵遣護軍王忠皆持刀斧伐樹開道至略陽襲隗囂隗囂破上從長安東歸過汧幸遵營勞之士衆作黃門武樂至夜御燈火時遵有疾詔賜重茵覆以御蓋公孫述遣兵救隗囂吳漢耿弇等悉奔還遵獨留屯汧詔書曰將軍連年拒難衆兵即卻復獨按部功勞爛然兵退無宿戒糧食不豫具今乃調度恐力不堪國家知將軍不易亦不遺力今送縑千匹以賜吏士遵奉公賞賜與士卒家無私財身衣布衣韋袴臥布被終身夫人裳不加綵士以此重之遵病薨喪至河南縣詔遣百官皆至喪所上車駕素服往弔望城門舉音遂哭而慟還幸城門閲過喪車瞻望涕泣上親臨祠以太牢儀如孝宣帝臨霍將軍故事時下宣帝臨霍將軍儀令公卿讀視以為故事博士范升上疏曰遵為將軍取士皆用儒術對酒娛樂必雅歌投壺又建為孔子立後奏置五經大夫雖在軍旅心存王室不忘俎豆可謂守死善道者也乃贈將軍給侯印綬上遣校尉發騎士四百人被玄甲兜鍪兵車軍陳送遵葬遵廉潔奉公死後每至朝會上數嗟歎曰安得憂國奉公之臣如祭征虜者乎衛尉銚期見上感慟對曰陛下至仁哀念祭遵不已群臣各懷慚懼也遵無子國除祭彤祭彤字次孫膂力過人力貫三百斤弓為襄賁令是時盜賊尚未悉平而襄賁清靜詔書增秩一等賜縑百匹策書勉勵拜遼東太守至則厲兵馬遠斥候虜每犯塞常為士卒先鋒數破之彤之威聲揚于北方諸夷皆來內附野無風塵乃悉罷緣邊屯兵鮮卑奉馬一匹貂裘二領彤素清約為遼東太守三十年衣無副儲顯宗嘉其功賜錢百萬及衣冠刀劍下至杯案食物大小重疊入為太僕從至魯過孔子講堂上指子路曰此太僕室也太僕吾之禦侮及彤卒烏桓鮮卑追思無已每朝京師過彤冢拜謁仰天號泣乃去祭參鮮卑千餘騎攻肥如城殺略吏人祭參坐沮敗下獄誅景丹王莽時舉有德行能言語通政事明文學之士景丹因以言語為固德侯相丹率衆至廣阿上聞外有大兵來上自登城勒兵在西門樓上問何等兵丹等對曰上谷漁陽兵上曰為誰來乎對曰為劉公即請丹入上設酒肉人人勞勉恩意甚備建武二年定封丹櫟陽侯上謂丹曰今關東故王國雖數縣不過櫟陽萬戶邑富貴不歸故鄉如衣繡夜行故以封卿耳丹從上至懷病瘧見上在前瘧發寒栗上笑曰聞壯士不病瘧今漢大將軍反病瘧耶使小黃門扶起賜醫藥還歸雒陽病遂加拜弘農太守上以其舊將欲令強起領郡事乃夜召入謂曰弘農逼近京師知將軍病但得將軍威重臥以鎮之足矣蓋延蓋延字巨卿漁陽要陽人身長八尺彎弓三百斤以氣勢聞為幽州從事光武以延為虎牙將軍圍劉永于睢陽夜梯其城入永驚懼走出魚門延追擊大破之斬其魯郡太守梁丘壽沛郡太守陳修永軍反走溺水者半後與戰連破之遂平沛楚臨淮悉降延令沛修高祖廟置嗇夫祝宰樂人因齊戒祠高祖廟延上疏辭曰臣幸得受干戈誅逆虜奉職未稱久留天誅常恐污辱名號不及等倫天下平定以後曾無尺寸可數不能預竹帛之編明詔深閔警戒備具每事奉循詔命必不敢為國之憂也龐萌攻延延與戰破之詔書勞延曰龐萌一夜反畔相去不遠營壁不堅殆令人齒欲相擊而將軍聞之夜告臨淮楚國有不可動之節吾甚美之夜聞急少能若是永初七年詔封延曾孫為盧亭侯銚期銚期字次況為光武賊曹掾從平河北上至薊薊中應王郎上驚去吏民遮道不得行期瞋目道左右大呼曰蹕大衆披辟鄧禹發房子兵二千人以期為偏將軍別攻真定宋子餘賊拔樂陽槀肥纍者也從擊王郎將兒宏劉奉于巨鹿下期先登陷陳手殺五十餘人創中額攝幘復戰遂大破之後勸上即位上笑曰卿欲遂蹕耶期疾病使使者存問加賜醫藥甚厚其母問期當封何子期言受國家恩深常慚負如死不知當何以報國何宜封子也上甚憐之
