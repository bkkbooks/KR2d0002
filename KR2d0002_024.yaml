body:
  text: 東觀漢記卷二十四佚文元始元年拜王舜為太保丁明代傅喜為大司馬亦任事頗害賢寵及丞相王嘉死明甚憐之上寖重賢欲極其位而恨明如此遂策免明上印綬還第詔曰三輔皆好彈一大老從旁舉身曰噫唏哉後漢有南宮北宮承光宮也霍光薨賜繡被百領元年營造明堂靈臺辟雍此即明三事不同也漢有沛宮甘泉宮龍泉宮太一宮思子宮後漢有胡桃宮栗駭蓬轉因遇際會太史曰忠臣畢力詔曰吏安其職民樂其業北裔寇作無雞鳴犬吠之聲千里無煙火使先登偵之言虜欲去詔書令功臣家自記功狀不得自增加以變時事或自道先祖形貌表相無益事實復曰齒長一寸龍顏虎口奇毛異骨形容極變亦非詔書之所知也揚雄好著書而口吃不能劇談主不稽古無以承天喜右學允恭玄默保樂洽壽四方樂業吏民歡悅問三老鴻胤奉統賜及妻子特賜御賜食於前賜所乘驪馬感念沾襟配乾作合龜筮並從內攝時政外懷狄戎婉嫟慈孝內無忌克之心不以舊惡介意以匡主上弘策授親有母儀之節婉順慈孝體性慈躬執饋饌親奉定省不避暑寒不親醫泣流離哭聲不絶飲不入口敬養盡於奉存哀慎刑疏食骨立素食竟期年白首未嘗不愴然泣涕由禮動與禮合少而明達聰睿天資周密畏慎原事得情時有所問對無遺失有所不安明陳其故謙讓日崇膳不求珍論寢徹旦戟士收尚書未曾私語無令干亂吏治外戚戰栗百寮肅然聽言視論摘發其要甲夜占書丁夜盡筆賜金蓋車容儀照曜絶異令色卓絶傾亂徙居雲臺止行過肅名趙李時銓不卒陳義子問以舊事少好黃老常步擔求師也易於泰山之壓雞卵輕於駟馬之載鴻毛大恩許皇后父廣漢為宦者丞上官桀謀反時廣漢部索其殿中廬有索長數尺可以縛人者數千枚滿一篋緘封廣漢索不得他吏往得之廣漢坐論為鬼薪輸掖庭後為暴室嗇夫蟻封穴戶大雨將至孝明皇帝九子七王不載母氏建武光武年號也永平孝明年號也和帝年號永初西巡幸長安司馬相如上疏曰夫清道而後行猶時有銜橛之變耕或為研北虜遣使和親岸賓上議二千石皆以選出刻符典千里太尉張酺鄭洪徐防趙喜隨延寵桓並以日蝕免侍御史東平相格班終利恭雖誇譀猶令人熱凡歷所革以變律呂相生至六十也前漢志但載十二律不及六十凡陽生陰曰下陰生陽曰上候鍾律權土炭冬至陽氣應黃鍾通土炭輕而衡仰夏至陰氣應蕤賓通土炭重而衡低進退先後五日之中玉衡長八尺孔徑一寸下端望之以視星宿並縣璣以象天而以衡望之轉璣窺衡以知星宿璣徑八尺圓二尺五寸而強言天體者有三家一曰周髀二曰宣夜三曰渾天宣夜之學絶無師法周髀數術具存考驗天狀多所違失故史官不用唯渾天者近得其情今史官所用候臺銅儀則其法也立八尺圓體之度而具天地之象以正黃道以察發斂以行日月以步五緯精微深妙萬世不易之道也官有其器而無本書前志亦闕而不論臣求其舊文連年不得在東觀以治律未竟未及成書案略求索竊不自量卒欲寢伏儀下思惟精意案度成數扶以文義潤以道術著成篇章罪惡無狀投畀有北灰滅雨絶世路無由宜博問群臣下及巖穴知渾天之意者使述其義以裨天文志撰建武以來星變彗孛占驗著明者續其後宗廟迭毀議奏國家大體班固録漢書乃置韋賢傳末臣以問胡廣廣以為實宜在郊祀志去中鬼神仙道之語取賢傳宗廟事置其中既合孝明旨又使祀事以類相從孝明立世祖廟以明再受命祖有功之義後嗣遵儉不復改立皆藏主其中聖明所制一王之法也自執事之吏下至學士莫能知其所以兩廟之意誠宜具録本事建武乙未元和丙寅詔書下宗廟儀及齋令宜入效祀志永為典式國家舊章而幽僻藏蔽莫之得見永平初詔書下車服制度中宮皇太子親服重繒厚練浣已復御率下以儉化起機諸侯王以下至于士庶嫁娶被服各有秩品當傳萬世揚光聖德臣以為宜集舊事儀注本奏以成志也俗人失其名故名冕為平天冠五時副車曰五帝鸞旗曰雞翹耕根曰三蓋旗皆非一
