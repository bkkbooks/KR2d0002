body:
  text: 東觀漢記卷十列傳五耿純耿純字伯山巨鹿人于邯鄲見上遂自結納獻馬及縑帛數百匹王郎舉尊號欲收純純持節與從吏夜遁出城駐節道中詔取行者車馬得數十馳歸宋子光武自薊東南馳純與從昆弟欣宿植共率宗族賓客二千餘人皆衣縑襜褕絳巾奉迎詣上所在廬奴言王郎所反之狀上拜純為前將軍封耿鄉侯時郡國多降邯鄲純兄歸燒宗家廬舍上以問純純曰恐宗人賓客卒有不同故焚燒廬舍絶其反顧之望上大笑純請治一郡盡力自效上笑曰卿乃欲以治民自效乃拜純為東郡太守後坐事免上過東郡數千人號呼涕泣云願復得耿君上復以純為東郡太守臧宮臧宮字君翁為輔威將軍將兵擊諸郡至中盧屯駱越是時公孫述將田戎任滿與漢軍相拒于荊門諸將戰數不利越人謀欲叛漢附蜀宮兵少不足以制也會屬縣送委輸牛車三百餘兩至宮夜使鋸斷城門限令委輸車回轉出入隆隆至明越人伺候者聞車聲不絶而門限斷以漢兵大來乃奉牛酒勞軍由是遂安以城門校尉轉左中郎將征武陵蠻馬武建武六年馬武與衆將上隴擊隗囂身被兜鍪鎧甲持戟奔擊殺數十人囂追兵盡還武中矢傷劉隆建武二十年左中郎將劉隆為驃騎將軍即日行大將軍事馬成馬成為郟令上征河北成羸衣步擔渡河詣上成善治障塞自西河至渭橋河上至安邑太原至井陘中山至鄴皆築堡壁起烽燧十里一候王梁光武拜王梁為大司空以武強為侯國梁為中郎將與景丹祭遵合擊蠻中破之詔梁別守天中關陳俊陳俊初調補曲陽長上曰欲與君為左右小縣何足貪乎俊即拜解印綬上以為安集掾建武二年俊攻匡城賊下四縣上賜俊絳衣三百領以衣中堅同心之士也陳浮二十三年詔以祝阿益濟南國故徙浮封蘄春侯傅俊傅俊從上迎擊王尋等于陽關漢兵反走還汝水上上以手飲水澡盥鬚眉塵垢謂俊曰今日罷倦甚諸卿寧憊耶堅鐔堅鐔字子皮光武以鐔為揚化將軍鐔獨孤絶南拒鄧奉北當董欣一年間道路隔塞糧饋不至食蔬菜與士卒共勞苦王霸王霸祖父為詔獄丞上為大司馬霸為功曹令史從渡河北賓客隨者數十人稍稍引去上謂霸曰潁川從我者皆逝而子獨留始驗疾風知徑草王郎起上在薊郎移檄購上上令霸至市中募人將以擊郎市人皆大笑舉手揶揄之霸慚而去上從邯鄲避郎兵晨夜馳馬傳聞軍在後士吏惶恐南至下曲陽滹沱河導吏言河水流澌無船不可渡左右皆惶畏為郎所及上令霸前瞻水霸欲如實還報恐驚官屬雖不可渡且臨水止尚可為阻郎白曰冰堅可渡衆大喜上大笑曰果妄言也遂前比至冰合可渡上令霸護渡馬欲僵各以囊盛沙布冰上乃渡渡未畢數車而冰陷上謂霸曰安吾衆能濟者卿力也謂官屬曰王霸從我勞苦前遇冰變權時以安吏士是天瑞也為善不賞無以勸後即日以霸為軍正賜爵關內侯劉文及蘇茂臣于劉永上遣霸討之霸至遂閉門堅守勞賜吏士作倡樂賊衆歡呼雨射營中中霸前酒樽霸安坐不動為上谷太守修飛狐道至平城堆石布土三百餘里任光任光字伯卿初為鄉嗇夫漢兵攻宛軍人見光衣冠服鮮明令解衣將斬而奪之會光祿勳劉賜適至視光容貌長者乃救全之光武平河北光暮入堂陽使騎皆炬火天地赫然盡赤堂陽驚怖即夜降任隗任隗字仲和從羽林監遷虎賁中郎將建武元年始置將作大匠自隗始隗拜司空永元初外戚秉權朝臣畏悚莫敢抗者惟隗與袁安同心畢力數犯顏諫李忠李忠字仲都父為高密中尉忠發兵奉世祖為右將軍封武固侯時無綬上自解所佩綬以賜之上初至不脫衣帶衣服垢薄使忠解浣長襦忠更作新袍袴鮮支小單衣襪而上之上會諸將問破賊所得物惟忠獨無所掠上曰我欲賜之諸君得無望乎即以所乘大驪馬及繡被衣物賜之王郎遣將攻信都信都大姓馬寵等開城內之收太守宗廣及忠母妻子皆繫獄而令親屬招呼忠時寵弟從忠為校尉忠即時召見責數以背恩反城因格殺之諸將皆驚曰家屬在人手中殺其弟何猛也忠曰若縱賊不誅則二心也上聞而美之謂忠曰今吾兵已成也將軍可歸救老母妻子忠曰蒙明公大恩思得效命誠不敢內顧宗親忠病濕痺免李純永平二年坐純母禮殺威弟季邳彤邳彤字偉君信都人也初王莽分巨鹿為和成郡居下曲陽以彤為卒正更始即位上以大司馬平河北至曲陽彤舉城降為後大將軍信都反為王郎所置信都王捕繫彤父弟及妻子使為手書呼彤曰降者封爵不降者滅族彤泣報曰事君者不得顧家彤親所以至今日得安于信都者劉公之恩公事方爭國不得復念私也劉植光武以劉植為驍騎將軍攻中山封昌城侯孫述坐與楚謀反國除劉歆劉歆字細君劉嘉劉嘉字共仲建武四年以嘉為驍騎將軍攻涿郡王常王常其先鄠人父博成哀間轉客潁川舞陽因家焉光武于大會中指常謂群臣曰此家率下江諸將輔翼漢室心如金石真忠臣也是日遷漢忠將軍為橫野大將軍位次與諸將絶席封山桑侯孫廣坐楚事國除李通齊武王嘗殺通同母弟申屠臣上恐其怨不欲與軼相見軼數請上乃強見之軼深達通意上乃許往意不安買半臿佩刀懷之至通舍通甚歡握上手得半臿刀謂上曰一何武也上曰倉卒時以備不虞耳王莽前隊大夫誅謀反者通聞事發覺被馬欲出馬駕在轅中惶遽著鞍上馬出門顧見車方自覺乃止通娶寧平公主為大司空性謙恭常避權勢謝病不視事上司空印綬以特進奉朝請久之有司請封諸皇子上感通首創大謀封通少子雄為邵陵侯每幸南陽常遣使以太牢祠通父冢竇融河西太守竇融遣使獻橐駝令弟友詣闕道絶馳還遣司馬虞封間行通書光武詔封融曰行河西五郡大將軍涼州牧張掖屬國都尉竇融執志忠孝扶微救危仇疾反虜隗囂率厲五郡精兵羌胡畢集兵不血刃而虜土崩瓦解功既大矣篤意分明斷之不疑吾甚嘉之其以安豐陽泉蓼安風凡四縣封融為安豐侯融光武時數辭爵位不欲傳子不許因上疏曰臣融年五十三有一子年十五質性頑鈍臣融朝夕教導以經藝不得令觀天文見讖記誠欲令恭肅畏事恂恂循道不願其有才能何況乃當傳以連城廣土享侯國哉他日會見迎詔融曰公欲讓職還土今相見不宜論也融嗣子穆尚內黃公主而融弟顯親侯友嗣子固尚沮陽公主穆長子勳尚東海公主女竇氏一主兩侯三公主四二千石自祖至孫官府廄第相望奴婢千數雖親戚功臣莫與為比竇固竇固字孟孫少為黃門郎謙讓有節操中元元年以固為中郎將監羽林左騎為奉車都尉與駙馬都尉耿秉北征胸奴遂滅西域開通三十六國在邊數年羌胡親愛之羌胡見客炙肉未熟人人長跪前割之血流指間進之于固固輒為啖不穢賤之是以愛之如父母也破西羌還為衛尉奉兩宮宿衛而見重當世恭謹下士賑施宗族甚有名稱竇憲竇憲恃宮掖聲勢遂以賤直奪沁水公主園田公主不敢訴後肅宗駕出過園指以問憲憲陰喝不得對發覺帝大怒召憲切責曰今貴主尚見枉奪何況小民乎章帝崩竇太后臨政憲為大將軍弟景執金吾瓌將作大匠光祿勳大將軍置長史司馬員吏官屬位次太傅封武陽侯食邑二萬戶憲固辭封詔曰大將軍憲前歲出征克滅北狄朝加封賞固辭不受舅氏舊典並蒙爵土其封憲冠軍侯邑二萬戶憲以特進見禮依三公並未開封竇章竇章時謂東觀為老氏藏室卓茂卓茂字子康南陽人也為丞相史嘗出道中有人認茂馬者茂問失馬幾日對曰月餘矣茂曰然此馬已畜數年遂解馬與之曰即非所失幸至丞相府還我乃步挽車去後日馬主自得其馬慚愧詣府叩頭謝歸焉茂為密令河南郡為置守令與茂並居久之吏人不歸往守令茂視民如子口無惡言吏民親愛而不忍欺之民嘗有言部亭長受其米肉遺者茂問之曰亭長從汝求乎為汝有事屬之而受乎將平居以恩意遺之乎民曰往遺之耳茂曰遺之而受何故言耶民曰竊聞賢聖之君使民不畏吏吏不取民今我畏吏是以遺之茂曰凡人所以貴于禽獸者以有仁愛知相敬事也亭長素為善吏歲時遺之禮也今鄰里尚致餽此乃相親況吏民乎凡人之生群居雜處故有經紀禮儀以相交接汝獨不欲修之寧能高飛遠去不在人間耶民曰苟如此律何故禁之茂笑曰律設大法禮從人情今我以禮教汝必無怨惡以律治汝何所措其手足乎時天下大蝗河南二十餘縣皆被其災獨不入密界督郵言之太守不信自出案行見乃服焉光武即位先訪求茂茂時年七十餘矣詔封茂宣德侯以茂為太傅賜几杖安車一乘茂為人恬蕩樂道推實不為華貌束身執節行己在于清濁之間自束髮至白首與人未嘗有爭競
