body:
  text: 東觀漢記卷十五列傳十丁綝丁綝字幼春定陵人也伉健有武略從上渡河拜河南太守及封功臣上令各言所樂謂綝曰諸將皆欲縣子獨求鄉何也綝曰昔孫叔敖敕其子受封必求磽确之地今綝能薄功微得鄉亭厚矣上從之封為定陵新安鄉侯食五千戶後徙封陵陽侯丁鴻丁鴻字孝公年十三從桓榮受歐陽尚書三年而明章句善論難為都講遂篤志精銳布衣荷擔不遠千里父綝從征伐鴻獨與弟盛居憐盛幼小而共寒苦及綝卒鴻當襲封上書讓國於盛書不報既葬乃挂衰絰於冢廬而去留書與盛曰鴻貪經書不顧恩義弱而隨師生不供養死不飯唅皇天祖禰並不佑助身被大病不任茅土前上疾狀願辭爵章不報迫於當封謹自放棄鴻初與九江人鮑駿同事桓榮甚相友善及鴻亡駿遇於東海陽狂不識駿駿乃止而讓之曰今子以兄弟私恩而絕父不滅之基可謂智乎鴻感愴垂涕歎息乃還就國兼射聲校尉肅宗詔鴻與太常樓望少府成封屯騎校尉桓郁衛士令賈逵等集議五經同異於白虎觀使五官中郎將魏應主承制問難侍中淳于恭奏上上親稱制臨決上嗟歎鴻才號之曰殿中無雙丁孝公賜錢二十萬元和二年車駕東巡狩鴻以少府從上奏曰臣聞古之帝王統治天下五載巡狩至於岱宗柴祭於天望秩山川恊時月正日同斗斛權衡使人不爭陛下尊履蒸蒸奉承弘業祀五帝於明堂配以光武二祖四宗咸有告祀瞻望太山嘉澤降澍柴祭之日白氣上升與燎烟合黃鵠群翔所謂神人以和答響之休符也上善焉三年以廬江郡為六安國徙封鴻為馬亭侯日食鴻為司徒上疏曰臣聞春秋日食三十六而弒君三十六變不空生夫帝王不宜以重器假人觀古及漢傾危之禍靡不由世位擅寵之家伏見大將軍刺史二千石初除謁辭求通待報雖奉璽書受臺敕不敢去至數十日背公室向私門此乃上威損下權盛外附之臣依託權門諂諛以求容媚宜誅之永元四年兼衛尉鴻薨子湛嗣湛卒子浮嗣浮卒子夔嗣宣秉宣秉建武元年拜御史中丞上特詔御史中丞與司隸校尉尚書令會同並專席而坐故京師號曰三獨坐宣彪宣彪官至玄菟太守王丹王丹字仲回京兆人也資性清白疾惡豪強每歲農時載酒肴便於田頭大樹下飲食勸勉之因留其餘酒肴而去閭里有喪憂輒度其資用教之儉約因為其制日定葬其親喪不過留殯一月其下以輕重為差焉時河南太守同郡陳遵關西之大俠也其友人喪親遵為護喪事賻助甚厚丹乃懷縑一匹陳之於主人前曰如丹此縑出自機杼遵聞而有慚色更始時遵為大司馬護軍出使匈奴過辭於丹丹曰俱遭時反覆惟我二人為天地所遺今子當之絕域無以相贈贈子以不拜遂揖而別遵甚悅之鄧禹平三輔糧乏丹上麥二千斛禹高其節義表丹領左馮翊司徒侯霸欲與丹定交丹被徵霸遣子昱候昱道遇丹拜於車下丹答之昱曰家君欲與君投分何以拜子孫耶丹曰君房有是言王丹未許之丹子有同門生喪親家在中山白丹欲往奔慰結侶將行丹怒而撻之令寄縑以祠焉或問其故丹曰交道之難未易言也初有薦士於丹者丹選舉之而後所舉者陷罪丹坐免客慚自絕俄而丹復徵為太子太傅乃呼客見之謂曰何量丹之薄不為設席食以罰之相待如舊王良王良字仲子東海人少清高為大司徒司直在位恭儉妻子不之官舍布被瓦器時司徒吏鮑恢以事到東海過候其家而良妻布裙徒跣曳柴從田中歸恢曰我司徒吏故來受書欲見夫人妻曰妾是也恢乃下拜歎息而還良以疾歸一歲復徵至滎陽疾篤不任進道乃過其友人友人不肯見曰不有忠言奇謀而取大位何其往來屑屑不憚煩也遂拒之良慚自後連徵輒稱疾申屠剛申屠剛字巨卿扶風人性剛直中正志節抗厲常慕史鰌汲黯之為人涉獵書記果於行義元始中舉賢良對策昔周公豫防禍首先遣伯禽守封於魯離斷至親以義割恩使己尊寵不加其後言甚切直建武初徵拜侍御史遷尚書令謇謇多直言無所屈撓時隴蜀未平上嘗欲近出剛諫上不聽剛以頭軔乘輿車輪馬不得前郅惲郅惲字君章汝南人也上書諫王莽令就臣位莽大怒即收繫惲難即害之使黃門脅導惲令為狂疾恍惚不自知所言惲曰所言皆天文非狂人所造作惲與董子張友子張父及叔父為鄉里盛氏一時所害子張病將終惲往候之子張視惲歔欷不能言惲曰吾知子不悲天命長短而痛二父讎不復也子張但目擊而已惲即將客遮讎人取其頭以示子張子張見而氣絕惲見令以狀首令應之遲趨出就獄令跣追之不及即自入獄謝之拔刀自嚮以要惲曰子不從我出敢不以死明心乎惲遂出汝南太守歐陽歙召惲為功曹汝南舊俗十月饗會百里內皆齎牛酒到府飲讌時臨饗禮畢歙教曰西部督郵繇延天資忠貞不嚴而治今與眾儒共論延功顯之於朝惲於下座愀然前曰案延資性貪邪外方內員朋黨搆姦罔上害民明府以惡為善以直從曲此既無君又復無臣惲敢奉觥歙色慚不知所為門下掾鄭敬進曰君明臣直功曹言切明府德也歙意少解曰實歙罪也鄭次都隱于弋陽山中惲即去從次都止漁釣甚娛留數十日惲喟然嘆曰天生俊士以為民也鳥獸不可與同群子從我為伊尹乎將為許巢而去堯舜也次都曰吾年耄矣安能從子子勉正性命勿勞神以害生告別而去惲客於江夏郡舉孝廉為郎為上東門候光武嘗出夜還詔開門欲入惲不納上令從門間識面惲曰火明燎遠遂拒不開明日惲上書曰昔文王不敢盤於遊田以萬民為憂而陛下遠獵山林以夜繼晝其如社稷宗廟何誠小臣所竊憂也由是上特重之惲為長沙太守坐前守張禁多受遺送千萬以惲不推劾故左遷芒長芒守丞韓龔受大盜丁仲錢阿擁之加笞八百不死入見惲稱仲健惲怒以所杖鐵杖捶龔龔出怨懟遂殺仲惲故坐免郭伋郭伋字細侯河南人也拜潁川太守召見辭謁帝勞之曰郡得賢能太守去帝城不遠河潤九里冀京師並蒙其福也為并州牧前在州素有恩德老小相攜逢迎道路始至行部到西河美稷有童兒數百各騎竹馬於道次迎拜伋問兒曹何自遠來對曰聞使君始到喜故奉迎伋辭謝之事訖諸兒送出郭外問使君何日當還伋使別駕從事計日告之行部既還先期一日伋謂違信於諸兒遂止於野亭須期乃入伋知盧芳夙賊難卒以力制常嚴烽候明購賞以結寇心杜詩杜詩字君公建武元年為侍御史安集雒陽時將軍蕭廣放縱兵士猝暴民間詩敕曉不改遂格殺廣還以狀聞上召見賜以棨戟復使之河東誅降逆賊楊異等為南陽太守性節儉而治清平以誅暴立威信善於計略省愛民役造作水排鑄為農器用力省見功多時人方於召信臣故南陽人為之語前有召父後有杜母坐遣客為弟報讎被徵會病卒喪無所歸詔使治喪郡國邸賻絹七千匹孔奮孔奮字君魚右扶風茂陵人竇融請奮署議曹掾守姑臧長奮素孝供養至謹時天下擾亂惟河西獨安而姑臧稱為富邑通貨故羌市日四合每居縣者不盈數月輒致豐積奮在姑臧四年財物不增惟老母極膳妻子但菜食或嘲奮曰直脂膏中亦不能自潤而奮不改其操詔書以奮在姑臧治有絕迹賜爵關內侯為武都丞妻時在郡為隗囂餘黨所攻殺太守得奮妻子奮追賊賊推奮之子于軍前奮年五十惟有一子不顧遂擒賊而其子見屠帝嘉其忠遷武都太守奮篤於骨肉弟奇在雒陽為諸生分俸祿以供給其糧用四時送衣下至脂燭每有所食甘美輒分減以遺奇張堪張堪字君游年六歲受業長安治梁丘易才美而高京師號曰聖童堪守蜀郡公孫述遣擊之堪有同心之士三千人相謂曰張君養我曹為今日也乃選擇水軍三百人斬竹為箄渡水遂免難堪與吳漢并力討公孫述遂破蜀漢先遣堪入成都鎮撫吏民時述珍寶珠玉委積無數堪錄簿上官秋毫無取堪去蜀郡乘折轅車白布被囊為漁陽太守有惠政開治稻田八千餘頃教民種作百姓以殷富童謠歌曰桑無附枝麥穗兩岐張君為政樂不可支視事八年匈奴不敢犯塞光武詔曰平陽城李善稱故令范遷於張堪令人面熱出汗其賜堪家新繒百匹以表廉吏衛颯衛颯為桂陽太守鑿山通路列亭置驛視事十年徵還颯到即引見賜食於前從吏二人賜冠幘錢人五千茨充茨充字子河宛人也初舉孝廉之京師同侶馬死充到前亭輒舍車持馬還相迎鄉里號之曰一馬兩車茨子河充為桂陽太守俗不種桑無蠶織絲麻之利類皆以麻枲頭縕著衣民惰窳少麤履盛冬皆以火燎足多剖裂充令屬縣教民益種桑柘養蠶桑織履復令種紵麻數年之間人賴其利衣履溫煖元和中荊州刺史上言臣行部入長沙界觀者皆徒跣臣問御佐曰人無履亦苦之否御佐對曰十二月盛寒時並多剖裂血出然火燎之春溫或膿潰建武中桂陽太守茨充教人種桑蠶人得其利至今江南頗知桑蠶織履皆充之化也任延任延字長孫南陽宛人更始拜為會稽西部都尉時年十九迎吏見其少皆驚及到澹泊無為下車遣吏以中牢具祠延陵季子時天下新定道路未通避亂江南者皆未還中土會稽頗稱多士延到皆禮之乃聘請高行俊乂如董子儀嚴子陵等敬待以師友之禮掾吏貧者輒分俸祿以賑給之省諸卒令耕公田以周窮急每時行縣輒使慰勉孝子就餐飯之崇禮養善如此建武初延上書言臣贊拜不由王庭願收骸骨詔書徵延民攀持車轂涕泣除睢陽令每至歲時伏臘延輒休遣繫囚徒各使歸家並感其恩德應期而還有囚於家被病自載詣獄既至而死延率掾吏殯於門外百姓悅之為武威太守河西舊少雨澤延乃為置水官吏修理溝渠皆蒙其利益董宣董宣為洛陽令擊搏豪彊在縣五年年七十四卒官詔遣使者臨視惟布被覆尸妻子對哭家無餘財上歎曰董宣死乃知貧耳樊曄樊曄字仲華曄與世祖有舊世祖嘗於新野坐文書事被拘時曄為市吏饋餌一笥上德之建武初拜為河東都尉臨發之官引見雲臺賜御食衣被上調曄曰一笥餌得都尉何如曄頓首曰小臣蒙恩特見拔擢陛下不忘往舊臣得竭死自效曄為天水郡其政嚴猛好申韓之術不假下以權道路不敢相盜人有犯其禁者率不生出獄吏人及羌胡畏之道不拾遺行旅至夜聚衣裝道旁曰以付樊公後還其物如故涼州為之歌曰寧見乳虎穴不入冀府寺大笑期必死忿怒或見置嗟我樊府君安可再遭值李章李章為千乘太守坐誅斬盜賊過濫徵下獄免馮駿長沙中尉馮駿將兵詣岑彭璽書拜駿為威虜將軍鄧讓鄧讓夫人光烈皇后姊也
