body:
  text: 東觀漢記卷二十二列傳十七列女外裔鮑宣妻鮑宣之妻桓氏女也字少君宣嘗就少君父學父奇其清苦以女妻之裝送甚盛宣不悅謂妻曰少君生而驕富習美飾而吾貧賤不敢當禮妻曰大人以先生修德守約故使賤妾侍執巾櫛既奉君子惟命是從妻乃悉歸侍御服飾更著短布裳與宣共挽鹿車歸鄉里拜姑禮畢提甕出汲修行婦道鄉邦稱之江伯姊山陽郡人江伯欲嫁姊姊引鎌欲自割胸奴南單于單于比胸奴頭曼十八代孫十二月癸丑胸奴始分為南北單于單于歲祭三龍祠走馬鬭橐駝以為樂事建武二十六年南單于遣使獻駱駝二頭文馬十匹南單于來朝賜御食及橙橘龍眼荔枝南單于上書獻橐駝賜谷蠡王玉具劍羽蓋車一駟中郎將持節衛護焉上遣單于饗賜作樂百戲上幸離宮臨觀莋都夷遠夷樂德歌詩曰夷語提官傀搆華言大漢是治夷語魏冒踰糟華言與天意合夷語罔驛劉脾華言吏譯平端夷語旁莫支留華言不從我來夷語徵衣隨旅華言聞風向化夷語知唐桑艾華言所見奇異夷語邪毗𦂼補華言多賜繒布夷語推潭僕遠華言甘美酒食夷語拓拒蘇便華言昌樂肉飛夷語局後仍離華言屈申悉備夷語僂讓龍洞華言蠻夷貧薄夷語莫支度由華言無所報嗣夷語陽雒僧麟華言願主長壽夷語莫稚角存華言子孫昌熾遠夷慕德歌詩曰夷語僂讓皮尼華言蠻夷所處夷語且交陵悟華言日入之部夷語繩動隨旅華言慕義向化夷語路且揀雒華言歸日出主夷語聖德渡諾華言聖德深恩夷語魏菌度洗華言與人富厚夷語綜邪流藩華言冬多霜雪夷語莋邪尋螺華言夏多和雨夷語藐潯瀘灕華言寒溫時適夷語菌補邪推華言部人多有夷語辟危歸險華言涉危歷險夷語莫受萬柳華言不遠萬里夷語術疊附德華言去俗歸德夷語仍路孳摸華言心歸慈母遠夷懷德歌詩曰夷語荒服之儀華言荒服之外夷語犂籍憐憐華言土地墝埆夷語阻蘇邪犂華言食肉衣皮夷語莫碭粗沐華言不見鹽穀夷語罔譯傳微華言吏譯傳風夷語是漢夜拒華言大漢安樂夷語蹤優路仁華言攜負歸仁夷語雷折險龍華言觸冒險狹夷語倫狼藏幢華言高山岐峻夷語扶路側祿華言緣崖磻石夷語息落服淫華言木薄發家夷語理瀝髭雒華言百宿到雒夷語捕𦶜菌毗華言父子同賜夷語懷稿匹漏華言懷抱匹帛夷語傳室呼敕華言傳告種人夷語陵陽臣僕華言長願臣僕西羌西羌祖爰劍為秦所奴隸而亡藏巖穴中見焚有影象如虎為蔽火得不死諸羌以為神推以為豪護羌竇林奉使羌顛岸降詣林林欲以為功效奏言大豪後顛岸兄顛吾復詣林林言其第一豪問事狀林對前後兩屈林以誣罔詣獄上不忍誅免官後涼州刺史奏林贓罪復收繫羽林監遂死獄中羌什長鞏便金城隴西卑湳勒姐種羌反出塞外西域永元二年安息王獻條支大雀此雀卵大如甕
