  - {type: variant, offset: 1533, length: 0, content: '', WYG: 案范書本傳初王莽簒位長安中或自稱成帝子子輿者莾殺之郎緣是詐稱真子輿云母故成帝謳者嘗下殿卒僵須臾有黄氣從上下半日乃解遂􅗖身就館趙后欲害之偽易他人子以故得全云云此即王郎惑衆之辭也}
  - {type: variant, offset: 1533, length: 0, content: '', krp: 案范書本傳初王莽簒位長安中或自稱成帝子子輿者莾殺之郎緣是詐稱真子輿云母故成帝謳者嘗下殿卒僵須臾有黄氣從上下半日乃解遂􅗖身就館趙后欲害之偽易他人子以故得全云云此即王郎惑衆之辭也}
