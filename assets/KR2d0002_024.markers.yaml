  - {type: variant, offset: 1035, length: 355, content: 以治律未竟未及成書案略求索竊不自量卒欲寢伏儀下思惟精意案度成數扶以文義潤以道術著成篇章罪惡無狀投畀有北灰滅雨絕世路無由宜博問群臣下及巖穴知渾天之意者使述其義以裨天文志撰建武以來星變彗孛占驗著明者續其後宗廟迭毀議奏國家大體班固錄漢書乃置韋賢傳末臣以問胡廣廣以為實宜在郊祀志去中鬼神仙道之語取賢傳宗廟事寘其中既合孝明旨又使祀事以類相從孝明立世祖廟以明再受命祖有功之義後嗣遵儉不復改立皆藏主其中聖明所制一王之法也自執事之吏下至學士莫能知其所以兩廟之意誠宜具錄本事建武乙未元和丙寅詔書下宗廟儀及齋令宜入效祀志永為典式國家舊章而幽僻藏蔽莫之得見永平初詔書下車服制度中宮皇太子親服重繒厚練浣已復御率下以儉化起機諸侯王以下至于士庶嫁娶被服各有秩品當傳萬世揚光聖德臣以為宜集舊事儀注本奏以成志也俗人失其名故名冕為平天冠五時副車, WYG: 記}
