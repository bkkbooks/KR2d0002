  - {type: variant, offset: 540, length: 493, content: 時銓不卒陳義子問以舊事少好黃老常步擔求師也易於泰山之壓鷄卵輕於駟馬之載鴻毛大恩許皇后父廣漢為宦者丞上官桀謀反時廣漢部索其殿中廬有索長數尺可以縛人者數千枚滿一篋緘封廣漢索不得他吏往得之廣漢坐論為鬼薪輸掖庭後為暴室嗇夫蟻封穴戶大雨將至孝明皇帝九子七王不載母氏建武光武年號也永平孝明年號也和帝年號永初西巡幸長安司馬相如上疏曰夫清道而後行猶時有銜橛之變耕或為研北虜遣使和親岸賓上議二千石皆以選出刻符典千里太尉張酺鄭洪徐防趙喜隨延寵桓並以日蝕免侍御史東平相格班終利恭雖誇譀猶令人熱凡歷所革以變律呂相生至六十也前漢志但載十二律不及六十凡陽生陰曰下陰生陽曰上候鍾律權土炭冬至陽氣應黃鍾通土炭輕而衡仰夏至陰氣應蕤賓通土炭重而衡低進退先後五日之中玉衡長八尺孔徑一寸下端望之以視星宿並縣璣以象天而以衡望之轉璣窺衡以知星宿璣徑八尺圓二尺五寸而強言天體者有三家一曰周髀二曰宣夜三曰渾天宣夜之學絕無師法周髀數術具存考驗天狀多所違失故史官不用唯渾天者近得其情今史官所用候臺銅儀則其法也立八尺圓體之度而具天地之象以正黃道以察發斂以行日月以步五緯精微深妙萬世不易之道也官有其器而無本書前志亦闕而不論臣求其舊文連年不得在, WYG: 賢注}
