  - {type: variant, offset: 270, length: 0, content: '', WYG: 維公公枳四字卿枳維大夫大夫枳維士登登皇皇維國案今周書作枳維國枳字上闕一字國枳維都都枳維邑邑枳維家家枳維欲無疆言上下相遞為藩蔽也其數有八與東觀記同范書丁鴻傳建初四年徙封魯陽鄉侯李賢注東觀記曰魯陽鄉在尋陽郡也案范書郡國志揚州廬江郡有尋陽縣各州所部無郡名尋陽者魯陽亦縣名𨽻荆州南陽郡此疑有誤范書丁鴻傳竇憲擅權鴻因日食上封事曰人道悖於下效騐見於上間者月滿先節過望不虧此臣驕溢背君專功獨行也李賢注月滿先節謂未及望而滿也東觀記亦作先節俗本作失節誤也范書班超傳建初八年疏勒王忠反超攻忠康居遣精兵救之超不能下時月氏新與康居婚超乃使月氏王曉示康居王康居王乃罷兵執忠}
