  - {type: variant, offset: 271, length: 6, content: 承天喜右學允, WYG: 歸其國後三年忠説康居王借兵還居損中遣使詐降於超超偽許之忠從輕騎詣超超斬之李賢注損中東觀記作頓中續漢及華嶠書並作損中本或作植未知孰是范書鄧彪傳元和元年䇿罷太尉鄧彪詔河南尹遣丞存問常以八月旦奉羊酒李賢注東觀記曰賜羊一頭酒二石也范書魯}
