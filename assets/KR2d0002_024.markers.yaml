  - {type: variant, offset: 265, length: 0, content: '', WYG: 附東觀漢記范書異同案本書與范書異同者具見於李賢注李注中所引本書原委分明或其文别為他書所引可採録互證者皆已㪚見各篇其僅摘半語或一二字不可句讀者統編於後若本書有明文而范書刪落者附焉范書光武紀建武元年光武北擊尤來大搶五幡於元氏追至右北平連破之李賢注北平縣屬中山國今易州永樂縣也案東觀記續漢書並無右字此加右誤也營州西南别有右北平郡故城非此也范書和帝紀永元四年夏四月詔收捕竇憲黨射聲校尉郭璜下獄死李賢注郭況子東觀記璜作瑝范書和帝紀永元九年撣國重譯奉貢李賢注撣東觀記作擅范書和帝紀永元十一年復置右校尉官李賢注東觀記曰置在西河鵠澤縣范書和帝紀永元十六年十一月行幸緱山登百岯山李賢注即柏岯山也在洛州緱氏縣南爾雅云山一成曰岯東觀記作坏范書和帝紀元興元年五月癸酉雍地裂李賢注東觀記曰右扶風雍地裂流俗本雍下有州者誤也范書安帝紀永初四年夏四月六州蝗李賢注東觀記曰司隸豫兖徐青冀六州范書安帝紀元初四年秋七月京師及郡國十雨水詔曰月令仲秋養衰老授几杖行糜粥方今案比之時郡縣多不奉行李賢注東觀記曰方今八月案比之時為騐户口次比之也范書安帝紀延光四年春三月帝崩立章帝孫濟北惠王夀子北鄉侯懿李賢注東觀記及續漢書並曰北鄉侯犢今作懿蓋二名范書順帝紀陽嘉二年冬十月庚午行禮辟雍奏應鍾始復黄鍾作樂噐隨月律李賢注東觀記曰元和以來音戾不調復修如舊典范書桓帝紀建和元年陳留盜賊李堅自稱皇帝伏誅李賢注東觀記曰江舍及李堅等范書桓帝紀延熹二年燒當等八種羌叛冦隴右䕶羌校尉段熲追及於羅亭破之李賢注東觀記曰追到積石山即與羅亭相近今鄯州范書清河孝王慶傳永元十五年有司以日食隂盛奏遣諸王侯就國詔曰且復須留李賢注東觀記須留作宿留范書鄧訓傳時迷吾子迷唐别與武威種羌合兵萬騎來至塞下未敢攻訓先欲脅月氏胡訓擁衛稽故令不得戰李賢注稽故謂稽留事故也東觀記稽故字作諸胡也范書吳漢傳漢撃破五校賊於臨平追至東郡箕山大破之北擊清河長直及平原五里賊皆平之李賢注東觀記及續漢書長直並作長垣案長垣縣名在河南不得言北撃范書作長直當是賊號或因地以為名范書賈復傳復馬羸光武解左驂以賜之李賢注東觀記續漢書左並作右范書耿秉傳秉與竇固擊車師車師後王安得令其諸將迎秉秉大怒被甲上馬麾其精騎馳赴之安得惶恐走出門脱帽抱馬足降李賢注東觀記曰脱帽趨抱馬蹏也范書耿恭傳三月至玉門李賢注玉門關名屬敦煌郡在今沙州臣賢案酒泉郡又有玉門縣東觀記曰至敦煌明即玉門關也范書耿恭傳㳟母先卒及㳟自車師還追行喪制有詔使五官中郎將齎牛酒釋服李賢注據東觀記馬嚴也范書岑彭傳更始遣立威王張卬與將軍徭偉鎮淮陽偉反擊走卬彭引兵攻偉破之李賢注東觀記徭作滛范書蓋延傳蘇荗周建將賁休舉蘭陵城降董憲聞之自剡圍休帝敕曰可直徃擣剡則蘭陵必自解李賢注東觀記擣作范書耿純傳真定王劉揚造作讖記欲以惑衆建武二年遣純持節行赦令於幽冀宻勒收揚純至真定時揚弟林邑侯讓及從兄細各擁兵萬餘人李賢注東觀記續漢書細並作紺范書任光傳更始之雒陽以光為信郡太守及王郎起郡國皆降之光獨固守廷掾持王郎檄詣府白光李賢注東觀記扶柳縣廷掾范書任隗傳隗子屯徙封西陽侯屯卒子勝嗣李賢注東觀記勝作騰范書王常傳更始西都長安以常行南陽太守事令專命誅賞李賢注東觀記曰誅不用命封拜有功范書王常傳又别率騎都尉王霸共平沛郡賊李賢注東觀記曰沛郡賊苖虗也范書李通傳通建武二年封固始侯十八年卒子音嗣音卒子定嗣定卒子黄嗣黄卒子夀嗣李賢注東觀記黄字作箕也范書竇融傳王莽居攝中為強弩將軍司馬東擊翟義還攻槐里以軍功封建武男李賢注東觀記續漢書並云寧武男范書竇融傳酒泉太守竺曽以弟報怨殺人而去郡李賢注東觀記曰曽弟嬰報怨殺屬國侯王印等曽慙而去郡范書來歙傳歙父仲哀帝時為諫大夫李賢注東觀記仲作沖范書來歙傳建武十三年帝嘉歙忠節復封歙弟由為宜西侯李賢注東觀記曰宜西鄉侯范書馬援傳建武十一年璽書拜援隴西太守時朝臣以金城破羌之西塗遠多寇議欲棄之援不可帝然之於是詔武威太守令悉還金城客民李賢注東觀記曰梁統也范書梁冀傳初冀父商獻美人友通期於順帝李賢注東觀記友作支范書馮勤傳勤孫由尚平安公}
