  - {type: variant, offset: 267, length: 2, content: 稽古, WYG: 同未詳孰是范書馮衍傳衍作顯志賦曰􅮺子反於彭城兮爵管仲於夷儀李賢注􅮺字吕忱音仕眷反勉也東觀記作譏字此雖作􅮺亦譏刺意衍賦又曰欵子高於中野兮遇伯成而定慮李賢注東觀記高字作喬謂仙人王子喬也衍賦又曰伏朱樓而四望兮採三秀之華英李賢注東觀記及衍集秀字作奇英字作靈本賦下文云食五芝之荗英此若是芝不宜重説但不知三奇是何草也范改奇為秀恐失之矣衍賦又曰揵六枳而為籬兮築蕙若而為室李賢注揵立也枳芬木也晏子曰江南為橘江北為枳枳芳而多刺可以為籬此云六枳東觀記作八枳案周書小開篇曰嗚呼汝何敬非時何擇非徳徳枳維大人大人枳維公公枳維卿案今本汲冡周書作大人枳維卿}
