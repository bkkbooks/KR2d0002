  - {type: variant, offset: 286, length: 253, content: 樂業吏民懽悅問三老鴻胤奉統賜及妻子特賜御賜食於前賜所乘驪馬感念沾襟配乾作合龜筮並從內攝時政外懷狄戎婉嫟慈孝內無忌克之心不以舊惡介意以匡主上弘策授親有母儀之節婉順慈孝體性慈躬執饋饌親奉定省不避暑寒不親毉泣流離哭聲不絕飲不入口敬養盡於奉存哀慎刑疏食骨立素食竟期年白首未嘗不愴然泣涕由禮動與禮合少而明達聰叡天資周密畏慎原事得情時有所問對無遺失有所不安明陳其故謙讓日崇膳不求珍論寢徹旦戟士收尚書未曾私語無令干亂吏治外戚戰慄百寮肅然聽言視論摘發其要甲夜占書丁夜盡筆賜金蓋車容儀照曜絕異令色卓絕傾亂徙居雲臺止行過肅名趙, WYG: ''}
