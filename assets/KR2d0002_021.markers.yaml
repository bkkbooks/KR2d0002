  - {type: variant, offset: 1681, length: 0, content: '', WYG: 案劉昭續漢書注載邕所上書畧云臣自在布衣常以為漢書十志下盡王莽而世祖以來惟有紀傳無續志者臣所師事故太傅胡廣知臣頗識其門户畧以所有舊事與臣雖未備悉粗見首尾積累思惟二十餘年不在其位非外吏庶人所得擅述天誘其𠂻得備著作郎建言十志皆當撰録遂與議郎張華等分受之難者皆以付臣先治律厯以籌算為本天文為騐請太史舊著攷較連年徃徃頗有差舛當有増損乃可施行為無窮法道至深㣲不敢獨議郎中劉洪宻于用算故臣表上洪與共參思圖牒尋繹適有頭角㑹臣被罪逐放邊野臣竊自痛一為不善使史集所闕胡廣所校二十年之思中道廢絶不得究竟誠恐所懷随軀腐朽抱恨黄泉遂不設施謹先顛踣科條諸志臣欲刪定者一所當接續者四前志所無臣欲著者五及經典羣書所宜捃摭本奏詔書所當依據分别首目并書章左願下東觀推求諸奏參以璽書以補綴遺闕昭明國體攷十意即十志也范書本傳李賢注載十意之目云律厯意第一禮意第二樂意第三郊祀意第四天文意第五車服意第六餘闕又劉知幾史通稱邕于熹平中作朝㑹車服二志知十意中當有朝㑹蓋邕所作十意今得其七其三篇則不可攷云}
