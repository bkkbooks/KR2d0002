body:
  text: 東觀漢記卷二十一列傳十六胡廣胡廣為太傅總録尚書事時年八十而心力克壯母在堂朝夕瞻省旁無几杖言不稱老達練事體明解朝章雖無謇直之風屢有補裨之益陳龜陳龜為五原太守後卒西域胡夷并涼民庶咸為舉哀弔祭其墓劉祐劉祐為河東太守時屬縣令長率多中官子弟百姓患之祐到摧其權強平理冤結政為三河表李雲桓帝誅大將軍梁冀而中常侍單超等五人皆以誅冀功並封列侯又立掖庭民女亳氏為皇后數月間后家封者四人賞賜巨萬時地數震裂衆災頻降白馬令李雲素剛憂國乃露布上書移副三府曰孔子曰帝者諦也今官位錯亂小人諂進財貨公行政令日損是帝欲不諦乎帝得奏震怒下有司送雲黃門北寺獄弘農五官掾杜衆傷其忠直獲罪上書願與雲俱得死遂俱死獄中韋毅韋毅為陳留太守桓帝延熹九年坐贓自殺宗資汝南太守宗資任用善士朱紫區別陳蕃陳蕃為光祿勳上疏切諫云鄙諺曰盜不過五女門以女能貧家也今後宮之女數千食肉衣綺豈不貧國乎段熲段熲字紀明有文武智略時東郭竇公孫舉等聚衆三萬人為亂遣兵討之連年不克桓帝詔公卿選將有文武者司徒尹訟薦熲乃拜為中郎將熲到設施方略旬月群盜悉破熲破羌胡明年春餘羌復與繞河大寇張掖熲自下馬大戰力盡羌亦引退熲追斬之晝夜兼行食雪四十餘日熲上疏曰先零諸羌討之難破降為上策戰為下計太后詔云此以慰种光馬賢等亡魂也熲曰張奐事勢相反遂懷猜恨熲起於途中為并州刺史滅羌有功後徵還京師熲乘輕車介士鼓吹曲蓋朱旗馬騎五萬餘匹殷天蔽日鉦鐸金鼓雷震動地連騎繼迹彌數十里詔賜錢千萬七尺絳襜褕一領赤幘大冠一具熲上言掠得羌侯君長金印四十三銅印三十一錫印一枚長史司馬涉頭長燕鳥校棚水塞尉印五枚紫綬三十八黃綬二枚皆簿入也劉寬劉寬為南陽太守溫仁多恕吏民有過但用蒲鞭罰之示辱而已寬簡略嗜酒嘗有客遣蒼頭市酒迂久大醉而還客不堪之罵曰畜産寬須臾遣人視奴疑必自殺顧左右曰此人也罵言畜産辱孰甚焉吾懼其死也寬夫人試寬意伺當朝會裝嚴已訖使婢奉肉羹翻污朝衣婢遽收之寬神色不異乃徐語曰羹爛汝手陳球陳球為繁陽令清高不動張奐張奐字然明為安定屬國都尉羌離湳上奐馬二十匹奐召主簿張祁入于羌前以酒酹地曰使馬如羊不以入廄使金如粟不得入懷盡還不受使胸奴休屠各及朔方烏桓並同反叛遂燒度遼將軍門列屯赤地煙火相望兵衆大恐各欲亡去奐安坐帷中與弟子誦書自若軍士稍安桓帝時為武威太守其妻懷孕夢見奐帶印綬登樓而歌乃訊之于占者曰必生男復臨茲邦命終此樓既而生猛以建安中為武威太守前刺史邯鄲商為猛所殺據郡反為韓遂所攻州兵圍之急猛自知必死恥見禽乃登樓自焚而死陽球陽球字方正為司隸校尉詣闕上書謝恩表言常侍王甫罪過奔車收送詔獄自臨考之父子皆死于杖下乃磔甫尸署曰賊臣王甫于是權門惶怖股栗莫不雀目鼠步京師肅然曹節見甫尸乃收淚入言球罪帝徙為衛尉球叩頭曰願假臣一月必令豺狼鴟梟悉伏其辜趙咨趙咨字文楚東郡燕人至孝躬率子孫耕農為養盜嘗夜往劫之咨恐母驚惶乃先至門迎盜因請為設食謝曰老母八十疾病須養居貧無儲乞少置衣糧妻子餘物無所惜諸盜皆慚嘆跪曰所犯無狀干暴賢者言畢奔走大司農陳奇舉咨至孝荀曇荀曇字元智潁川潁陰人為廣陵太守正身疾惡其兄昱為沛相乃相與共除閹黨後昱與大將軍竇武謀誅中官與李膺俱死曇亦禁錮終身符融符融妻亡貧無殯斂鄉人欲為具棺服融不肯受曰古之亡者棄之中野惟妻子可以行之但即土埋藏而已高彪高彪除郎中校書東觀後遷外黃令畫彪形象以勸學者范丹范丹字史雲為萊蕪長遭黨錮事推鹿車載妻子捃拾自資有時絶糧丹言貌無改閭里歌之曰甑中生塵范史雲釜中生魚范萊蕪韓卓韓卓字子助陳留人臘日奴竊食祭其母卓義其心即日免之曹節曹節上書曰功薄賞厚誠有踧踖皇甫嵩皇甫嵩上言四姓權右咸各斂手王允尚書令王允奏曰太史令王立説孝經六隱事能消卻姦邪常以良日允與立入為帝誦孝經一章以丈二竹簟畫九宮其上隨日時而出入焉及允被害乃不復行也趙溫趙溫字子柔蜀郡成都人初為京兆郡丞歎曰大丈夫生當雄飛安能雌伏遂棄官而去後官至三公孔融孔融上書曰先帝褒厚老臣懼其隕越是故扶接助其氣力三公刺掖近為憂之非警戒也云備大臣非其類也蔡雍蔡雍詔問有黑氣墮溫明殿東庭中如車蓋騰起奮迅五色有頭體長十餘丈形似龍似虹霓雍對虹著於天而降施于庭以臣所聞則所謂天投霓者也虹晝見御座殿庭前色青赤上引雍問之對曰虹霓小女子之祥雍徙朔方上書求還續成十志周珌周珌豫州刺史慎之子也劉翊劉翊為汝南太守舉郡人許靖計吏察孝廉除尚書郎典選舉郭泛獻帝幸弘農郭泛日虜掠百官婦女有美髮者皆斷取之呂布呂布以奮威將軍如三事蔣疊蔣疊字伯重為太僕久在臺閣文雅通達明故事在九卿位數言便宜奏議可觀須誦須誦為郡主簿獲罪詣獄引械自椓口口出齒獲免馮模馮模為司空坐隴西太守鄧融免官周行周行為涇令下車嚴峻貴戚局蹐京師肅清劉訓劉訓拜車府令時東州郡國相驚有賊轉至京師吏民驚皆奔城郭訓即夜詣省欲令將近兵據門以禦之雍鯈雍鯈字長魚事母至孝母常病癰鯈晝夜匍伏不離左右至為吮癰梁福司部災蝗臺召三府驅之司空掾梁福曰普天之下莫非王土不審使臣驅蝗何之災蝗當以德消不聞驅逐時號福為真掾范康范康為司隸校尉務大綱性節儉常臥布被蔣翊蔣翊字元卿後母憎之伺翊寢操斧砍之值翊如廁宗慶宗慶字叔平為長沙太守民養子者三千餘人男女皆以宗為名郍刪郍刪字次孫早孤以至孝稱值天下亂野無煙火而刪獨在冢側每賊過見其尚幼而有志節奇而哀之喜夷喜夷為壽陽令蝗入輒死李庸李庸為蜀郡太守蜀之珍玩不入於門益州紀其政化巴異巴異為重泉令吏民向化鸞鳥止學宮卜福卜福為廷尉執謙求退上以為大中大夫陳導光武賜陳導駭犀劍楊喬楊喬曰臣伏見二千石典牧千里翟歆翟歆字敬子父于以功封臨沮侯歆當嗣爵以母年老國遠上書辭讓詔許乃賜關內侯魏成魏成曾孫純坐訐訕國除畢尋利取侯畢尋玄孫守坐姦人妻國除段普首鄉侯段普曾孫勝坐殺婢國除邢崇夕陽侯邢崇孫之為賊所盜亡印綬國除陰猛陰猛好學溫良稱于儒林為太祝令以博通古今遷太史令羊融羊融字子優為大司農性明達稱為名卿張意張意拜驃騎將軍討東甌備水戰之具一戰大破所向無前沈豐沈豐字聖達為零陵太守為政慎刑重殺罪法辭訟初不歷獄嫌疑不決一斷于口鞭杖不舉市無刑戮僚友有過初不暴揚有奇謀異略輒為談述曰太守所不及也到官一年甘露降芝草生蕭彪蕭彪字伯文京兆杜陵人纍官巴陵太守父老乞供養父有賓客輒立屏風後應受使命父嗜餅每自買進之陳囂陳囂字君期習韓詩語曰關東説詩陳君期
