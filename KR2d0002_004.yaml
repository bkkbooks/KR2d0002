body:
  text: 東觀漢記卷四年表百官表太尉掌邦冊皇太子捧上其璽綬司空唐虞之官也金印紫綬竇憲作大將軍置長史司馬員吏官屬位次太傅大將軍出征置中護軍一人其將軍不常置比公者又有驃騎將軍建武二十年復置驃騎將軍位次公有長史一人度遼將軍司馬二人章帝又置祀令丞延光元年省大鴻臚漢舊官建武元年復置屬官有丞一人大行丞一人大行丞有治禮員四十七人主齊祠儐贊九賓之禮又有公室主稠中都官斗食以下功次相補鴻臚三十六人其陳寵左雄朱寵龐參施延並遷公其主薨無子置傅一人守其家桓帝延熹元年三月己酉置鴻德苑置令秩六百石州牧刺史漢舊官建武元年復置牧十八年改為刺史督二千石交趾刺史持節其紹封削絀者中尉內史官屬亦以率減印綬漢制公侯紫綬九卿青綬建武元年復設諸侯王金璽綟綬公侯金印紫綬九卿執金吾河南尹秩皆中二千石大長秋將作大匠度遼諸將軍郡太守國傅相皆秩二千石校尉中郎將諸郡都尉諸國行相中尉內史中護軍司直秩皆比二千石以上皆銀印青綬中外官尚書令御史中丞治書侍御史公將軍長史中二千石丞正平諸司馬中官王家僕雒陽令秩皆千石尚書中謁者黃門冗從四僕射諸都監中外諸都官令都侯司農部丞郡國長史丞侯司馬千人秩皆六百石家令侍僕秩皆六百石雒陽市長秩四百石主家長秩皆四百石以上皆銅印黑綬諸署長楫櫂丞秩三百石諸秩千石者其丞尉皆秩四百石秩六百石者丞尉秩三百石四百石者其丞尉秩二百石縣國丞尉亦如之縣國三百石長相丞尉亦二百石明堂靈臺丞諸陵校長秩二百石丞尉校長以上皆銅印黃綬縣國守宮令相或千石或六百石長相或四百石或三百石長相皆以銅印黃綬而有秩者侍中中常侍光祿大夫秩皆二千石大中大夫秩皆比二千石諫議大夫侍御史博士皆六百石議郎中謁者秩皆比六百石小黃門黃門侍郎中黃門秩皆比四百石郎中秩皆比三百石太子舍人秩二百石諸王表原闕王子侯表原闕功臣表原闕恩澤侯表原闕
