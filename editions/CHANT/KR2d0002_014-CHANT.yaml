body:
  text: 東觀漢記卷十四列傳九朱鮪朱鮪等會城南淯水上沙中設壇立聖公為天子鮪破上大喜諸將賀之懇上尊號鮪守雒陽吳漢諸將圍守數月不下上以岑彭嘗為鮪校尉令彭說鮪曰赤眉已得長安今公誰為守乎蕭王受命平定燕趙百姓安土歸心賢俊四面雲集今北方清淨大兵來攻雒保一城欲何望乎不如亟降鮪曰大司徒公被害時鮪與其謀又諫更始無遣上北伐自知罪深故不敢降耳彭還詣河陽白上上謂彭復往曉之夫建大事者不忌小怨今降官爵可保況誅罰乎上指水曰河水在此吾不食言彭奉上旨復至城下說鮪因曰彭往者得執鞭侍從蒙薦舉拔擢深受厚恩思以報義不敢負公鮪從城上下索曰當如此來彭趨索欲上鮪見其不疑即曰旦蚤與我會上東門外彭如期往與鮪交馬語鮪輕騎詣彭降焉彭為殺羊具食鮪曰身為降虜未見吳公諸將不敢食彭即令鮪自縛與俱見吳公將詣行在所河津亭上即自解鮪縛復令彭夜送歸雒陽成德侯鮪玄孫祀坐殺人國除鮑永鮑永字君長上黨人也少有志操事後母至孝妻嘗於母前叱狗而永即去之為郡功曹時有稱侍中止傳舍者太守趙興欲出謁永以不宜出當車拔佩刀興因還後數日詔書下捕之果矯稱使者由是知名更始以永行大將軍事得置偏裨將五人拜僕射行將軍事將兵安撫河東性好文德雖行將軍常衣皁襜褕路稱鮑尚書兵馬光武遣諫議大夫儲大伯持節徵永永疑不從乃收繫大伯封所持節於晉陽傳舍壁中遣信人馳至長安永遣弟升及子壻張舒等謀使營尉李匡先反涅城開門內兵殺其縣長馮晏立故謁者祝回為涅長更始歿永與馮欽共罷兵幅巾而居後歸上上謂永曰我攻懷三日兵不下關東畏卿且將故人往即拜永諫大夫至懷謂太守曰足下所以堅不下者未知孰是也今聖主即位天下已定不降何待即開城降永說下懷上大喜與永對食賜洛陽上商里宅為魯郡太守時彭豐等不肯降後孔子闕里無故荊棘自闢從講室掃除至孔里永異之召郡府丞謂曰方今阨急而闕里無故自滌豈夫子欲令太守大行饗誅無狀也乃修學校禮請豐等會手格殺之為司隸校尉時帝叔父趙王良從送中郎將來歙喪還入夏城門中與五官將軍相逢道迫良怒召門候岑尊叩頭馬前永劾奏良曰今月二十七日車駕臨故中郎將來歙喪還車駕過須臾趙王從後到與右中郎將張邯相逢城門中道迫狹叱邯旋車又召候岑尊詰責使前走數十步案良諸侯藩臣蒙恩入侍宜知尊帝城門候吏六百石而肆意加怒令叩頭都道奔走馬頭前無藩臣之禮大不敬也永矜嚴公平以平陵鮑恢為都官從事並伉直不避強禦詔策曰貴戚且當歛手以避二鮑其見憚如此永行縣到京兆霸陵過更始冢引車入陌欲下從事諫止之永曰親北面事人何忍車過其墓雖以獲罪司隸不避也遂下車哭盡哀而至右扶風椎牛上苟諫冢上聞之問公卿曰奉使如此何如大中大夫張堪對曰仁者百行之宗忠者禮義之主仁不遺舊忠不忘君行之高者也上悅永以度田不實被徵詔書迎下永曰君晨夜冒犯霜露精神亦已勞矣以君帷幄近臣其以為兗州牧鮑昱鮑昱字文淵沘陽長邑人趙堅殺人繫獄其父母詣昱自言年七十餘惟有一子適新娶今繫獄當死長無種類涕泣求哀昱憐其言令將妻入獄解械止宿遂任身有子拜司隸校尉詔昱詣尚書使封胡降檄上遣小黃門問昱有所怪不對曰臣聞故事通官不著姓又當司徒露布怪使司隸而著姓也帝報曰吾欲使天下知忠臣之子復為司隸司徒辭訟久者至十數年比例輕重非其事類錯雜難知昱奏定詞訟七卷決事都目八卷以齊同法令息遏人訟也田邑田邑字伯玉馮翊蓮芍人也其先齊諸田父豐為王莽著威將軍邑有大節涉學藝能善屬文初為上黨太守鄧禹使積弩將軍馮愔將兵擊邑愔悉得邑母弟妻子後邑聞更始敗乃歸世祖世祖遣騎都尉弓里游諫大夫何叔武即拜邑為上黨太守時更始遣鮑永馮衍屯太原衍與邑素誓刎頸以受重任忿邑背前約乃遺書責邑曰晏嬰臨盟擬以曲戟不易其辭邑以書勸鮑永曰愚聞丈夫不釋故而改圖哲士不徼幸而出危今君長故主敗不能死新主立不肯降擁眾而據壁欲襲六國之從與邑同事一朝內為刎頸之盟興兵背畔攻取涅城破君長之國壞父母之鄉首難結怨輕弄凶器人心難知何意君長當為此計昔者韓信將兵無敵天下功不世出略不再見威執項羽名出高帝不知天時就烹於漢智伯分國既有三晉欲大無已身死地分頭為飲器君長銜命出征擁帶徒士上黨阨不能救河東畔不能取朝有顛沛之憂國有分崩之禍上無仇牧之節下無不占之志天之所壞人不能支君長將兵不與韓信同日而論威行得眾不及智伯萬分之半不見天時不知厭足欲明人臣之義當先知故主之未然欲貪天下之利宜及新主之未為今故主已敗新主既成四海為羅網天下為敵人舉足遇害動搖觸患履深淵之薄冰不為號涉千鈞之發機不知懼何如其智也絕鮑氏之姓廢子都之業誦堯之言服桀之行悲夫命也張舒內行邪孽不遵孝友疏其父族外附妻黨已收三族將行其法能逃不自詣者舒也能夷舒宗者予也永邑遂結怨焉邑為漁陽太守未到官道病徵還為諫議大夫病卒馮衍馮衍字敬通其先上黨潞人曾祖父奉世徙杜陵祖野王生座襲父爵為關內侯座生衍衍少有俶儻之志更始時為偏將軍與鮑永相善更始既敗固守不以時下衍說吳漢曰得道之兵鼓不振塵建武初為揚化大將軍掾辟鄧禹府數奏記於禹陳政言事曰衍聞明君不惡切愨之言以測幽冥之論忠臣不顧爭引之患以達萬幾之變是故君臣兩興功名兼立名勒金石令問不忘今衍幸逢寬明之日將值危言之時豈敢拱默避罪而不竭其誠哉伏念天下離王莽之害久矣始自東郡之師繼以西海之役巴蜀沒於南夷緣邊破於北狄遠征萬里暴兵累年禍挐未解兵連不息刑法彌深賦歛愈重眾彊之黨橫擊於外百僚之臣貪殘於內元元無聊饑寒並臻父子流亡夫婦離散廬落丘墟田疇蕪穢疾疫大興災異蠭起於是江湖之上海岱之濱風騰波涌更相駘藉四垂之人肝腦塗地死亡之數不啻大半殃咎之毒痛入骨髓匹夫僮婦咸懷怨怒皇帝以聖德靈威龍興鳳舉率宛葉之眾將散亂之兵歃血昆陽長驅武關破百萬之陣摧九虎之軍雷震四海席卷天下攘除禍亂誅滅無道一朞之間海內大定繼高祖之休烈修文武之絕業社稷復存炎精更輝德冠往初功無與二天下自以去亡新就聖漢當蒙其福而賴其願樹恩布德易以周洽其猶順驚風而飛鴻毛也然而諸將擄掠逆倫絕理殺人父子妻人婦女燔其室屋略其財產饑者毛食寒者裸跣冤結失望無所歸命今大將軍以明淑之德秉大使之權統三軍之政存撫并州之人惠愛之誠加乎百姓高世之聲聞乎群士故其延頸企踵而望者非特一人也且大將軍之事豈特圭璧其行束脩其身而已哉將定國家之大業成天地之元功也昔周宣中興之主齊桓霸彊之君耳猶有申伯召虎夷吾吉甫攘其蟊賊安其疆宇況乎萬里之漢明帝復興而大將軍為之梁棟此誠不可以忽也且衍聞之兵久則力屈人愁則變生今邯鄲之賊未滅真定之際復擾而大將軍所部不過百里守城不休戰軍不息兵革雲集百姓驚駭奈何自怠不為深憂夫并州之地東帶石陘關北逼彊胡年穀獨熟人庶多資斯四戰之地攻守之場也如其不虞何以待之故曰德不素積人不為用備不豫具難以應卒今生人之命懸於將軍將軍所仗必須良才宜改易非任更選賢能夫十室之邑必有忠信無謂無賢路有聖人審得其人以承大將軍之明雖則山澤之人無不感德思樂為用矣然後簡精銳之卒發屯守之士三軍既整甲兵已具相其土地之饒觀其水泉之利制屯田之術習戰射之教則威風遠暢人安其業矣若鎮太原撫上黨收百姓之歡心樹名賢之良佐天下無變則足以顯聲譽一朝有事則可以建大功惟大將軍開日月之明發深淵之慮監六經之論觀孫武之策省群議之是非詳眾士之白黑以超周南之迹垂甘棠之風令夫功烈施於千載富貴傳於無窮伊望之策何以加茲衍娶北地任氏女為妻忌不得留媵妾兒女常自操井臼明帝以為衍材過其實抑而不用遂坎壈失志以壽終於家馮豹馮豹字仲文後母惡之嘗因豹夜臥引刀斫之豹正起中被獲免豹好儒學以詩傳教授鄉里為之語曰道德斌斌馮仲文豹每奏事未報常伏省閣下或從昏至明天子默使小黃門持被覆之曰勿驚之豹為武威太守視事二年河西稱之王閎王閎者王莽叔父平阿侯譚子也王莽篡位潛忌閎乃出為東郡太守閎懼誅常繫藥手內莽敗漢兵起閎獨完全王元王元杜陵人
