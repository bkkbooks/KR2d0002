body:
  text: 東觀漢記卷十八列傳十三第五倫第五倫字伯魚京兆長陵人修行清白王莽末盜賊起時米石萬錢人相食倫獨收養孤兄子外孫分糧共食死生相守鄉里以此賢之倫步擔往候鮮于褎留十餘日將倫上堂令妻子出相對以屬託焉倫自度仕宦牢落遂將家屬客河東變易姓名自稱王伯齊嘗與奴載鹽北至太原販賣每所至客舍去輒為糞除道上號曰道士開門請求不復責舍宿直京兆尹閻興召倫為主簿時長安市未有秩又鑄錢官姦宂所集無能整齊理之者興署倫督鑄錢掾領長安市倫平銓衡正斗斛市無阿枉百姓悅服其後小民爭訟皆云第五掾所平市無姦枉欺詐之巧倫每見光武詔書常歎曰此聖主也當何由一得見決矣等輩笑之曰汝三皇時人也爾說將尚不下安能動萬乘主耶倫曰未遇知己道不同故耳諸王當歸國詔書選三署郎補王家長吏除倫為淮陽王醫工長時輩除者多綬盡但假印倫請於王王賜之綬嘗見上曰聞卿為吏撾妻父不過從兄飯寧有之耶對曰臣三娶妻皆無父臣生遭饑饉米石萬錢不敢妄過人飯曰聞卿為市掾有人遺卿母一笥餅卿知從外來奪之母遂探口餅出之有諸對曰實無此眾人以臣愚蔽故為此言也倫性節儉作會稽郡雖有二千石臥布被自養馬妻炊爨俸祿常取赤米與小吏受等財留一月俸餘皆賤糶與民饑羸者為事徵百姓攀轅扣馬呼曰舍我何之倫密委去百姓聞之乘船追之交錯水中其得民心如此倫免官歸田里不交通人物躬與奴共發棘田種麥倫為司空奉公不撓言事無所依違諸子諫止輒叱之每上封自作草不復示掾吏或民奏記言便宜便封上去年伏誅者刺史一人太守三人被死罪二人凡六人桓虞桓虞字伯春馮翊萬年人遷尚書僕射據法斷事周密平正以為能擢為南陽太守鄧彪鄧彪字智伯南陽人也父邯世祖中興從征伐以功封鄳侯彪少修孝行厲志清高與同郡宗武伯翟敬伯陳綏伯張弟伯同志好齊名稱南陽五伯彪以嫡長為世子邯薨彪當嗣爵讓國與異母弟鳳明帝高其節詔書聽許鳳襲爵彪仕州郡為太尉在位清白以廉讓率下為百僚式視事四年以疾乞骸骨賜策罷贈錢三十萬所在以二千石俸終其身鄭弘會稽鄭弘字巨君為鄒縣令魯春雨霜鄒穀獨無災為太尉以日食免袁安袁安為河南尹十餘年政令公平未嘗以贓罪鞠人常歎曰凡士之學高欲望宰相下及牧守錮人於聖代尹不忍為也和帝始加元服太后詔安為賓賜束帛乘馬安為司徒每朝會憂念王室未嘗不流涕朱暉朱暉字文季南陽人暉之先宋微子之後也以國氏姓周衰諸侯滅宋奔碭易姓為朱後徙于宛暉外祖父孔休以德行稱于代暉早孤有氣決年十三莽敗天下亂與外氏家屬從田間奔入宛城道遇群賊賊操弓弩欲裸奪婦女衣服昆弟賓客皆惶迫伏地莫敢動暉拔劍前曰財物皆可取諸母衣不可得今日朱暉死日也賊義其小壯其志笑曰童子內刀遂舍之為郡督郵太守阮況當嫁女欲買暉婢暉不敢與及況卒暉送其家金三斤人問其故暉曰前不與婢者恐以財污府君今重送欲明己心也驃騎將軍東平王蒼辟暉為掾正月旦將軍當奉璧賀故事少府給璧時陰就為少府吏甚驕慢求不可得暉遙見就主簿持璧謂曰我素聞璧未嘗見借觀之主簿授暉暉授令史主簿遽白就就曰朱掾義士勿求之蒼罷朝謂暉曰掾自視孰與藺相如再遷臨淮太守暉好節概有所拔用皆厲行之士表善黜惡抑強絕邪歲常豐熟吏民畏而愛之為之歌曰強直自遂南陽朱季吏畏其威民懷其惠建武十六年四方牛大疫臨淮獨不疫鄰郡人多牽牛入界暉為守數年坐考長吏囚死獄中州奏免官暉同縣張堪有名德每與相見常接以友道暉以堪宿成名德未敢安也堪至把暉臂曰欲以妻子託朱生暉舉手不敢答堪後仕為漁陽太守暉自為臨淮太守絕相聞見堪後物故南陽餓暉聞堪妻子貧窮乃自往候視見其困厄分所有以賑給之歲送穀五十斛帛五匹以為常韋彪韋彪上議曰二千石皆以選出京師剖符典千里韋豹韋豹字季明數辟公府輒以事去司徒劉愷辟之謂曰卿輕人好去就故爵位不踰今歲垂盡當辟御史意在相薦子其留乎豹曰犬馬齒衰豈敢久待論薦之私非所敢當遂跣而起愷追之遙去不顧郭躬郭躬家世掌法務在寬平章和元年赦天下繫囚在四月丙子以前減死罪一等勿笞詣金城而文不及亡命未發覺者躬上封事曰伏惟天恩莫不蕩宥死罪以下並蒙更生而亡命捕得獨不沾澤臣以為赦前犯死罪而繫在赦後者可皆勿笞詣金城以全人命有益于邊上善之即下詔赦焉鄭均鄭均字仲虞任城人也治尚書好黃老淡泊無欲清靜自守不慕游宦兄仲為縣游徼頗受禮遺均數諫止不聽即脫身出作歲餘得數萬錢歸以與兄曰錢盡可復得為吏坐贓終身捐棄兄感其言遂為廉潔稱清白吏均好義篤實失兄事寡嫂恩禮敦至養孤兒兄子甚篤已冠娶出令別居並門且盡推財與之使得一尊其母然後隨護視賬給之均屢辟不詣公車特徵拜侍御史月餘遷尚書肅宗敬重之後以病告歸均遣子英奉章詣闕詔召見英問均所苦賜以冠幘錢布元和元年與毛義各賜羊一頭酒二斗終其身帝東巡過任城乃幸均舍敕賜尚書祿以終其身故時人號為白衣尚書王景王景治浚儀賜山海經河渠書建初八年景為廬江太守乃教民種麻桑而養蠶廉范廉范字叔度京兆人也祖父客死蜀漢范年十五與客步負喪歸至葭萌船觸石破沒范持棺柩遂俱沉溺眾傷其義鉤求得之僅免於死太守張穆持筒中布數篋與范范曰石生堅蘭生香前後相違不忍行也遂不受為雲中太守始到烽火日通故事虜出度五千人乃移書旁郡求助吏白今虜兵度出五千請移警檄范不聽遂選精兵自將出至近縣令老弱城守而追之為蜀郡太守成都邑宇偪側舊制禁民夜作以防火而更相隱蔽燒者日日相屬范乃毀削前令但嚴使儲水百姓為便民歌之曰廉叔度來何暮不禁火民安堵昔無襦今五袴百姓皆喜家得其願時生子皆以廉名者千數章和二年帝崩范奔赴敬陵還入城見道中有諸生乘小車馬頓死泥中諸生立旁不能自進時范問為誰所從來生白廬江太守掾嚴麟為太守奉章來弔范惻然令從騎下馬與之不告而去麟事畢不知馬所歸緣路訪之或謂麟曰故蜀郡太守廉叔度好賙人窮今奔國喪當是耳時麟亦素聞范名以為然即牽馬造門謝而歸之世伏其高義王阜王阜字世公蜀郡人少好經學年十一辭父母欲出精廬以少不見聽後阜竊書誦盡日辭欲之犍為定生學經攜錢二千布兩端去母追求到武陽北男謁舍家得阜將還後歲餘白父昇曰令我出學仕宦儻至到今毋乘跛馬車昇憐其言聽之定所受韓詩年七十為食侍謀童子傳授業聲聞鄉里補重泉令政治肅清舉縣畏憚吏民向化鸞鳥集於學宮阜使五官掾長沙疊為張雅樂擊罄鳥舉足垂翼應聲而舞翾翔復上縣庭屋十餘日乃去為益州太守邊郡吏多放縱阜以法繩正吏民不敢犯禁政教清靜百姓安業神馬四出滇河中甘露降白烏見連有瑞應世謂其用法平正寬慈惠化所致大將軍竇憲貴盛以絳罽襜褕與阜不受憲嘗移書益州取六百萬阜疑有姦詐以狀上憲遣奴騶帳下吏李文迎錢阜以詔書未報拒不與文積二十餘日詔書報給文以錢市馬秦彭秦彭字國平元成間宗族五人同為二千石故號為萬石秦氏彭擢開陽城門候為山陽太守時山陽新遭地動後饑旱穀貴米石七八萬百姓窮困彭下車經營勞來為民設四誡以定父母妻子長幼之序擇民能率眾者以為鄉三老選鄉三老為縣三老令與長吏參職崇儒雅貴庠序尚德化不任刑名春秋饗射升降揖讓務禮示民吏民畏愛不敢欺也後拜潁州太守老弱啼號滿道彭在潁川鳳凰麒麟嘉禾甘露之瑞集于郡境玄賀玄賀字文弘遷鄴令政化大行為九江太守行縣齎持乾糒但就溫湯而已臨去日百姓扶車叩馬啼泣隨之曹褎曹褎字叔通篤學有大度常慕叔孫通為漢儀禮晝夜沉思寢則懷鉛筆行則誦文書當其念至忽忘所之舉孝廉拜車府令在射聲營舍有停棺不葬者百餘所褎親自履行問其意故吏對曰此等多是建武以來絕無後者襃愴然為買空地悉葬其無主者設祭以祀之遷城門校尉將作大匠時疾疫襃愍哀病徒親自省治醫藥饘粥多蒙濟活賈逵賈逵字景伯長八尺二寸能講左氏及五經本文以大小夏侯尚書教授京師為之語曰問事不休賈長頭永平十七年公卿以神雀五采翔集京師奉觴上壽上召逵敕蘭臺給筆札使作神雀頌建初元年詔逵入北宮虎觀南宮雲臺使出左氏大義書奏上嘉之賜布五百匹衣一襲拜侍中領騎都尉內備帷幄兼領秘書近署甚見信用江革江革字次翁客東海下邳傭賃以養父母下邳知其孝市賈輒與好善者雖無錢任貰與之革專心養母幅巾屐履母年八十革不欲搖動之常自居轅輓車不用牛馬永平中拜五官中郎將每朝會帝常使虎賁扶持及進拜恒自禮焉時有疾不會輒敕大官送餐醪恩寵莫與為比于是京師貴戚順陽侯衛尉馬廖侍中竇憲慕其行各奉書致禮遺革終不發書無所報受帝聞而益善之召馴召馴字伯春以志行稱鄉里號之曰德行恂恂召伯春以明經有智讓能講論拜議郎章和中為光祿勳李育李育字元春為侍中時章帝西謁園陵育陪乘問舊事育輒對由是見重杜安杜安字伯夷潁川定陵人貴戚慕其名或遺其書安不發悉壁藏之後捕貴戚賓客安開壁出書而書如故由是不罹其患杜根和熹鄧后臨朝權在外戚杜根以安帝年長宜親政事乃與同舍郎上書直諫太后大怒收執根等令盛以縑囊于殿上撲殺之執法者以根知名私語行事人使不加力既而載之城外根得蘇太后使人檢視遂詐死三日目中生蛆因得逃竄及鄧氏誅根方歸徵拜侍御史杜篤杜篤字季雅客居美陽與美陽令交遊數從請託不諧頗相恨令怒收篤送京師會大司馬吳漢薨世祖詔諸儒誄之篤于獄中為誄辭最高帝美之錫帛免刑仕郡文學掾以目疾二十餘年不窺京師篤外高祖辛武賢以武略稱篤常歎曰杜氏文明善政而篤不任為吏辛氏秉義經武而篤又怯于事外內五世至篤衰矣宋揚宋揚扶風平陵人永寧二年遣大鴻臚持節至墓追封當陽侯趙興司隸校尉下邳趙興不䘏諱忌每入官舍輒更繕修館宇移穿改築故犯妖禁而家人爵祿益用豐熾官至潁川太守子峻太傅以才器稱孫安世魯相三葉皆為司隸時稱其盛趙勤趙勤字益卿南陽人劉賜姊子童幼有志操往來賜家國租適到時勤在旁賜指錢示勤曰拜乞汝二十萬勤曰拜而得錢非義所取終不肯拜勤明達好學介然特立太守駱珍召署曹吏至掾督郵為南陽太守桓虞功曹委以郡事虞下車葉令雍霸及新野令皆不遵法乃署勤督郵到葉見霸不問縣事但高譚清論以激勵之霸即解印綬去勤還入新野界令聞霸已去遣吏奏記陳罪復還印綬去虞乃嘆曰善吏如良鷹矣下韝即中嘗有重客過欲屬一士令為曹吏虞曰我有賢功曹趙勤當與議之客潛于內中聽虞乃問勤勤對曰恐未合眾客曰止止弗復道毛義廬江毛義性恭儉謙約少時家貧以孝行稱為安陽尉南陽張奉慕其義往候之坐定而府檄到當守令義奉檄而入白母喜動顏色淳于恭淳于恭字孟孫北海人以謙儉推讓為節家有山田橡樹人有盜取之者恭助為收拾載之歸乃知是恭橡盜載橡還之恭不受人又有盜刈恭禾者恭見之念其愧因自伏草中至去乃起養兄崇孤兒教誨學問時不如意輒呼責數以捶自擊其脛欲感之兒慚負不敢復有過恭家井在門外上有盆鄰里牧牛而爭飲牛恭惡其爭多置器其上為預汲水滿之小兒復爭恭各語其家父母父母乃禁怒之里落皆化而不爭梁鴻梁鴻少孤以童幼詣太學受業治禮詩春秋常獨坐止不與人同食比舍先炊已呼鴻及熱釜炊鴻曰童子鴻不因人熱者也滅竈更燃火鴻家貧而尚節博覽無不通畢乃牧豕於上林苑中曾誤遺火延及他舍乃尋訪燒者問所失財物悉推豕償之其主猶以為少鴻曰無他財願以身居作主人許因為執勤不懈耆老見鴻非恒人乃共責讓主人而稱鴻長者于是始敬鴻還其豕鴻不受初與京邑蕭友善約不為陪臣及友為郡吏鴻以書責之而去鴻鄉里孟氏女容貌醜而有節操多求之不肯父母問其所欲曰得賢壻如梁鴻者鴻聞之乃求之女椎髻著布衣操作具而前鴻大喜曰此真梁鴻妻也能奉我矣字之曰德耀名孟光將妻之霸陵山耕耘織作以供衣食彈琴誦詩以娛其志鴻將之會稽作詩曰維季春兮華阜麥含金兮方秀適吳依大家皋伯通廡下為人賃舂每歸妻為具食不敢于鴻前仰視舉案常齊眉伯通察而異之曰彼傭賃能使其妻敬之如此非凡人也鴻常閉戶吟詠書記遂潛思著書十餘篇鴻病困與伯通及會稽士大夫語曰昔延陵季子葬子于嬴博之間不歸其鄉慎勿聽妻子持尸柩去後伯通等為求葬處有要離冢高燥眾人曰要離古烈士今伯鸞亦清高令相近遂葬要離冢傍子孫歸扶風高鳳高鳳字文通南陽人誦讀晝夜不絕妻嘗之田曝麥于庭以竿授鳳令護鷄鳳受竿誦經如故天大雷暴雨淹沒鳳留意在經史忽不視麥麥隨水漂去鄉里有爭財持兵而鬭鳳往解之不已乃脫巾請曰仁義遜讓奈何棄之爭者感之收兵謝罪鳳年老執志不倦聲名著聞太守連召請恐不得免自言鳳本巫家不應為吏又與寡嫂詐訟田遂不仕郭鳳郭鳳字君張勃海人善說災異吉凶占應病先自知嘗豫令弟子市棺歛具至其日而卒
