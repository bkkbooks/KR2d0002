body:
  text: 東觀漢記卷十二列傳七馬援馬援字文淵扶風人遠祖以吏二千石自邯鄲徙茂陵成歡里曾祖父通生賓宣帝時以郎持節號使君使君生仲仲官至玄武司馬仲生援援三兄況字長平余字聖卿員字季主援長七尺五寸色理膚髮眉目容貌如畫受齊詩師事潁川滿昌以況出為河南太守次兩兄為吏京師見家用不足乃辭況欲就邊郡畜牧援外類倜儻簡易而內重禮事寡嫂雖在閫內必幘然後見為郡督郵送囚至府囚有重罪援哀而縱之亡命北地遇赦留援嘗歎曰凡殖貨財產貴其能施賑也否則守錢虜耳乃盡散以班昆弟故舊身衣羊裘皮袴隗囂甚重援以為綏德將軍時公孫述稱帝囂使援往觀之援素與述同鄉里相善以為至當握手迎如平生述乃盛陳陛衛引援入交拜畢就館為援制荅布單衣交讓冠會百官於宗廟立舊交之位述鸞旗旄騎警蹕就車禮甚盛欲授以封侯大將軍位賓客皆樂留援曉之因而辭歸謂囂曰子陽井底鼃耳不如專意東方囂乃使援奉書雒陽援初到敕令中黃門引入時上在宣德殿南廡下但幘坐援至上迎笑謂之曰卿遨遊二帝間見卿使人慚援頓首謝曰當今之世非獨君擇臣臣亦擇君臣與公孫述同縣少小相善臣前至蜀述陛戟而後進臣今臣遠從異方來陛下何以知非刺客而簡易如此於是上復笑曰卿非刺客顧說客耳援乃曰天下反覆自盜名字者不可勝數今見陛下恢廓大度同符高祖乃知帝王自有真也援歸說囂曰前到朝廷上凡十四見援與楊廣書曰車丞相高祖園寢郎一月九遷為丞相者知武帝恨誅衛太子上書訟之上自征隗囂至漆諸將多以王師之重不宜遠入險阻計未決會召援因說囂側足而立將士土崩之勢兵進必破之狀於上前聚米為山川指畫地勢上曰虜在吾目中矣囂眾大潰援為隴西太守討羌中矢貫腓脛上聞賜羊三千牛三百頭以養病援務開恩信寬以待下任吏以職但總大體而已賓客故人日滿其門諸曹時白外事輒曰此丞掾任何足相煩若大姓侵小民黠羌欲旅拒此乃太守事耳遷虎賁中郎將在隴西上書曰富民之本在於食貨宜如舊鑄五銖錢天下賴其便三府以為未可凡十三難援一一解之條奏其狀自還京師數被進見為人明白嫺進對尤善述前事每言及三輔長者至閭里少年皆可觀皇太子諸王聞者莫不屬耳忘倦擊尋陽山賊上書曰除其竹木譬如嬰兒頭多蟣蝨而剃之蕩蕩然蟣蝨無所復依書奏上大悅出尚書盡數日敕黃門取頭蝨章持入因出小黃門頭有蝨者皆剃之上以援為伏波將軍援上言臣所假伏波將軍印書伏字犬外嚮成皋令印皋字為白下羊丞印四下羊尉印白下人人下羊一縣長吏印文不同恐天下不正者多符印所以為信也所宜齊同薦曉古文字者事下大司空正郡國印章奏可援好事至荔浦見冬筍名曰笣筍上言禹貢厥包橘柚疑謂是也其味美於春夏筍擊交趾謂官屬曰吾從弟少游嘗哀吾慷慨多大志曰士生一世但取衣食足乘下澤車御款段馬為郡吏守墳墓鄉里稱善人斯可矣求益盈餘但自苦耳吾在浪泊西里塢間虜未滅之時下潦上霧毒氣熏蒸仰視烏鳶跕跕墮水中臥念少游平生時語何可得也與兄子嚴敦書曰學龍伯高不就猶為謹飭之士所謂刻鵠不成尚類鶩者效杜季良而不成陷為天下輕薄子所謂畫虎不成反類狗也援平交趾上言太守蘇定張眼視錢䁋目討賊怯于戰功宜加切敕後定果下獄援於交趾鑄銅馬奏曰臣聞行天者莫如龍行地者莫如馬臣援師事楊子阿孝武帝時善相馬者東門京鑄作銅馬法獻之立馬於魯班門外更名曰金馬門臣既備數家骨法以所得駱越銅鑄以為馬高三尺五寸圍四尺五寸謹獻詔置馬德陽殿下援振旅京師賜車一乘援曰方今匈奴烏桓尚擾北邊欲自請擊之男兒要當死於邊野以馬革裹尸還葬耳何能臥床上在兒女子手中耶故人孟冀曰諒為烈士當如此矣援行亭障到右北平詔書賜援鉅鹿縑三百匹建武二十四年武威將軍劉禹擊武陵五谿蠻夷深入軍沒援因復請行時年六十二上愍其老未許之援自請曰臣尚能被甲上馬上令試之援據鞍顧盼以示可用上笑曰㬦哉是翁也遂遣援二月到武陵臨鄉馬廖馬廖少習易經清約沈靜援擊武谿無功卒於師廖不得嗣爵從羽林監遷虎賁中郎將上表長樂宮曰夫改政移風必有其本長安語曰城中好高髻四方高一尺城中好廣眉四方且半額城中好廣袖四方用匹帛司隸校尉梁松奏特進弟防光廖廖子豫兄弟父子并受爵土榮顯冠世多買京師膏腴美田作大廬近帶城郭妨困小民馬防馬防字公平永平十五年上始欲征匈奴與竇固等議出兵調度皆以為塞外草美可不須馬穀其各以固等兵到燉煌當出塞上請馬穀上以固言前後相違怒不與穀皆言按軍出塞無穀馬故事防言宣帝時五將出征其奏言匈奴候騎得漢馬矢見其中有粟即知漢兵出以故引去以是言之馬當與穀上善其用意微至敕下調馬穀防遂見親近防征西羌上嘉防功令史官作頌頌其功伐章帝建初三年防為車騎將軍城門校尉置掾史位在九卿上絕席防兄弟二人各六千戶防為潁陽侯特以前參醫藥勤勞省闥綏定西羌以襄城羹亭一千二百戶增防身帶三綬寵貴至盛為光祿勳將緹騎宿衛宮省上數幸防府賞賜飲食防上言聖人作樂所以宣氣致和順陰陽也臣愚以為可因歲首發太簇之律奏雅頌之音以迎和氣時以作樂器費多遂獨行十月迎氣樂防性矜嚴公正數言政事多見採用子鉅為常從小侯六年正月齋宮中上欲冠鉅夜拜為黃門郎御章臺下殿陳鼎俎自臨冠之防兄弟奴婢各千人以上防又多牧馬畜賦歛羌胡上不喜之數加譴責所以禁遏甚備由是權勢稍損賓客亦衰馬光馬光字叔山遭母喪哀痛感傷形骸骨立監越騎校尉視事帥厲吏士教習有方時五校尉令在北軍營中光以為五校尉主禁兵武備所以宿衛兩宮不宜在一處表請二校尉附北宮詔許越騎射聲等治北宮章帝與光詔曰朝送鹿膾寧用飯也拜太僕視事減省諸費歲千萬以上光前坐黨附竇憲歸國憲誅憲奴玉當誣光與憲逆初竇氏有事玉當亡私從光乞不與恨去懷挾欲中光官捕得玉當因告言光與憲有惡謀光以被誣不能自明乃自殺光死後憲他奴郭扈自出證明光憲無惡言光子朗上書迎光喪葬舊塋詔許之馬客卿馬客卿幼而岐嶷年六歲能接應諸公專對賓客嘗有死罪亡命者來過客卿逃匿不令人知外若訥而內沈敏援甚奇之以為將相器故以客卿字焉馬嚴馬嚴字威卿父余卒時嚴方七歲依姊壻父九江連率平河侯王述明年母復終會述失郡居沛郡建武三年余外孫右扶風曹貢為梧安侯相迎嚴歸養視之至四年叔父援從車駕東征過梧安乃將嚴西嚴年十三至雒陽留寄郎朱仲孫舍大奴步護視之嚴從其故門生肆都學擊劍習騎射從司徒祭酒陳元受左氏春秋顯宗詔嚴留仁壽闥與校書郎杜撫班固定建武注記拜嚴持兵長史將北軍五校士羽林兵三千人屯西河美稷衛護南單于聽置司馬從事牧守謁敬同之將軍敕嚴過武庫祭蚩尤帝親御阿閣觀其士眾時人榮之拜中丞嚴舉劾按章申明舊典奉法察舉無所迴避百寮憚之為五官中郎將邊境有事輒下嚴處便宜肅宗初立汲汲欲知下情引納嚴敕有所見聞輒言帝令自今以往諸上便宜封表遣子以往都使詣省門帝自勞以手書嚴為陳留太守建初中病遣功曹史李龔奉章詣闕帝親召見龔問疾病形狀以黃金十斤葛縛佩刀書帶革帶付龔賜嚴遣太醫送方藥也馬融馬融才高博洽為通儒教養諸生常有千數涿郡盧植北海鄭玄皆其徒也善鼓瑟好吹笛達生任性不拘儒者之節居宇器服多存侈飾當坐高堂施絳紗帳前授生徒後列女樂弟子以次相傳鮮有入其室者馬棱馬棱字伯威從兄毅張掖屬國都尉棱為廣陵太守奏罷鹽官賑貧羸薄賦稅郡界嘗有蝗蟲食穀棱有威德蝗蟲入江海化為魚蝦興復陂湖增歲租十餘萬斛為會稽太守詔詰會稽車牛不務堅強車皆以桃枝細簟梁統梁與秦同祖出于伯益別封于梁統高祖父子都自河東遷居北地子都子橋橋子溥溥子延以明軍謀特除西域司馬延生統統疏稱元帝初元五年輕殊死刑三十四事哀帝建平元年輕殊死刑八十一事其四十二事手殺人者減死一等五帝有流殛放竄之誅三王有大辟刻肌之法是以五帝三王之刑除殘去亂鞭扑不可弛於家刑罰不可廢於國征伐不可偃於天下用之有本末行之有逆順耳統對尚書狀曰元壽二年三輔盜賊群輩並起至燔燒茂陵都邑烟火見未央宮前代所未嘗有其後隴西新興北地任橫任崖西河漕況越州度郡萬里交結或從遠方四面會合遂攻取庫兵劫掠吏人國家開封侯之科以軍法追捕僅能破散也梁竦梁竦作悼騷賦其文曰彼仲尼之佐魯兮先嚴斷而後弘衍雖離讒以嗚唈兮卒暴誅於兩觀殷伊尹之協德兮暨太甲而俱寧豈齊量其幾微兮徒信己以榮名雖吞刀以奉命兮抉目眥於門閭吳荒萌其已殖兮可信顏於王廬圖往鏡來兮關北在篇君名其既泯沒兮後辟亦然屈平濯德兮絜顯芬香句踐罪種兮越嗣不長重耳忽推兮六卿卒強趙殞鳴犢兮秦人入疆樂毅奔趙兮燕亦是喪武安賜命兮昭以不王蒙宗不幸兮長平顛荒范父乞身兮楚項不昌何爾生不先後兮惟洪勳以遐邁服荔裳如朱紱兮騁鸞路於犇瀨歷蒼梧之崇丘兮宗虞氏之俊乂臨眾瀆之神林兮東敕職於蓬碣祖聖道而垂典兮褒忠孝以為珍既匡救而不得兮必殞命而後仁惟賈傅其違指兮何揚生之欺真彼皇麟之高舉兮熙太清之悠悠臨岷川以愴恨兮指丹海以為期永元九年制詔三公大鴻臚曰夫孝莫大于尊尊親親其義一也追命外祖以篤親親其追封諡皇太后父竦為褒親愍侯好爵顯服以慰母心梁商梁商字伯夏少持韓詩兼讀眾書傳記天資聰敏昭達萬情舉措動作直推雅性務在誠實不為華飾孝友著於閭閾明信結於友朋其在朝廷儼恪矜嚴威而不猛退食私館接賓待客寬和肅敬憂人之憂樂人之樂皆若在己輕財貨不為之蓄積故衣裘裁足卒歲奴婢車馬供用而已朝廷由是敬憚委任焉常曰多藏厚亡為子孫累每租奉到及兩宮賞賜便置中門外未嘗入藏悉分與昆弟中外饑年穀貴有饑餒輒遣蒼頭以車載米菜錢於四城外給與貧民商上書猥復超超宿德商病篤敕子冀等曰吾以不德享受多福生無以輔益朝廷死必耗費帑藏衣衾飯唅玉匣珠貝之屬何益朽骨百僚勞攘紛華道路祗增塵垢雖云禮制亦有權時方今邊郡不寧盜賊未息豈宜重為國損氣絕之後載至冢舍即時殯歛歛以時服皆以故衣無更裁制殯已開冢冢開即葬祭食如前無用三牲孝子善述父志不宜違我言也商薨賜東園轜車朱壽器銀鏤黃金玉匣案帝作誄曰孰云忠侯不聞其音背去國家都茲玄陰幽居冥冥靡所且窮商朝廷敬憚其委任自前世外戚禮遇所未曾有門無駐馬請謁之賓謙虛抑損九命彌恭漢興以來妃后之家亦無商比梁冀梁冀拜步兵校尉上書列校之職上應天工下厭群望實非愚臣所宜冀僭侈作平上軿車永昌太守鑄黃金之蛇獻之冀益州刺史种暠發其事大將軍夫人躬先率禮淑慎其身超號為開封君即大將軍梁冀妻也梁不疑梁不疑拜步兵校尉上書曰列校之職上應天工下厭群望實非過少所宜任也孫咸讖曰孫咸征狄今以平狄將軍孫咸行大司馬事咸以武名官以應圖讖
