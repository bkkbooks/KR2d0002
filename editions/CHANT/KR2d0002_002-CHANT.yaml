body:
  text: 東觀漢記卷二帝紀二顯宗孝明皇帝孝明皇帝諱陽一名莊世祖之中子也建武四年夏五月甲申帝生豐下銳上頂赤色有似于堯世祖以赤色名之曰陽幼而聰明睿智容貌莊麗十歲通春秋上循其頭曰吳季子陽對曰愚戇無比及阿乳母以問師傅曰少推誠對師傅無以易其辭母光烈皇后初讓尊位為貴人故帝年十二以皇子立為東海公時天下墾田皆不實詔下州郡檢覆百姓嗟怨州郡各遣使奏其事世祖見陳留吏牘上有書曰潁川弘農可問河南南陽不可問因語吏吏抵言于長壽街得之世祖怒時帝在幄後曰吏受郡敕常欲以墾田相方耳世祖曰即如此何故言河南南陽不可問對曰河南帝城多近臣南陽帝鄉多近親田宅踰制不可為準世祖令虎賁詰問乃首服如帝言遣謁者考實具知姦狀世祖異焉數問以政議應對敏達謀謨甚深溫恭好學敬愛師傅所以承事兄弟親密九族內外周洽世祖愈珍帝德以為宜承先序十七年冬十月詔廢郭皇后立陰貴人為皇后帝進爵為王十九年以東海王立為皇太子治尚書備師法兼通九經略舉大義博觀群書以助術學無所不照中元二年春二月世祖崩皇太子即位永平元年帝即阼長思遠慕至踰年正月乃率諸王侯公主外戚郡國計吏上陵如會殿前禮長水校尉樊鯈奏言先帝大業當以時施行欲使諸儒共正經義頗令學者得以自助于是下太常將軍大夫博士議郎郎官及諸王諸儒會白虎觀講議五經同異封太后弟陰興之子慶為鮦陽侯慶弟博為㶏強侯陰盛為無錫侯楚王舅子許昌龍舒侯二年春正月辛未上宗祀光武皇帝于明堂帝及公卿列侯始服冕冠衣裳祀畢升靈臺望雲物大赦天下詔曰登靈臺正儀度三月上初臨辟雍行大射禮冬十月幸辟雍初行養老禮詔曰十月元日始尊事三老兄事五更朕親袒割牲帝尤垂意經學刪定擬議稽合圖讖封師太常桓榮為關內侯親自制作五行章句每饗射禮畢正坐自講諸儒並聽四方欣欣是時學者尤盛冠帶搢紳遊辟雍而觀化者以億萬計甲子西巡幸長安祠高廟遂有事于十一陵歷覽館舍邑居舊處會郡縣吏勞賜作樂有縣三老大言陛下入東都臣望顏色儀容類似先帝臣一懽喜百官嚴設如舊時臣二懽喜見吏賞賜識先帝時事臣三懽喜陛下聽用直諫默然受之臣四懽喜陛下至明懲艾酷吏視人如赤子臣五懽喜進賢用能各得其所臣六懽喜天下太平德合于堯臣七懽喜帝令上殿欲觀上衣因舉虎頭衣以畏三老帝曰屬者所言我堯削章不如飽飯十一月詔京兆右扶風以中牢祀蕭何霍光出郡錢穀給蕭何子孫在三里內者悉令侍祀三年春二月圖二十八將于雲臺冊曰剖符封侯或以德顯秋八月詔曰尚書璇璣鈐曰有帝漢出德洽作樂名予其改郊廟樂曰大予樂樂官曰大予樂官以應圖讖冬十月帝與皇太后幸南陽祠章陵周觀舊廬召見陰鄧故人帝在于道所幸見吏勞賜省事畢步行觀部署不用輦車甲夜讀眾書乙更盡乃寐先五鼓起率常如此四年春二月詔曰朕親耕于藉田以祈農事五年冬十月幸鄴趙王栩會鄴常山賜錢百萬六年廬江太守獻寶鼎出王雒山納于太廟詔曰易鼎足象三公豈非公卿奉職得理乎太常其以礿祭之日陳鼎于廟以備器用八年冬十月上臨辟雍養三老五更禮畢上手書詔令尚書僕射持節詔三公九年詔為四姓小侯置學十年夏閏四月行幸南陽祠章陵以日北至復祠于舊宅禮畢召校官子弟作雅樂奏鹿鳴上自御塤篪和之以娛嘉賓至南頓勞養三老官屬是時天下安平人無徭役歲比登稔百姓殷富粟斛錢三十牛羊被野十二年以益州徼外哀牢王率眾慕化地曠遠置永昌郡十三年春二月帝耕藉田禮畢賜觀者食有諸生前舉手曰善哉文王之遇太公也帝書版曰生非太公予亦非文王也十四年帝作壽陵制令流水而已陵東北作廡長三丈五步外為小廚財足祠祀帝自置石椁廣丈二尺長二丈五尺十五年春二月東巡狩癸亥帝耕于下邳三月幸孔子宅祠孔子及七十二弟子親御講堂命太子諸王說經幸東平王宮帝憐廣陵侯兄弟賜以服御之物又以皇子輿馬悉賦予之十七年春甘露仍降樹枝內附芝生前殿神雀五色翔集京師正月當謁原陵是夜帝夢見先帝太后如平生歡夢中喜覺因悲不能寐明旦帝令百官採甘露悉會公卿表賀奉觴上壽太常丞上言陵樹葉有甘露帝率百官上陵甘露積于樹取以薦受賜畢上從席前伏御床視太后鏡奩中物流涕敕易奩中脂澤妝具左右皆泣莫能仰視十八年秋八月帝崩于東宮前殿在位十八年時年四十八諡曰孝明皇帝葬顯節陵十二月有司奏上尊號曰顯宗廟與世宗廟同而祠祫祭于世祖之堂共進武德之舞如孝文皇帝祫祭高廟故事自帝即位遵奉建武之政有加而無損初世祖閔傷前世權臣太盛外戚預政上濁明主下危臣子漢家中興惟宣帝取法至于建武朝無權臣外戚陰郭之家不過九卿親屬勢位不能及許史王氏之半至永平后妃外家貴者裁家一人備列將校尉在兵馬官充奉宿衛闔門而已無封侯預朝政者自皇子之封皆減舊制嘗案輿地圖皇后在旁言鉅鹿樂成廣平各數縣租穀百萬帝令滿二千萬止諸小王皆當略與楚淮陽相比什減三四曰我子不當與先帝子等又國遠而小于王善節約謙儉如此肅宗孝章皇帝孝章皇帝諱炟孝明皇帝第五子也永平三年年四歲以皇子立為太子幼而聰達才敏多識世事動容進止聖表有異壯而仁明謙恕溫慈惠和寬裕廣博親愛九族矜嚴方厲威而不猛既志于學始治尚書遂兼五經周覽古今無所不觀由是明帝重之每事諮焉以至孝稱孜孜膝下永平十八年明帝崩帝即位建初二年詔齊相其止勿復送冰紈方空縠吹綸絮也四年冬十一月詔諸王諸儒會白虎觀講五經同異元和元年日南獻白雉白犀帝行幸敕御史司空道橋所過歷樹木方春月無得有所伐輅車可引避也二年春二月帝東巡狩泰山至于岱宗柴望秩山川群神畢白鶴三十從西南來經祀壇上孔子後褒成侯等咸來助祭大赦天下祀五帝于汶上明堂耕于定陶幸魯祠東海恭王及孔子七十二弟子禮畢命儒者論難還幸東平王宮涕泣沾襟五月詔曰乃者白烏神雀屢臻降自京師是年鳳皇見肥城窳亭槐樹上三足烏集沛國白鹿白兔九尾狐見三年代郡高柳烏子生三足大如雞色赤頭上有角長寸餘美陽得銅酒樽朱色青黃有古文帝賜尚書劍各一手署姓名韓稜楚龍泉郅壽蜀漢文陳寵濟南鍛成一室納兩刃其餘皆平劍其時論者以為稜淵深有謀故得龍泉壽明達有文章故得漢文劍寵敦樸有善于內不見于外故得鍛成劍皆因名而表意明德太后姊子夏壽等私呼虎賁張鳴與敖戲爭鬭帝特詔曰爾虎賁將軍蒙國厚恩位在中臣宿衛禁門當進人不避仇讎舉罰不避親戚今者反于殿中交通輕薄虎賁蘭內所使至命欲相殺于殿下不避門內畏懦恣縱姑不遂捕此皆生于不學之門所致也元和二年以來至章和元年凡三年鳳凰三十九見郡國章帝時鳳凰見百三十九麒麟五十二白虎二十九黃龍三十四青龍黃鵠鸞鳥神馬神雀九尾狐三足烏赤烏白兔白鹿白燕白鵲甘露嘉瓜秬秠明珠芝英華苹朱草木連理實日月不絕載于史官不可勝紀序曰書云孝乎惟孝友于兄弟聖之至要也朝乾夕惕寅畏皇天帝王之上行也明德慎罰湯文所務也密靜天下容于小大高宗之極致也肅宗兼茲四德以繼祖考臣下百僚力誦聖德紀述明詔不能辨章豈敢空言增廣以累日月之光穆宗孝和皇帝孝和皇帝諱肇章帝之中子也母曰梁貴人早薨帝自岐嶷至于總角孝順聰明寬和篤仁孝章帝由是深珍之以為宜承天位年四歲以皇子立為太子初治尚書遂兼覽書傳好古樂道無所不照章和二年春二月章帝崩太子即位永元元年詔有司京師離宮園池悉以假貧人二年春二月壬午日食時史官不覺涿郡言之單于乞降賜玉具劍羽蓋車一駟中郎將持節衛護焉三年詔曰高祖功臣蕭曹為首有傳世不絕之誼曹相國後容城侯無嗣朕甚愍焉望長陵東門見二臣之墓生既有節終不遠身誼臣受寵古今所同遣使者以中牢祠大鴻臚悉求近親宜為嗣者須景風紹封以彰厥功四年夏六月大將軍竇憲潛圖弒逆庚申幸北宮詔收捕憲黨皆下獄使謁者收憲大將軍印綬遣憲及弟篤景就國到皆自殺五年春正月宗祀五帝于明堂遂登靈臺望雲物大赦天下自京師離宮果園上林廣成囿悉以假貧人恣得收捕不收其稅六月郡國大雨雹大如鴈子六年秋七月京師旱幸洛陽寺錄囚徒舉冤獄未還宮而澍雨九年冬十月改殯梁皇后于承光宮儀比敬園初后葬有闕竇后崩後乃議改葬十年夏五月京師大雨南山水流出至東郊壞民廬舍十一年帝召諸儒魯丕與侍中賈逵尚書令黃香等相難丕善對事罷朝特賜履襪十二年象林蠻夷攻燔官寺秭歸山高四百餘丈崩填谿水壓殺百餘人冬十一月癸酉夜白氣長三丈起國東北指軍市是月西域蒙奇疏勒二國歸義十三年春正月上日帝以五經義異書傳意殊親幸東觀覽書林閱篇籍元興元年夏五月右扶風雍地裂冬十二月帝崩于章德前殿在位十七年時年二十七葬順陵廟曰穆宗朝無寵族政如砥矢惠澤沾濡鴻恩茂悅外憂庶績內勤經藝自左右近臣皆誦詩書德教在寬仁恕並洽是以黎元寧康萬國協和貞符瑞應八十餘品帝讓而不宣故靡得而紀孝殤皇帝孝殤皇帝諱隆和帝之少子也和帝皇子數十生者輒夭故殤帝養于民元興元年冬十二月和帝崩是日倉卒帝生百餘日乃立以為皇太子其夜即位尊皇后鄧氏為皇太后帝在襁褓太后臨朝詔省荏弱平簟延平元年八月帝崩于崇德前殿年二歲葬康陵孝殤襁褓承統寢疾不豫天命早崩國祚中絕社稷無主天下嗷然賴皇太后臨朝孔子稱有婦人焉信哉
