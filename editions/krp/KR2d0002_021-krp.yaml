body:
  text: 東觀漢記卷二十一列傳十六胡廣胡廣案范書本傳廣字伯始南郡華容人為太傅總録尚書事時年八十而心力克壯母在堂朝夕瞻省旁無几杖言不稱老逹練事體明解朝章雖無謇直之風屢有補裨之益陳龜陳龜案范書本傳龜字叔珍上黨泫氏人為五原太原後卒西域胡夷并凉民庶咸為舉哀弔祭其墓劉祐劉祐案范書本傳祐字伯祖中山安國人為河東太守時屬縣令長率多中官子弟百姓患之祐到摧其權强平理寃結政為三河表李雲桓帝誅大將軍梁冀而中常侍單超等五人皆以誅冀功並封列侯又立掖庭民女亳氏為皇后數月間后家封者四人賞賜巨萬時地數震裂衆灾頻降白馬令李雲案范書本傳雲字行祖丼陵人素剛憂國乃露布上書移副三府曰孔子曰帝者諦也今官位錯亂小人諂進財貨公行政令日損是帝欲不諦乎帝得奏震怒下有司送雲黄門北寺獄𢎞農五官掾杜衆傷其忠直獲罪上書願與雲俱得死遂俱死獄中韋毅韋毅為陳留太守桓帝延熹九年坐贓自殺宗資汝南太守宗資案范書本傳李賢注引謝承書云資字叔都南陽安衆人任用善士朱紫區别陳蕃陳蕃案范書本傳蕃字仲舉汝南平輿人為光禄勲上疏切諫云鄙諺曰盜不過五女門以女能貧家也今後宫之女數千食肉衣綺豈不貧國乎案范書本傳桓帝時封賞踰制内寵猥盛蕃上疏諫帝頗納其言段熲段熲字紀明案范書本傳熲武威姑臧人有文武智畧時東郭竇公孫舉等聚衆三萬人為亂遣兵討之連年不克桓帝詔公卿選將有文武者司徒尹訟薦熲乃拜為中郎將熲到設施方畧旬月羣盜悉破熲破羌胡案范書熲傳時延熹二年明年春餘羌復冦張掖熲自下馬大戰力盡羌亦引退熲追之晝夜兼行食雪四十餘日熲上疏曰先零諸羌討之難破降為上䇿戰為下計案范書本傳熲期於誅盡諸羌深斥招降之謬此疏當非熲語太后詔云此以慰种光馬賢等亡魂也案范書本傳靈帝建寜元年春熲大破先零諸種于逢義山時竇太后臨朝下詔褒熲此其詔文熲曰張奐事勢相反遂懷猜恨案范書本傳建寧元年夏熲復敗𦍑時張奐上言羌種難盡宜以恩降詔書下熲故熲上奏辨之此其奏中語熲起於途中為并州刺史滅羌有功後徵還京師熲乘輕車介士鼓吹曲蓋朱旗馬騎五萬餘匹殷天蔽日鉦鐸金鼓雷震動地連騎繼跡彌數十里詔賜錢千萬七尺絳襜褕一領赤幘大冠一具熲上言掠得羌侯君長金印四十三銅印三十一錫印一枚長史司馬渉頭長燕鳥校棚水塞尉印五枚紫綬三十八案太平御覽作紫綬十七艾綬二十八黄綬二枚皆簿入也劉寛劉寛案范書本傳寛字文饒𢎞農華隂人為南陽太守温仁多恕吏民有過但用蒲鞭罰之示辱而已寛簡畧嗜酒嘗有客遣蒼頭市酒迂久大醉而還客不堪之罵曰畜產寛須臾遣人視奴疑必自殺顧左右曰此人也罵言畜產辱孰甚焉吾懼其死也寛夫人試寛意伺當朝㑹裝嚴已訖使婢奉肉羹翻汚朝衣婢遽收之寛神色不異乃徐語曰羔爛汝手陳球陳球案范書本傳球字伯真下邳淮浦人為繁陽令清高不動張奐張奐字然明案范書本傳奐敦煌酒泉人為安定屬國都尉羌離湳上奐馬二十匹案范書本傳時先零酋長仍遺奐金鐻八枚故奐有使金如粟之語此有闕文奐召主簿張祁入于羌前以酒酹地曰使馬如羊不以入廐使金如粟不得入懐盡還不受使匈奴案范書本傳奐由安定屬國都尉遷使匈奴中郎將此有闕文休屠各及朔方烏桓竝同反叛遂燒度遼將軍門列屯赤地煙火相望兵衆大恐各欲亡去奐安坐帷中與弟子誦書自若軍士稍安桓帝時為武威太守其妻懷孕夢見奐帶印綬登樓而歌乃訊之于占者曰必生男復臨兹邦命終此樓旣而生猛以建安中為武威太守前刺史邯鄲商為猛所殺據郡反為韓遂所攻州兵圍之急猛自知必死耻見禽乃登樓自焚而死陽球陽球字方正案范書本傳球漁陽泉州人為司隸校尉詣闕上書謝恩表言常侍王甫罪過奔車收送詔獄自臨考之父子皆死于杖下乃磔甫尸署曰賊臣王甫于是權門惶怖股慄莫不雀目䑕歩京師肅然曹節見甫尸乃收淚入言球罪帝徙為衛尉球叩頭曰願假臣一月必令豺狼鴟梟悉伏其辜趙咨趙咨字文楚東郡燕人至孝躬率子孫耕農為養盜嘗夜徃刼之咨恐母驚惶乃先至門迎盜因請為設食謝曰老母八十疾病須養居貧無儲乞少置衣糧妻子餘物無所惜諸盜皆慚嘆跪曰所犯無狀干暴賢者言畢奔走大司農陳奇案范書本傳作陳豨舉咨至孝荀曇荀曇字元智潁川潁隂人為廣陵太守正身疾惡其兄昱為沛相乃相與共除閹黨後昱與大將軍竇武謀誅中官與李膺俱死曇亦禁錮終身符融符融案范書本傳融字偉明陳留浚儀人妻亡貧無殯歛鄉人欲為具棺服融不肯受曰古之亡者棄之中野惟妻子可以行之但即土埋藏而已髙彪高彪案范書本傳彪字義方吳郡無錫人除郎中校書東觀後遷外黄令畫彪形象以勸學者范丹范丹字史雲案范書本傳丹陳留内黄人為萊蕪長遭黨錮事推鹿車載妻子捃拾自資有時絶糧丹言貎無改閭里歌之曰甑中生塵范史雲釜中生魚范萊蕪韓卓韓卓字子助陳留人臘日奴竊食祭其母卓義其心即日免之曹節曹節案范書本傳節字漢豐南陽新野人上書曰功薄賞厚誠有踧踖案此書未知何時所上要是濫賞時偽讓之辭皇甫嵩皇甫嵩案范書本傳嵩字義真安定朝那人上言四姓權右咸各歛手王允尚書令王允案范書本傳允字子師太原祁人奏曰太史令王立説孝經六隠事能消却姦邪常以良日允與立入為帝誦孝經一章以丈二竹簟畫九宫其上随日時而出入焉及允被害乃不復行也趙温趙温字子柔蜀郡成都人初為京兆郡丞歎曰大丈夫生當雄飛安能雌伏遂棄官而去後官至三公孔融孔融案范書本傳融字文舉魯國人上書曰先帝褒厚老臣懼其隕越是故扶接助其氣力三公刺掖近為憂之非警戒也云備大臣非其類也蔡邕蔡邕案范書本傳邕字伯喈陳留圉人詔問有黒氣墮温明殿東庭中如車蓋騰起奮迅五色有頭體長十餘丈形似龍似虹蜺邕對虹著於天而降施于庭以臣所聞則所謂天投蜺者也案司馬彪五行志此靈帝光和元年六月事虹晝見御座殿庭前色青赤上引邕問之對曰虹蜺小女子之祥案范書靈帝紀此光和元年七月事蓋兩月間虹災再見邕徙朔方上書求還續成十志案劉昭續漢書注載邕所上書畧云臣自在布衣常以為漢書十志下盡王莽而世祖以來惟有紀傳無續志者臣所師事故太傅胡廣知臣頗識其門户畧以所有舊事與臣雖未備悉粗見首尾積累思惟二十餘年不在其位非外吏庶人所得擅述天誘其𠂻得備著作郎建言十志皆當撰録遂與議郎張華等分受之難者皆以付臣先治律厯以籌算為本天文為騐請太史舊著攷較連年徃徃頗有差舛當有増損乃可施行為無窮法道至深㣲不敢獨議郎中劉洪宻于用算故臣表上洪與共參思圖牒尋繹適有頭角㑹臣被罪逐放邊野臣竊自痛一為不善使史集所闕胡廣所校二十年之思中道廢絶不得究竟誠恐所懷随軀腐朽抱恨黄泉遂不設施謹先顛踣科條諸志臣欲刪定者一所當接續者四前志所無臣欲著者五及經典羣書所宜捃摭本奏詔書所當依據分别首目并書章左願下東觀推求諸奏參以璽書以補綴遺闕昭明國體攷十意即十志也范書本傳李賢注載十意之目云律厯意第一禮意第二樂意第三郊祀意第四天文意第五車服意第六餘闕又劉知幾史通稱邕于熹平中作朝㑹車服二志知十意中當有朝㑹蓋邕所作十意今得其七其三篇則不可攷云周珌周珌案范書珌見董卓袁紹諸傳以珌為漢陽人李賢注引英雄記作周珌字仲遠武威人豫州刺史慎之子也劉翊劉翊案范書本傳翊字子相潁川潁隂人為汝南太守舉郡人許靖計吏察孝廉除尚書郎典選舉郭汜獻帝幸𢎞農郭氾案范書董卓傳李賢注引劉艾獻帝紀云汜張液人日擄掠百官婦女有羙髪皆斷取之吕布吕布案范書本傳布字奉先五原九原人以奮威將軍如三事蔣疊案蔣疊以下二十八人未審係何時代他書亦無可攷編附于此蔣疊字伯重為太僕久在臺閣文雅通逹明故事在九卿位數言便宜奏議可觀須誦須誦為郡主簿獲罪詣獄引械自椓口口出齒獲免馮模馮模為司空坐隴西太守鄧融免官周行周行為涇令下車嚴峻貴戚跼蹐京師肅清劉訓劉訓拜車府令時東州郡國相驚有賊轉至京師吏民驚皆奔城郭訓即夜詣省欲令將近兵據門以禦之雍鯈雍鯈字長魚事母至孝母常病癰鯈晝夜匍伏不離左右至為吮癰梁福司部灾蝗臺召三府驅之司空掾梁福曰普天之下莫非王土不審使臣驅蝗何之灾蝗當以徳消不聞驅逐時號福為真掾范康范康為司隸校尉務大綱性節儉常卧布被蔣詡蔣翊字元卿後母憎之伺翊寢操斧砍之值翊如厠宗慶宗慶字叔平為長沙太守民養子者三千餘人男女皆以宗為名郍刪郍刪字次孫早孤以至孝稱值天下亂野無烟火而刪獨在冢側毎賊過見其尚㓜而有志節奇而哀之喜夷喜夷為夀陽令蝗入輒死李庸李庸為蜀郡太守蜀之珍玩不入於門益州紀其政化巴异巴异為重泉令吏民向化鸞鳥止學宫卜福卜福為廷尉執謙求退上以為大中大夫陳導光武賜陳導駭犀劍楊喬楊喬曰臣伏見二千石典牧千里翟歆翟歆字敬子父于以功封臨沮侯歆當嗣爵母年老國遠上書辭讓詔許乃賜關内侯魏成魏成曽孫純坐訐訕國除畢尋利取侯畢尋𤣥孫守坐姦人妻國除段普首鄉侯段普曽孫勝坐殺婢國除邢崇夕陽侯邢崇孫之為賊所盜亡印綬國除陰猛隂猛好學温良稱于儒林為太祝令以博通古今遷太史令羊融羊融字子優為大司農性明逹稱為名卿張意張意拜驃騎將軍討東甌備水戰之具一戰大破所向無前沈豐沈豐字聖逹為零陵太守為政慎刑重殺罪法辭訟初不厯獄嫌疑不决一斷于口鞭杖不舉市無刑戮僚友有過初不暴揚有奇謀異畧輒為談述曰太守所不及也到官一年甘露降芝草生蕭彪蕭彪字伯文京兆杜陵人累官巴陵太守父老乞供養父有賓客輒立屏風後應受使命父嗜餅每自買進之陳囂陳囂字君期習韓詩語曰關東説詩陳君期東觀漢記卷二十一
