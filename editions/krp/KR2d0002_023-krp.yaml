body:
  text: 東觀漢記巻二十三載記劉𤣥案載記之名為史記漢書所未有此本書創例也劉知幾史通題目篇云東觀以平林下江諸人列為載記古今正史篇又云明帝詔班固陳宗尹敏孟異作世祖本記並撰功臣及新市平林公孫述事作列傳載紀二十八篇攷新市平林發難最先公孫述􆆏平獨後史通舉此以包載記之終始則知其他專兵竊據者當盡列諸載記故今自更始而下以類編入劉𤣥字聖公光武族兄也弟為人所殺聖公結客欲報之客犯法聖公避吏于平林吏繫聖公父子張聖公詐死使人持喪歸舂陵吏乃出子張聖公因自逃匿王莽末南方饑饉人庶羣入野澤屈鳬茈而食更相侵奪新市人王匡王鳳為平理争訟遂推渠帥衆數百人諸亡命徃從之數月間至七八千人號新市兵平林人陳牧廖湛復聚千餘人號平林兵聖公入平林中與伯升會遂共圍宛聖公號更始將軍自破甄阜等衆庶來降十餘萬將立劉氏南陽英雄皆歸望于伯升然漢兵以新市平林為本其將帥素習聖公因欲立之而朱鮪立壇城南堉水上詣伯升吕植通禮經為謁者將立聖公為天子議以示諸將馬武王匡以為王莽未滅不如且稱王張昂拔劍擊地曰稱天公尚可稱天子何謂不可于是諸將軍起聖公至于壇所奉通天冠進聖公于是聖公乃拜冠南面而立改元為更始元年光武為太常偏將軍破二公于昆陽城而更始收劉稷及伯升即日皆物故光武馳詣宛謝罪更始大慙長安中兵攻王莽斬首收璽綬詣宛更始入便坐黄堂上視之曰莾不如此當與霍光等更始韓夫人曰莽不如此帝那得為之更始北都雒陽李松等自長安傳送乗輿服御物及中黄門從官至雒陽關中咸想望天子更始遂西發雒陽李松奉引車馬奔觸北闕鐵柱門三馬皆死更始至長安居東宫鐘鼓帷帳宫人數千官府閭里安堵如舊更始上前殿郎吏以次侍更始媿恧俯刮席與小常侍語郎吏怪之更始納趙萌女為后有寵遂委政于萌日夜與婦人歡宴後庭羣臣欲言事輒醉不能見時不得已乃令侍中坐帷内與語諸將識非更始聲出皆怨之更始韓夫人尤嗜酒每侍飲見常侍奏事輒怒曰帝方對我飲正用此時持事來乎起抵破書案所置牧守交錯州郡不知所從趙萌以私事責侍中侍中曰陛下救我更始言大司馬縱之萌曰臣不受詔遂斬之又所置官爵皆出羣小三輔苦之被服不法或繡面衣錦袴諸于䄡䘿案姚之駰本作被服威儀不以衣冠或繡䘿衣錦袴又作諸將皆冠幘而服婦人衣諸于䄡䄖罵詈道路為百姓之所賤長安中為之歌曰竈下養中郎將爛羊胃騎都尉爛羊頭關内侯官爵多羣小里閭語曰使兒居市決作者不能得傭之市空返問何故曰今日騎都尉徃會日也由是四方不復信向京師雒陽人韓鴻為謁者更始二年使持節降河北拜除二千石其冬赤眉十餘萬人入關徐宣樊崇等入至𢎞農枯樅山下與更始將軍蘓茂戰崇北至蓩鄉轉至湖赤眉引兵入上林更始騎出廚城門諸婦女皆從後車呼更始當下拜城更始下為拜謝城乃去至高陵光武聞更始失城乃下詔封更始為淮陽王而赤眉劉盆子亦下詔以聖公為長沙王仍許來降案此下有闕文上璽綬赤眉乃封為畏威案此下脱一侯字赤眉案此上下均有闕文謝禄曰案此上當脱去張卬等謂四字三輔兵侈欲得更始一旦失之案此下有闕文詔鄧禹收塟覇陵公賔就案公賔就申屠志皆更始所封陳遵為更始大司馬䕶軍没子更始存時故編其後三輔豪傑入長安攻未央宫庚戍案班書王莾傳庚戌更始元年十月三日也范書光武紀則以誅莾為九月事杜虞殺莽于漸臺案杜虞班書作杜呉東海公賔就得其首傳詣宛封滑侯申屠志申屠志以功封汝陰王上書以非劉氏還玉璽改為潁陽侯案志范書不載更始傳有申屠建封平氏王而以非劉氏辭王封者乃朱鮪也此文疑誤陳遵陳遵案班書游俠傳遵字孟公杜陵人使匈奴詔賜駮犀劍劉盆子赤眉欲立宗室以木札書符曰上將軍與兩空札置笥中大集會三老從事令劉盆子等案范書本傳盆子太山式人三人居中央案三人謂盆子及其兄茂與前西安侯劉孝一人奉符以年次探之盆子最幼探得將軍三老等皆稱臣盆子年十五被髮徒跣卒見衆拜恐懼啼泣從劉俠卿居案范書本傳盆子初在赤眉軍中屬右校卒從劉俠卿主芻牧牛僭位後復還依俠卿俠卿為制朱絳單衣平頭赤幘直綦履盆子朝夕朝俠卿禮之數祠城陽景王案城陽景王即朱虚侯章也盆子乃其裔孫樊崇等以巫言景王大怒而立之使盆子乘車入長安得掖庭中宫女猶有數百千人自更始敗後幽閉殿内拔庭中蘆菔根捕池魚而食之赤眉遇光武軍驚震不知所為乃遣劉恭乞降曰盆子將百萬衆降陛下何以待之上曰待汝以不死耳盆子及丞相徐宣以下二十餘萬人肉袒降奉高皇帝傳國璽綬詔以屬城門校尉賊皆輸鎧仗積兵甲宜陽城西與熊耳山齊赤眉案樊崇等皆劉盆子臣故編其後琅琊人樊崇字細君起兵于莒同郡東莞人逢安字少子東海臨沂人徐宣字驕稚謝祿字子奇及楊音各起兵數萬人崇欲與王莽戰恐其衆與莽兵亂乃皆朱其眉以相識别由是號曰赤眉赤眉入安定北地至陽城逢大雪士卒多凍死光武作飛䖟箭以攻赤眉赤眉平後百姓饑餓人相食黄金一斤易豆五斗吕母案吕母范書附劉盆子傳故今編赤眉傳後海曲有吕母其子為縣吏犯小罪縣宰殺之吕母家素富豐資産乃益釀醇酒少年來沽者貰視其乏者輒假衣裝少年欲相與償之吕母垂泣曰縣宰枉殺吾子欲報怨耳諸君寧肯哀之乎少年許諾遂相聚得數百人因與吕母入海自稱將軍遂破海曲執縣宰斬之以其首祭子冡吕母賔客徐次子等自號搤虎王郎案范書王昌傳昌一名郎趙園邯鄲人宫婢生子正與同時即易之案范書本傳初王莽簒位長安中或自稱成帝子子輿者莾殺之郎緣是詐稱真子輿云母故成帝謳者嘗下殿卒僵須臾有黄氣從上下半日乃解遂􅗖身就館趙后欲害之偽易他人子以故得全云云此即王郎惑衆之辭也知命者侍郎韓公等案范書本傳趙繆王子林立郎為天子移檄州郡曰制詔部刺史郡太守曰朕孝成皇帝子子輿者也昔遭趙氏之禍因以王莽簒殺賴知命者將䕶朕躬云云此即檄中語而稍異者葢范書乃節錄之文王郎遣諫議大夫杜威持節詣軍門上遣棨㦸延請入軍威稱説實成帝遺體子輿也上曰設使成帝復生天下不可得況詐子輿乎盧芳盧芳字君期安定人屬國胡數千畔在參蠻芳從之詐姓劉氏自稱西平王㑹匈奴句林王將兵來降參蠻胡芳因隨入匈奴留數年單于以中國未定欲輔立之遣母樓且渠王求入五原與假號將軍李興等結謀興北至單于庭迎芳芳外倚匈奴内因興等故能廣畧邊郡蘇茂蘇茂陳留人殺淮陽太守得其郡營廣樂大司馬呉漢圍茂茂將其精兵突至湖陸與劉永相㑹彭寵彭寵字伯通南陽宛人也父容案范書本傳容作宏哀帝時為漁陽太守有名于邊容貌飲食絶衆是時單于來朝當道二千石皆選容貌飲食者故容徙為雲中太守寵為漁陽太守容貌絶衆案此恐即寵父容事而採掇者誤屬之寵朱浮密奏寵上徵之寵旣自疑其妻勸寵無應徵今漁陽大郡兵馬衆多奈何為人所奏而棄此去寵與所親信吏計議吏皆怨浮勸寵止不應徵寵妻夢臝袒冠幘踰城髠徒推之又寵堂上聞蟆蟇聲在火爐下鑿地求之不得詔討寵者封侯寵奴子密等三人共謀刦寵寵時齋獨在便坐室中晝臥子密等三人縛寵着牀板告外吏大王解齋吏皆便休又用寵聲呼其妻入室見寵驚曰奴反奴乃捽其妻頭擊其頰寵曰趣為諸將軍辦裝兩奴將妻入取寵物一奴守寵寵謂奴曰若小兒我素所愛今解我縛當以女珠妻若小奴見子密聽其語遂不得解子密收金玉衣物使寵妻縫兩縑囊夜解寵手令作記告城門將軍云今遣子密等詣子后蘭卿所其開出弗稽留書成即斷寵及妻頭置縑囊中西入上告朝廷以奴殺主不義復不可不封乃封子密為不義侯張豐涿郡太守張豐舉兵反初豐好方術有道士言豐當為天子以五綵囊盛石繫豐肘云石中有玉璽豐信之遂反旣敗當斬猶言肘有玉璽椎破之豐乃知被詐仰天歎曰當死無所恨秦豐秦豐邔縣人少學長安受律令歸為縣吏更治元年起兵攻得邔宜城若編臨沮中沮廬襄陽鄧新野穰湖陽蔡陽兵合萬人鄧奉光武以鄧奉為輔漢將軍奉拒光武𤓰里案范奉岑彭傳建武二年帝遣呉漢代南陽諸賊漢軍所過多侵暴時鄧奉謁歸新野怒漢掠其鄉里遂據淯陽反三年帝自將南征破斬之龎萌龎萌山陽人為平狄將軍與葢延共擊黄憲詔書獨下延而不及萌萌以為延譖已自疑遂反上聞之大怒乃自將兵討萌與諸將書曰吾常以龎萌為社稷臣將軍得無笑其言乎隗囂隗囂字季孟天水人也囂旣立使聘平陵方望為軍師望至説囂曰足下欲承天順民輔漢而起今立者乃在南陽王莽尚據長安雖欲以漢為民其實無所受命將何以見信于衆宜急立高廟稱臣奉祠所為神道設教求助民神者也且禮有損益質文無常削地開兆茅􅗔土堦以致其肅敬雖未偹物神明其舍諸囂從其言以王莽簒逆復漢之祚乃立高祖太宗之廟稱臣執事史奉璽而告祝畢有司穿坎于庭割牲而盟光武與囂書曰蒼蠅之飛不過三數歩託驥之尾得以絶羣囂故宰府掾吏善為文書毎上書移檄士大夫莫不諷誦囂將王元説囂曰昔更始西都四方響應天下喁喁謂之太平一旦敗壞今南有子陽北有文伯江湖海岱王公十數而欲牽儒生之説棄千乘之基計之不可者也今天水完富士馬最强北取西河東收三輔案秦舊迹表裏山河元請以一丸泥為大王東封函谷關此萬世一時也若計不及此且蓄養士馬據隘自守曠日持久以待四方之變圖王不成其弊猶足以覇囂然其計杜林先去餘稍稍相隨東詣京師光武賜囂書曰吾年已三十餘在兵中十歲所更非一厭浮語虚辭耳岑彭與呉漢圍囂于西域敕彭書曰西域若下便可將兵南擊蜀虜人苦不知足旣平隴復望蜀每一發兵頭鬢為白漢圍囂囂窮困其大將王捷登城呼漢軍曰為隗王城守者皆必死無二心願諸將軍亟罷請自殺以明之遂刎頸而死時民饑饉乃噉弩煮履建武九年正月囂病且饑出城餐糗糒恚憤腹脹而死囂負隴城之固納王元之説雖遣子春卿入質猶持兩端光武于是稍黜其禮正君臣之義案此六句當是序中語公孫述公孫述字子陽扶風茂陵人述之先武帝時以吏二千石自無鹽徙焉成帝末父仁為侍御任述太子舍人稍增石為郎初垣副以漢中亭長聚衆降宗成自稱輔漢將軍述攻成大破之副殺成降蜀郡功曹李熊説述曰方今四海波蕩匹夫横議將軍割據千里地方十城若奮發盛德以投天隙覇王之業成矣宜改名號以鎮百姓述曰吾亦慮之公言起我意于是自立為蜀王熊復説述曰今山東饑饉人民相食兵所屠滅城邑丘墟蜀地沃野千里土壤膏腴果食所生無榖而飽女工之業覆衣天下名材竹幹不可勝用又有魚鹽銀銅之利浮水轉漕之便北據漢中杜褒斜之塗東守巴郡拒扞關之口地方數千餘里戰士不下百萬衆見利則出兵而略地無利則堅守而力農東下漢水以窺秦地南順江流以震荆揚所謂用天因地成功之資也君有為之聲聞于天下而名號未定志士狐疑宜即大位使逺人有所依歸述夢有人語之曰八厶子系十二為期覺語其妻對曰朝聞道夕死尚可况十二乎有龍出其府殿中夜有光耀述以為符瑞因稱尊號自立為天子改元曰龍興造十層赤樓述自言手文有奇瑞案范書本傳述刻其掌文曰公孫帝數移書中國上賜述書曰瑞應手掌成文亦非吾所知承赤者黄也姓當塗其名高也平陵人荆邯以東方漸平兵且西向説述曰兵者帝王之大噐古今所不能廢也昔秦失其守豪傑並起漢祖無有前人之迹立錐之地于戰陣之中躬自奮擊兵破身困數矣然軍敗復合創愈復戰何則死而功成愈于坐而滅亡臣之愚計以為宜及天下之望未絶豪傑尚可招誘急以此時發國内精兵令田戎據江南之㑹倚巫山之固築壘堅守傳檄呉楚長沙以南必隨風而靡令延岑出漢中定三輔天水隴西拱手自服如此海内震揺冀有大利今東帝無尺土之柄驅烏合之衆跨馬陷敵所向輒平不亟乘時與之分功而坐談武王之説是效隗囂欲為西伯也述然邯言欲悉發北軍屯士及山東客兵使延岑田戎分出兩道與漢中諸將合兵并勢蜀人及其弟光以為不宜空國千里之外決成敗于一舉固争之述乃止隗囂敗述懼欲安其衆成都郭外有秦時舊倉改名白帝倉自王莽以來常空述詐使人言白帝倉出穀如山陵百姓空市里徃觀之述乃大會羣臣問曰白帝倉出穀乎皆對言無述曰訛言不可信道隗王破者復如此矣漢兵守成都述謂延岑曰事當奈何岑曰男兒當死中求生可坐窮乎財物易聚耳不宜有愛述乃悉散金帛幕敢死士五千餘人以配岑于市橋偽建旗幟鳴鼓挑戰而濳遣奇兵出呉漢軍後襲擊破漢漢墮水緣馬尾得出延岑案岑與田戎皆臣於述故編其後延岑字叔牙筑陽人案范書公孫述傳作南陽人岑衣虎皮䄡䄖宿下邑亭亭長白言睢陽賊衣絳罽䄡今宿客疑是乃發卒來岑臥不動吏謝去田戎田戎西平人與同郡人陳義客夷陵為羣盜更始元年義戎將兵陷夷陵義自稱黎邱大將軍戎自稱掃地大將軍戎至期日灼龜卜降兆中坼遂止不降案范書岑彭傳建武四年戎闈秦豐被圍刻期日降而妻兄辛臣盜戎珍寳從間道先降戎疑其賣已遂不敢降後為岑彭所破亡降公孫述銅馬等羣盜銅馬賊帥東山荒秃上淮況等大肜渠帥樊重尤來渠帥樊崇五校賊帥高扈檀鄉賊帥董次仲五樓賊帥張文富平賊帥徐少獲索賊帥古師郎等東觀漢記卷二十三
