  text: 欽定四庫全書史部四
  hash: sha256:607f6fc3903a942f795e30a3f03095836467f0a196c1fe41ce827ec4c38e184a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2d0002_WYG_000-1a, image: WYG0370/WYG0370-0065a.png}
body:
  text: 東觀漢記别史類提要臣等謹案東觀漢記二十四卷隋書經籍志稱長水校尉劉珍等撰今攷之范書珍未嘗為長水校尉且此書創始在明帝時不可題珍等居首案范書班固傳云明帝始詔班固與睢陽令陳宗長陵令尹敏司隸從事孟冀共成世祖本紀并撰功臣平林新市公孫述事作列傳載記二十八篇此漢記之初創也劉知幾史通古今正史篇云安帝詔史官謁者僕射劉珍及諫議大夫李尤雜作紀表名臣節士儒林外戚諸傳起建武訖永初范書劉珍傳亦稱鄧太后詔珍與劉騊駼作建武以來名臣傳此漢記之初續也史通又云劉珍等卒復命侍中伏無忌與諫議大夫黄景作諸王王子功臣恩澤侯表南單于西羌傳地理志元嘉元年復令大中大夫邊韶大軍營司馬崔寔議郎朱穆曹夀雜作孝穆崇二皇及順烈皇后傳又増外戚傳入安思等后儒林傳入崔篆諸人寔夀又與議郎延篤雜作百官表順帝功臣孫程郭願及鄭衆蔡倫等傳凡百十有四篇號曰漢記范書伏湛傳亦云元嘉中桓帝詔伏無忌與黄景崔寔等共撰漢紀延篤傳亦稱篤與朱穆邊韶共著作東觀此漢記之再續也葢至是而史體粗備乃肇有漢記之名史通又云熹平中光禄大夫馬日磾議郎蔡邕楊彪著作東觀接續紀傳之可成者而邕别作朝㑹車服二志後坐事徙朔方上書求還續成十志董卓作亂舊文散逸及在許都楊彪頗存注記案范書蔡邕傳邕在東觀與盧植韓說等撰補後漢記所作靈紀及十志又補諸列傳四十二篇因李傕之亂多不存盧植傳亦稱熹平中植與邕說並在東觀續漢記又劉昭補注司馬書引袁山松書云劉洪與蔡邕共述律歴記又引謝承書云胡廣博綜舊儀蔡邕因以為志又引謝沈書云蔡邕引中興以來所修者為祭祀志范書李賢注稱邕上書云臣科條諸志所欲刪定者一所當接續者四前志所無欲著者五此漢記之三續也其稱東觀者范書安帝記李賢注引雒陽宫殿名云南宫有東觀竇章傳云永初中學者稱東觀為老氏藏室道家蓬萊山葢東漢之初著述在蘭臺至章和以後圖籍盛於東觀修史者皆在是焉故以名書隋志稱書凡一百四十三卷而新舊唐書志則云一百二十六卷又録一卷葢唐時已有闕佚隋志又稱是書起光武訖靈帝今攷列傳之文間記及獻帝時事葢楊彪所補也晉時以此書與史記漢書為三史人多習之故六朝及初唐人隸事釋書類多徴引自唐章懷太子李賢集諸儒注范書盛行於代此書遂微北宋時尚有殘本四十三卷趙希弁讀書附志邵博聞見後録並稱其書乃髙麗所獻葢己罕得南宋中興書目則止存鄧禹吳漢賈復耿弇寇恂馮異祭遵景丹葢延九傳共八卷維時有蜀本流傳而錯誤不可讀上蔡任􅀈始以秘閣本讎校羅願為序行之刻板於江夏郡又陳振孫書録解題稱其所見本卷第凡十二而闕第七第八二卷卷數雖似稍多而核其列傳之數亦止九篇則固無異於書目所載也自元以來此書久佚永樂大典於鄧吳賈耿諸韻内並無漢記一語則所謂九篇者明初即己不存矣本朝姚之駰撰後漢書補逸曽蒐集遺文析為八卷然所採秪據劉昭續漢書十志補注范書李賢注虞世南北堂書鈔歐陽詢藝文類聚徐堅初學記五書又往往掇拾不盡挂漏殊多今謹據姚本舊文以永樂大典各韻所載參攷諸書補其闕逸所増者幾十之六其書久無刋本傳寫多訛姚本隨文鈔録謬戾百出且漢記目録雖佚而紀表志傳載記諸體例史通及各書所載梗概尚一一可尋姚本不加攷證隨意標題割裂顛倒不可殫數今悉加釐正分為帝紀三卷年表一卷志一卷列傳十七卷載記一卷其篇第無可攷者别為佚文一卷而以漢記與范書異同附録於末雖殘珪斷璧零落不完而古澤斑斕罔非瑰寳書中所載如章帝之詔増修羣祀杜林之議郊祀東平王蒼之議廟舞並一朝大典而范書均不詳載其文他如張順預起義之謀王常贊昆陽之策楊正之嚴正趙勤之潔清亦復槩從闕如殊為疎略帷賴兹殘笈讀史者尚有所循則其有資攷證良匪淺鮮尤不可不亟為表章矣乾隆四十九年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
