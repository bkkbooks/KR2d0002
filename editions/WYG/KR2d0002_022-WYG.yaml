body:
  text: 東觀漢記卷二十二列傳十七列女外裔鮑宣妻鮑宣之妻桓氏女也字少君宣嘗就少君父學父竒其清苦以女妻之装送甚盛宣不悦謂妻曰少君生而驕富習羙餙而吾貧賤不敢當禮妻曰大人以先生修德守約故使賤妾侍執巾櫛既奉君子惟命是從妻乃悉歸侍御服餙更著短布裳與宣共挽鹿車歸鄉里拜姑禮畢提甕出汲修行婦道鄉邦稱之案鮑宣已見班書此篇以補其闕范書列女傳襲之江伯姊山陽郡人江伯欲嫁姊姊引鎌欲自割匈奴南單于單于北匈奴頭曼十八代孫十二月癸丑匈奴始分為南北單于案范書本傳此為建武二十四年事單于歳祭三龍祠走馬鬬橐駝以為樂事建武二十六年南單于遣使獻駱駝二頭文馬二匹南單于來朝賜御食及橙橘龍眼荔枝案范書光武紀及本傳並未有單于來朝事此文疑誤南單于上書獻槖駝賜谷蠡王玉具劍羽蓋車一駟中郎將持節衞䕶焉案范書和帝紀此賜北單于之谷蠡王於除鞬也上遣單于饗賜作樂百戯上幸離宫臨觀案范書順帝紀此漢安二年夏六月事莋都夷遠夷樂德歌詩曰提官傀搆大漢是治魏冒踰糟與天意合罔驛劉脾吏譯平端旁莫支留不從我未徴衣隨旅聞風向化知唐桑艾所見竒異邪毗􅀈䋠多賜繪布推潭僕遠甘羙酒食拓拒蘇便昌樂肉飛局後仍離屈申悉備僂讓龍洞蠻夷貧薄莫支度由無所報嗣陽雒僧麟願主長夀莫穉角存子孫昌熾遠夷慕德歌詩曰僂讓皮尼蠻夷所處且交陵悟日入之部繩動隨旅慕義向化路且揀雒歸日出主聖德渡諾聖德深㤙魏菌度洗與人富厚綜邪流藩冬多霜雪莋邪尋螺夏多和雨藐潯瀘灕寒温時適菌補邪推部人多有辟危歸險渉危歴險莫受萬桞不遠萬里術疊附徳去俗歸徳仍路孶摸心歸慈母遠夷懐德歌詩曰荒服之儀芃服之外犂籍憐憐土地墝埇阻蘇邪犂食肉衣皮莫碭麤沭不見鹽穀罔譯傳㣲吏譯傳風是漢夜拒大漢安樂蹤優佫仁攜負歸仁雷折險龍觸肯險狹倫狼藏幢髙山岐峻扶路側禄緑崖磻石息落服滛木薄發家理瀝髭雒百宿到雒捕􅉅菌毗父子同賜懐稾匹漏懐抱匹帛傳言呼敕傳告種人陵陽臣僕長願臣僕案范書本傳永平中益州刺史朱輔宣示漢徳白狼槃木唐菆等百餘國慕化歸義作詩三章輔令犍為郡椽田恭訊其風俗譯其辭語遣從事史李陵與黎䕶送詣闕并上其樂詩此文提官傀搆以下竝夷人本語注大漢是治云云則田恭所譯華言載之范書者也西羌西羌祖爰劔為秦所奴𨽻而亡藏巖穴中見焚有影象如虎為蔽火得不死諸羌以為神推以為豪䕶羌竇林奉使羌顚岸降詣林林欲以為功效奏言大豪後顚岸兄顚吾復詣林林言其第一豪問事狀林對前後兩屈林以誣罔詣獄上不忍誅免官後涼州刺史奏林􅂍罪復收繫羽林監遂死獄中案顚岸顚吾范書本傳作滇岸滇吾羌什長鞏便案此上下文闕金城隴西卑湳勒姐種羌反出塞外西域永元二年安息王獻條支大雀此雀卵大如甕東觀漢記卷二十二
