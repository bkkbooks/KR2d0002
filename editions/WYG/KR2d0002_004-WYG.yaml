body:
  text: 東觀漢記卷四年表案本書年表體例全祖班書劉知幾史通所列篇目可據今惟百官表略存餘四篇並闕百官表太尉掌邦案此下有闕文冊皇太子捧上其璽綬司空唐虞之官也金印紫綬竇憲作大將軍置長史司馬員吏官屬位㳄太傅案司馬彪百官志長史司馬皆一人千石大將軍出征置中䕶軍一人其將軍不常置案司馬彪百官志將軍掌征伐背叛事訖罷安帝以後大將軍始常設比公者又有驃騎將軍案司馬彪百官志注比公者四第一大將軍次驃騎將軍次車騎將軍次衞將軍建武二十年復置驃騎將軍位次公案司馬彪百官志明帝以東平王蒼為驃騎將軍以王故位在公上有長史一人案將軍長史皆千石度遼將軍司馬二人案司馬彪百官志明帝初置度遼將軍劉昭注引應劭漢官儀曰度遼將軍秩二千石長史司馬六百石章帝又置祝令丞延光元年省案此太常屬官大鴻臚漢舊官建武元年復置案司馬彪百官志大鴻臚卿一人中二千石屬官有丞一人案司馬彪百官志丞一人比千石大行丞一人案司馬彪百官志大行令一人六百石丞一人大行丞有治禮員四十七人案治禮員司馬彪作治禮郎主齋祠儐贊九賓之禮又有公室主稠中都官斗食以下功次相補鴻臚三十六人其陳寵左雄朱寵龐參施延並遷公其主薨無子置傅一人守其家案司馬彪百官志諸公主每主家令一人六百石丞一人三百石此宗正官屬桓帝延熹元年三月己酉置鴻徳苑置令秩六百石案此少府官屬州牧刺史漢舊官建武元年復置牧十八年改為刺史督二千石交趾刺史持節案司馬彪百官志外十有二州每州刺史一人六百石彪自注曰刺史常以八月巡行所部郡國録囚徒攷殿最攷諸州刺史皆不持節而交趾獨持節以所部絶逺故重其事權也以上州部官其紹封削絀者中尉内史官屬亦以率减案司馬彪百官志皇子封王其郡為國每國置傅一人相一人皆二千石中尉一人比二千石其下又有郎中令之屬以上諸王國官屬印綬漢制公侯紫綬九卿青綬建武元年復設諸侯王金璽綟綬公侯金印紫綬九卿執金吾河南尹秩皆中二千石大長秋將作大匠度遼諸將軍郡太守國傅相皆秩二千石校尉中郎將諸郡都尉諸國行相中尉内史中䕶軍司直案司馬彪百官志注世祖即位以武帝故事置司直居丞相府助督録諸州建武十八年省秩皆比二千石以上皆銀印青綬中外官尚書令御史中丞治書侍御史案司馬彪百官志治書侍御史六百石與此異公將軍長史中二千石丞案司馬彪百官志凡中二千石丞比千石與此異正平諸司馬中官王家僕雒陽令秩皆千石尚書中謁者案司馬彪百官志大長秋之屬有中官謁者令一六百石謁者三人四百石此文疑有脱字人黄門冗從四僕射案司馬彪百官志少府屬有中黄門冗從僕射一人又有尚書僕射一人大長秋屬又有中宫黄門冗從僕射一人秩皆六百石諸都監中外諸都官令都候案司馬彪百官志衛尉屬左右都候各一人六百石司農部丞郡國長史丞案司馬彪百官志每郡丞一人郡當邊戍者丞為長史候司馬千人秩皆六百石家令侍僕秩皆六百石雒陽市長秩四百石主家長秩皆四百石以上皆銅印黒綬諸署長楫櫂丞秩三百石諸秩千石者其丞尉皆秩四百石秩六百石者丞尉秩三百石四百石者其丞尉秩二百石縣國丞尉亦如之縣國三百石長丞尉亦二百石明堂靈臺丞諸陵校長秩二百石丞尉校長以上皆銅印黄綬縣國守宫令相或千石或六百石長相或四百石或三百石長相皆以銅印黄綬而有秩者案司馬彪百官志每縣邑道大者置令一人千石其次置長四百石小者置長三百石侯國之相秩次亦如之侍中中常侍光禄大夫秩皆二千石案司馬彪百官志侍中光禄大夫皆比二千石中常侍本千石後増比二千石與此異大中大夫秩皆比二千石諌議大夫侍御史博士皆六百石議郎中謁者秩皆比六百石案司馬彪百官志議郎六百石與此異中謁者已見前稱秩六百石此謂比六百石尤自相違戾小黄門黄門侍郎中黄門秩皆比四百石案司馬彪百官志小黄門侍郎皆六百石中黄門比百石後増比三百石郎中秩皆比三百石太子舍人秩二百石案劉知幾史通謂此表為崔寔曹夀延篤所作今與司馬彪百官志參攷文多不同如志云諸侯王赤綬而此云綟綬又如王國内史上林楫櫂丞係西漢官名東漢都從裁省丞相司直亦于建武十八年省去而篇中具列之葢司馬彪之志本之胡廣所注王隆漢官篇多順帝以後所更改而此表則述建武永平間舊制也諸王表王子侯表功臣表恩澤侯表案以上四篇全闕今存其目東觀漢記卷四
