body:
  text: 東觀漢記卷一帝紀一世祖光武皇帝光武皇帝諱秀高帝九世孫也承文景之統出自長沙定王發王生舂陵節侯舂陵本在零陵郡節侯孫考侯孫考侯原誤作孝侯今從范書城陽恭王祉傳及文選李善主改以土地下濕元帝時求封南陽蔡陽白水鄉因故國名曰舂陵皇考初為濟陽令有武帝行過宮常封閉帝將生皇考以令舍下濕開官後殿居之案范書帝記李賢注引蔡邕碑云光武将生皇考以令舍不顯開宮後殿居之與此合范書謂生子縣舍殊誤建平元年十二月甲子夜帝生時有赤光室中盡明如晝皇考異之使卜者王長卜之長曰此善事不可言是嵗有嘉禾生一莖九穗長大于凡禾縣界大豐熟因名帝曰秀先是有鳯凰集濟陽故宮中皆畫鳯凰聖瑞萌兆始形于此帝為人隆凖日角大口美鬚眉長七尺三寸在舂陵時望氣者言舂陵城中有喜氣曰美哉王氣鬱鬱葱葱案范書帝紀望氣者蘇伯阿也年九嵗而南頓君卒案范書帝紀南頓君名欽即帝考也隨其叔父在蕭入小學後之長安受尚書于中大夫廬江許子威資用乏與同舍生韓子合錢買驢令從者僦以給諸公費大義略舉因學世事朝政每下案太平御覽每下作美惡必先聞知具為同舍觧説髙才好學然亦喜逰俠鬬雞走馬具知閭里姦邪吏治得失時㑹朝請舍長安尚冠里南陽大人賢者徃來長安為之邸闇稽疑議案文選李善注闇作問嘗為季父故舂陵侯訟逋租于大司馬嚴尤尤見而竒之時宛人朱祐亦為舅訟租于尤尤止車獨與帝語不視祐帝歸戱祐曰嚴公寕視卿耶王莽時雒陽以東米石二千莽遣三公將運闗東諸倉賑貸窮乏又分遣大夫謁者教民煑木為酪酪不可食重為煩擾流民入闗者數十萬人置飬贍官以廩之盗發其廪民餓死者十七八人民相食末年天下大旱蝗蟲蔽天盗賊羣起四方潰畔荆州下江平林兵起王匡王鳯為之渠率時南陽旱饑而帝田獨收帝仁智明逹案太平御覽逹作逺多權略樂施愛人在家重慎畏事勤于稼穡兄伯升好俠笑帝事田作比之髙祖兄仲宛大姓李伯玉案以下文事蹟推之李伯玉蓋即李通而范書李通傳止云字次元不言其一名伯玉是可補其闕略從弟軼數遣客求帝帝欲避之先是時伯玉同母兄公孫臣為醫伯升請呼難伯升殺之案同母兄公孫臣司馬彪續漢書及是書李通傳俱作周母弟申屠臣與此異帝恐其怨故避之使來者言李氏欲相見欵誠無他意帝乃見之懷刀自備入見固始侯案范書李通傳通建武二年封固始侯兄弟為帝言天下擾亂飢餓下江兵盛南陽豪右雲擾因具言讖文事劉氏當復起李氏為輔帝殊不意獨内念李氏富厚父為宗卿師語言譎詭殊非次第嘗疾毒諸家子數犯法令李氏家富厚何為如是不敢諾其言諸李遂與南陽府掾史張順等連謀帝深念良乆天變已成遂市兵弩絳衣赤幘時伯升在舂陵亦已聚㑹客矣帝歸舊廬望見廬南若火光以為人特火呼之光遂盛赫然屬天有頃不見異之遂即歸宅乃與伯升相見初伯升之起也諸家子弟皆亡逃自匿曰伯升殺我及聞帝至絳衣大冠服將軍服乃驚曰以為獨伯升如此也仲謹厚亦如之皆合㑹共勞饗新市平林兵王匡王鳯等因率舂陵子弟隨之兵合七八千人帝騎牛與俱殺新野尉後乃得馬帝起義兵案范書帝紀起兵在王莽地皇三年十一月攻南陽暮聞冢上有哭聲後有人著大冠絳單衣案此有闕文攷范書殺新野尉即在是時使劉終偽稱江夏吏誘殺湖陽尉嚴尤擊下江兵案班書王莽傳地皇三年遣納言大將軍嚴尤秩宗大將軍陳􅌗擊荆州破下江兵帝奉糗一斛脯三十朐進圍宛城案自此以下皆王莽地皇四年事即更始元年也王莽懼遣大司徒王尋大司空王邑將兵來征更始立以帝為太常偏將軍時無印得定武侯家丞印佩之入朝尋邑兵到潁州嚴光陳􅌗與合尤問城中出者言帝不敢取財物但合㑹諸兵為之計䇿尤笑言曰是美鬚眉目者耶欲何為乃如此初莽遣尋邑欲盛威武以振山東兵甲衝輣干戈旌旗戰攻之具甚盛至驅虎豹犀象竒偉猛獸以長人巨無霸為中壘校尉自秦漢以來師出未曽有也帝邀之于陽闗尋邑兵盛漢兵反走帝馳入昆陽諸將惶恐各欲散歸帝與諸將議城中兵榖少宛城未㧞力不能相救今昆陽即破一日之間諸將亦滅不同力救之反欲歸守其妻子財物耶諸將怒曰劉將軍何以敢如此帝乃笑且去惟王常是帝計㑹候騎還言尋邑兵已來長數百里望不見其後尾前已至城北矣諸將遽請帝帝到為陳相救之勢諸將素輕帝及廹急帝為畫成敗皆從所言時漢兵八九千人留王鳯令守城夜出城南門尋邑兵已五六萬到遂環昆陽城作營且圍之數十重案姚之駰本作數百里参證范書帝紀則百字誤雲車十餘丈瞰臨城中旗幟蔽野塵熛連雲金鼓之聲數十里或為地突或為衝車撞城積弩射城中矢下如雨城中負户而汲尋邑自以為成功漏刻有流星墜尋營中正晝有雲氣如壊山直營而霣不及地尺而散吏士皆壓伏時漢兵在定陵郾者聞尋邑兵盛皆怖帝厯説其意為陳大命請為前行諸部堅陣帝將歩騎千餘前去尋邑軍四五里而陣尋邑遣歩騎數千合戰帝奔之斬首數十級諸部將喜曰劉将軍平生見小敵怯今見大敵勇甚可怪也帝復進尋邑兵郤諸部共乗之斬首百千級連勝乃遂令輕足將書與城中諸将言宛下兵復到而陽墜其書尋邑得書讀之恐帝遂選精兵三千人從城西水上奔陣尋邑兵大奔北于是殺尋而昆陽城中兵亦出中外竝撃會天大雷風暴雨下如注水潦成川滍水盛溢邑大衆遂潰亂奔走赴水溺死者以數萬滍水為之不流邑與嚴尤陳􅌗輕騎乘死人渡滍水逃去漢軍盡獲其珍寳輜重車甲連月不盡五月齊武王拔宛城案齊武王郎帝兄伯升後數日更始收齊武王部將劉稷齊武王強爭之遂用譖愬復收齊武王即日皆物故帝降潁陽雖得入意不安門下有繫馬著鼓者馬驚硠磕鄧晨起走岀視之乃馬也帝在父城徴詣宛拜帝為破虜大将軍封武信侯更始害齊武王帝飲食語笑如平常獨居輙不御酒肉㘴卧枕席有涕泣處更始欲北之雒陽以帝為司𨽻校尉先到雒陽整頓官府文書移與屬縣三輔官府吏案官府吏太平御覽作吏士東迎雒陽者見更始諸将過者已數十輩皆冠幘衣婦人衣諸于繡擁䘿大為長安所笑知者或畏其衣奔亡入邉郡避之及見司𨽻官屬皆相指視之極望老吏或垂涕曰粲然復見漢官儀體賢者蟻附更始欲以近親廵行河北大司徒賜言帝第一可用更始以帝為大司馬遣之河北十月帝持節渡孟津鎮撫河北安集百姓帝至邯鄲趙王庻兄胡子進狗䐑馬醖故趙繆王子臨説帝决水灌赤眉胡子立邯鄲卜者王郎為天子案胡子太平御覽作趙繆王子林考范書帝紀有趙繆王子林李賢注云東觀記林作臨未知胡子即臨否今仍其舊文移檄購求帝十萬户案以土皆更始元年事王郎追帝帝自薊東南馳案范書帝紀徇薊在更始二年至饒陽官屬皆乏食帝乃自稱邯鄲使者入傳舍傳吏方進食從者饑爭奪之傳吏疑其偽乃椎鼓數千通紿言邯鄲将軍至官屬皆失色帝升車欲馳而懼不免還坐曰請邯鄲将軍入乆乃駕去夜止蕪蔞亭大風雨馮異進一笥麥飯免肩聞王郎兵至復驚去至南宮天大雨帝引車入道旁空舍竈中有火馮異抱薪鄧禹吹火帝對竈炙衣大㑹真定帝自擊筑案此事范書不載但云帝得任光邳彤等兵降下曲陽北擊中山拔盧奴南擊新市真定防子皆下之則大㑹真定當即在是時帝率鄧禹等擊王郎横野将軍劉奉天破之案劉􅆢范書鄧禹傳李賢注作劉發還過鄧禹營禹進食炙魚帝大餐㗖時百姓以帝新破大敵欣喜聚觀見帝餐㗖勞勉吏士威嚴甚厲于是皆竊言曰劉公真天人也帝引兵攻邯鄲連戰郎兵挫折郎遣諫議大夫杜長威案范書帝紀作杜威持節詣軍門帝遣棨㦸迎延請入軍見上據地曰實成帝遺體子輿也帝曰正使成帝復生天下不可復得也況詐子輿乎長威請降得萬户侯帝曰一户不可得長威曰邯鄲雖鄙君臣并力城守尚可支一嵗終不君臣相率而降但得全身也辭去而郎少傳李立反郎開城門漢軍破邯鄲誅郎入宮收文書得吏民謗毁帝言可擊者數千章帝㑹諸將燒之曰令反側者自安也案反側者歐陽詢藝文類聚作反側子與范書同帝圍邯鄲未下彭寵遺米糒魚鹽以給軍糧由是破邯鄲更始遣使者即立帝為蕭王諸将議上尊號帝不許案范書帝紀更始悉令罷兵詣行在所帝辭以河北未平不就徵自是始貳于更始帝擊銅馬大破之受降適畢封降賊渠率諸将未能信賊亦兩心帝敕降賊各歸營勒兵待帝輕騎入案行賊營賊曰蕭王推赤心置人腹中安得不投死由是皆自安詔馮異軍鴈門卒萬餘人降之案詔字下原夲衍曰字今刪考范書帝紀及馮異傳俱不載此詔惟異拒朱鮪李軼時曽北攻天井闗抜上黨兩城則軍鴈門當即在是時帝已乘王豐小馬先到矣而營門不覺案此十五字上有闕丈據范書帝紀建武元年春正月帝撃尤來大搶五幡于順水北乗勝輕進反為所敗賊追急短兵接帝自投髙岸遇突騎王豐下馬授帝耿弇頻射郤賊得免數兵歸保范陽軍中不見帝或云已沒即是時也帝破賊入漁陽諸將上尊號帝不許議曹椽張祉言俗以為燕人愚方定大事反與愚人相守非計也帝大笑帝發薊還案是時破尤來大搶五幡賊還也士衆喜樂師行鼓舞歌詠雷聲八荒震動至范陽命諸将收葬吏士至中山諸将復請上尊號上奏曰大王社稷為計萬姓為心耿純說帝曰天時人事已可知矣初王莽時帝與伯叔及姊壻鄧晨穰人蔡少公燕語少公道讖言劉秀當為天子或曰是國師劉子駿也帝戯言曰何知非僕耶㘴者皆大笑時傳聞不見赤伏符文軍中所案姚子駰本作傳聞赤伏符不見文章軍中所帝未信到鄗帝所與在長安同舍諸生彊華自長安奉赤伏符詣鄗與帝㑹羣臣復固請曰符瑞之應昭然著聞矣乃命有司設壇于鄗南千秋亭五成陌建武元年夏六月己未即黄帝位燔燎告天禋于六宗改元為建武改鄗為高邑詔曰故密令卓􅌗束身自修埶節惇固斷斷無他其心休休焉夫士誠能為人所不能為則名冠天下當受天下重賞故武王誅紂封比干之墓表啇客之閭今以􅌗為太𫝊封宣徳侯案宣范書卓􅌗傳作褒食邑二千户賜安車一乘衣一襲金五斤冬十月帝入雒陽幸南宮遂定都焉帝破聖公與朱然書曰交鋒之日神星晝見太白清明案范書帝紀未即位前使馮異寇恂破更始大司馬朱鮪軍即位後使鄧禹破更始定國公王匡軍北云交鋒未知何時又朱然太平御覽作伯叔本文似有訛脱二年春正月益呉漢鄧禹等封自漢草創徳運正朔服色未有所定髙祖以十月為正以漢水徳立北畤而祠黑帝至孝文賈誼公孫臣以為秦水徳漢當為土徳至孝武兒寛司馬遷猶從土徳自帝即位按圖讖推五運漢為火徳周蒼漢赤木生火赤代蒼故帝都雒陽制兆于城南七里北郊四里行夏之時時以平旦服色犧牲尚黑明火徳之運常服徽幟尚赤四時隨色季夏黄色議者曰昔周公郊祀后稷以配天宗祀文王以配上帝圖讖著伊堯赤帝之子俱與后稷竝受命而為王漢劉祖堯宜令郊祀帝堯以配天宗祀髙祖以配上帝有司奏議曰追跡先代無郊其五運之祖者故禹不郊白帝周不郊帝嚳漢雖唐之苖堯以厯數命舜髙祖赤龍火徳承運而起當以髙祖配堯之後元復于漢宜以時修奉濟陽城陽縣堯帝之冡雲臺致敬祭祀之禮儀亦如之帝遣游擊將軍鄧隆幽州牧朱浮撃彭寵隆軍潞浮軍雍奴相去百餘里遣吏上奏言寵破在旦暮帝讀檄米竟怒曰兵必敗比汝歸可知吏還未至隆軍果為寵兵掩擊破浮軍逺不敢救以兵走幽州咸曰上神三年帝征秦豐幸舊宅案范書帝紀及岑彭傳春正月帝自將南征夏四月破斬鄧奉五月還宫令岑彭等南擊秦豐秋七月大破之于黎丘至冬十月乃幸舂陵此牽連書之殊未明晰冬十月帝幸舂陵祠園廟大置酒與舂陵父老故人為樂以皇祖皇考墓為昌陵後改為章陵以舂陵為章陵縣案范書帝紀改舂陵鄉為章陵縣在建武六年此蓋通後事言之隗囂上書報以殊禮四年夏五月帝幸盧奴為征彭寵故也自王莽末天下旱霜連年百穀不成元年之初耕作者少民飢饉黄金一斤易粟一石至二年秋天下野榖旅生蔴菽尤盛或生苽菜菓實野蠶成繭被山民收為絮採穫穀果以為蓄積至是嵗野穀生者稀少而南畆亦益闢矣五年初起太學諸生吏子弟及民以義助作帝自齊歸案范書帝紀是時平張歩歸也幸太學賜博士弟子有差六年春二月呉漢下胊城案范書帝紀蓋平董憲寵萌也天下悉定惟獨公孫述隗囂未平帝曰取此兩子置度外乃休諸將置酒賞賜之每幸郡國下輿見吏輒問以數十百嵗能吏次第下至掾史簡練臣下之行下無所隐其情道數十嵗事若案文書吏民驚惶不知所以人自以見識家自以䝉恩逺臣受顔色之惠㘴席之間以要其死力當此之時賊檄日以百數憂不可勝帝猶以餘閒講經藝發圖讖制告公孫述署曰公孫皇帝囂雖遣子入侍案范書帝紀隗囂遣子恂入侍在五年冬十二月尚持兩心囂故吏馬援謂囂曰到朝廷凡數十見案本書馬援傳作凡十四見自事主未嘗見明主如此也枋直驚人其勇非人之敵開心見誠與人語好醜無所隠諱圖講天下事極盡下思兵事方畧量敵校勝濶逹多大節與高帝等經學博覽政事文辯前世無比囂曰如卿言勝髙帝耶曰不如也髙帝大度無可無不可今上好吏事動如節度不飲酒囂大笑曰如卿言反復勝也案范書馬援傳囂信援故遂遣長子恂入質此叙援言于囂遣子入侍之後與范書異代郡太守劉興將數百騎攻賈覽上狀檄至帝知其必敗報書曰欲復進兵恐失其頭首也詔書到興己為覽所殺長史得檄以為國家㘴知千里也七年春正月詔羣臣奏事無得言聖人又舊制上書以青布囊素裹封書不中式不得上帝上詣北軍待報前後相塵案塵太平御覽作屬連嵗月乃决帝躬親萬㡬急于下情乃令上書啓封則用不得刮璽書案刮璽太平御覽作引經取具文字而已奏詣闕平旦上有當見及冤結者常以日而出時騶騎馳出召入其餘禺中使者出報即罷去如神逺近不偏幽隠上逹民莫敢不用情追念前世園陵至盛王侯外戚葬埋僭侈吏民相效寖以無限詔告天下令薄葬八年閏四月車駕西征河西大將軍竇融與五郡太守歩騎二萬迎帝隗囂士衆震壞皆降囂走入城案入太平御覽作西呉漢岑彭追守之九年春正月隗囂餓出城餐糗糒腹脹死十一年幸章陵修園廟舊宅田里舍案文選李善注作過章陵祠園廟十二年呉漢引兵擊公孫述案范書帝紀呉漢伐公孫述出師實在十一年十二月下入犍為界云云乃在次年正月方是十二年事此蓋通始事言之入犍為界小縣多城守未下詔書告漢直擁兵到成都據其心腹後城營自解散漢意難前獨言朝廷以為我縳賊手足矣案此二句未明晰疑有誤遣輕騎至成都燒市橋案范書呉漢傳漢攻廣都拔之遣輕騎燒成都市橋故下詔書有堅守廣都之語此不載漢拔廣都當是脱佚武陽以東小城營皆奔走降竟如詔書漢兵乘勝追奔述拒守詔書又戒漢曰成都十萬餘衆不可輕也且堅據廣都城去之五十里待其即營攻城罷倦引去乃首尾擊之勿與爭鋒述兵不敢來轉營即之移徙輒自堅案此下范書呉漢傳有漢違詔而敗事此不載當是脱佚十一月衆軍至城門述自將背城而戰呉漢鼓之述軍大破刺傷述扶輿入壁其夜死夷述妻子傳首于洛陽縱兵大掠舉火焚燒帝聞之下詔讓吳漢副將劉禹曰城降嬰兒老母案文選李善注嬰作孩口以萬數一旦放兵縱火聞之可為酸鼻家有敝帚享之千金禹宗室子孫故嘗更職何忍行此仰視天俯視地觀于放麑啜羮之義二者孰仁矣失斬將安民之義案矣太平御覽作且又議漢殺述親屬太多是時名都王國有獻名馬案虞世南北堂書鈔作建武十三年是時屠耆國獻名馬寶劍直百金馬以駕鼓車劍以賜騎士苑囿池籞之官廢戈獵之事不御雅性不喜聴音樂手不持珠玉衣服大絹而不重綵征伐嘗乘革輿羸馬公孫述故哀帝時案此下未明晰攷范書述傳云哀帝時述以父任為郎又云述少為郎習漢家制度出入法駕鑾旗旄騎陳置陛㦸然後輦出房闥正與此文相備即以數郡備天子用述破益州乃傳送瞽師郊廟樂葆車乘輿物是後乃稍備具焉述伏誅之後而事少閒官曹文書減舊過半下縣吏無百里之繇民無出門之役十三年封殷紹嘉公為宋公周承休公為衞公案范書帝紀建武二年封周後姬常為周承休公五年封殷後孔安為殷紹嘉公至是改封十四年封孔子後孔志為襃成侯十五年詔曰刺史太守多為詐巧不務實核茍以度田為名聚人田中并度廬屋里落聚人遮道啼呼案范書帝紀十五年詔下州郡檢核墾田頃畆及户口年紀十六年河南尹及諸郡守十餘人坐度田不實皆下獄死又劉隆傳天下墾田多不以寳户口年紀互有増減十五年詔下州郡檢覈其事而刺史太守多不平均或優饒豪右侵刻羸弱百姓嗟怨遮道號呼隆坐徵下獄此所載詔文未完十七年帝以日食案范書帝紀日食在二月乙亥晦日避正殿讀圖讖多御坐廡下淺露中風發疾苦眩甚左右有白大司馬史病苦如此不能動揺自强從公出乘以車行數里病差四月二日車駕宿偃師病差數日入南陽界到葉以車騎省留數日行黎陽兵馬千餘匹遂到章陵起居平愈鳯凰五高八尺九寸毛羽五采集潁川羣鳥從之葢地數頃畱十七日乃去案范書帝紀鳯凰見在冬十月商賈重寶單車露宿牛馬放牧道無拾遺十九年帝下詔曰惟孝宣皇帝有功徳其上尊號曰中宗幸南陽汝南至南頓止令舍大置酒賜吏民復南頓田租一嵗吏民叩頭言皇考居此日乆陛下識知寺舍每來輒加厚恩但復一嵗少薄復十嵗帝曰天下之重寳大器常恐不任日慎一日安敢自遠期十嵗復增一嵗二十年夏六月帝風眩黄癉病發甚以尉衞關内侯隂興為侍中興受詔雲臺廣室甘露降四十五日案日太平御覽作里二十五年烏桓獻貂豹皮詣闕朝賀二十六年春正月詔曰前以用度不足吏禄薄少今益其俸自三公下至佐使各有差四月始營陵地于臨平亭南詔曰無為山陵陂池裁令流水而已迭興之後亦無丘壟使合古法今日月己逝當豫自作臣子奉承不得有加乃令陶人作瓦器又曰臨平望平隂河水洋洋舟船泛泛善矣夫周公孔子猶不得存安得松喬與之而共遊乎文帝曉終始之義景帝所謂孝子也故遭反覆霸陵獨完非成法耶初作壽陵將作大匠竇融上言園陵廣袤無慮所用帝曰古帝王之葬皆陶人瓦器木車茅馬使後世之人不知其處太宗識終始之義景帝能遵孝道遭天下反覆而獨完其福豈不美哉今所制地不過二三頃無為陵池案初作夀陵以下至此見太平御覽與前叚互有異同故並纂入帝常自細書一札十行報郡縣旦聴朝至日晏夜講經聴誦坐則功臣特進在側論時政畢道古行事次說在家所識鄉里能吏次第比類又道忠臣孝子義夫節士坐者莫不激揚悽愴欣然和悦羣臣爭論上前嘗連日皇太子嘗乘間言陛下有禹湯之明而失黄老養性之道今天下大安少省思慮養精神帝答曰我自樂此時城郭丘墟埽地更為帝悔前徙之案范書帝紀建武十五年徙鴈門代郡上谷三郡民置常山居庸以東二十年省五原郡徙其吏人置河東二十五年南單于奉蕃稱臣二十六年遣中郎將段郴授南單于璽綬令入居雲中于是雲中五原朔方北地定襄鴈門上谷代八郡民歸于本土遣謁者分將弛刑補理城郭所謂掃地更為者此也草創茍合未有還人案此亦指雲中等八郡民歸本土者言葢是年雖遣民歸本土而歸者甚少至二十七年趙憙上奏復縁邊諸郡幽并二州由是而定民始徙盡三十年有司奏封禪詔曰災異連仍日月薄食百姓怨嘆而欲有事于太山污七十二代編録以羊皮雜貂裘何强顔耶三十二年羣臣復奏宜封禪遂登太山勒石紀號改元為中元中元元年案中元元年即建武三十二年也攷范書帝紀實以夏四月己卯改元帝幸長安祠長陵還雒陽宫是時醴泉出于京師郡國飲醴泉者痼疾皆愈獨眇蹇者不瘥有赤草生于水涯郡國上甘露降羣臣上言地祗靈應而朱草萌宜命太史撰具郡國所上帝不聴是以史官鮮紀冬十月甲申使司空馮魴告祠高祖廟曰高皇吕太后不冝配食薄太后慈仁孝文皇帝賢明子孫賴福延至于今宜配食地祗高廟今上薄太后尊號為高皇后遷吕太后于園四時上祭是嵗初起明堂靈臺辟雍及北郊兆域宣布圖讖于天下二年春二月戊戍帝崩于南宫前殿在位三十三年時年六十二遺詔曰朕無益百姓如孝文皇帝舊制葬務從省約刺史二千石長皆無離城郭無遣吏及因郵奏太子襲尊號為皇帝羣臣奏諡曰光武皇帝廟曰世祖三月葬原陵帝詔曰明設丹青之信廣開束手之路案此詔見文選李善注范書不載未知何時所下功臣鄧禹等二十八人皆為侯封餘功臣一百八十九人案范書帝紀建武十三年功臣增邑更封凡三百六十五人與此異帝以天下既定思念欲完功臣爵土不令以吏職為過故皆以列侯就第恩遇甚厚遠方貢甘珍必先徧賜列侯而大官無餘有功輒增封邑故皆保全帝封新野主子鄧汎為呉侯案范書鄧晨傳晨娶光武姊元漢兵敗小長安元遇害光武即位追封諡元為新野節義長公主封晨長子汎為呉房侯李賢注云呉房今豫州縣也此作呉侯與范書異伯父皇皇考姊子周均為富波侯案封均事范書不載外祖樊重為壽張侯案范書樊宏傳建武十八年追爵謚重為夀張敬侯重子丹射陽侯案范書樊宏傳丹以建武十三年封孫荗平望侯案范書樊宏傳茂以建武二十七年封尋𤣥郷侯案范書樊宏傳鄩以建武十三年封從子沖更父侯案范建樊宏傳冲作忠亦建武十三年封后父隂睦為宣恩侯案本書隂睦傳睦以建武二年追爵范書隂皇后紀稱建武九年始追爵與此文異子識原鹿侯案范書隂識傳識以建武十五年封就信陽侯案范書隂興傳就嗣父封宣恩侯後改封新陽侯此作信陽與范書異而范書吳良傳又稱就為信陽侯未知孰是皇考女弟子來歙為征羌侯案范書來歙傳歙以建武十一年沒後追封弟由宜西鄉侯案范書來歙傳由以建武十三年封寧平公主子李雄為新市侯案范書李通傳通娶光武女弟伯姬是為寧平公主雄通少子也又范書稱雄封召陵侯而不詳初封之年后父郭昌為陽安侯案范書郭后紀昌以建武二十六年追贈子㳘緜曼侯案范書郭后紀流作況緜曼作緜蠻以建武二年封兄子竟新郪侯匡發干侯案范書郭后紀以竟匡為后從兄弟皆于建武十七年后廢時封姨子馮邯為鍾離侯案封邯事范書不載帝䝉犯霜雪雖發師旁縣人馬席薦羈靽皆有成賈而貴不侵民樂與官市漢以炎精布耀或幽而光帝既有仁聖之明氣勢形體天然之姿固非人之敵翕然龍舉雲興三雨而濟天下蕩蕩人無能名焉案姚子駰所輯是書八卷既多挂漏且劉昭與續漢書志補注李賢後漢書注所引之文互有異同又如光武紀中或稱公或稱王或稱世祖前後差參今畫一更正兼攷虞世南北堂書鈔歐陽詢藝文類聚徐堅初學記諸書所載各條此略彼詳取其詳者詳略相等從其善者依年月編次或年月無攷則彚綴于篇末如序贊之例東觀漢記卷一
