body:
  text: 東觀漢記卷五志案本書八志以劉知幾史通及范書李賢注所引蔡邕集為據今惟地理等六篇略存餘二篇並闕地理志蕭何墓在長陵東司馬門道北百步案長陵屬京兆尹霍光墓在茂陵東司馬門道南四里案茂陵屬右扶風以上司𨽻校尉所屬蛇邱有芳陘山案蛇邱縣屬濟北國東緡縣名屬山陽郡案以上兗州刺史部所屬西海有勝山案西海縣屬瑯琊國以上徐州刺史部所屬秦時改為太末案太末縣屬㑹稽郡此句之上當有闕文攷司馬彪郡國志劉昭注太末左傳謂姑蔑有龍邱山在東有九石特秀色丹逺望如蓮華萇之隠處有一巖穴如牕牖中有石牀可寢處案司馬彪郡國志劉昭注引東陽記一條文引此段又云巖前有一桃樹其實甚甘非山中自有莫知誰植建安二十年復置漢寧郡分漢中之安陽西城案司馬彪郡國志劉昭注西城下曰巴漢志云漢末以為西城郡不言屬漢寧又分錫上庸為上庸郡置都尉案以上益州刺史部所屬安帝即位之年分髙顯候城遼陽屬𤣥蒐案司馬彪郡國志高顯等三縣本屬遼東郡以上幽州刺史部所屬九真俗燒草種田案司馬彪郡國志九真郡統縣五曰西卷朱吾盧容象林比景以上交趾刺史部所屬永興元年鄉三千六百八十一亭萬二千四百四十三律厯志凡律所革以變律吕相生至六十禮志漢承秦滅學庶事草創明堂辟雍闕而未舉武帝封禪始立明堂于泰山案歐陽詢藝文類聚作孝武封岱宗立明堂于泰山汶上猶不于京師元始中王莽輔政乃起明堂辟雍樂志漢樂四品一曰大予樂典郊廟上陵殿諸食舉之樂郊樂易所謂先王以作樂崇徳殷薦上帝周官若樂六變則天神皆降可得而禮也宗廟樂虞書所謂琴瑟以詠祖考來假詩云肅雍和鳴先祖是聽食舉樂王制謂天子食舉以樂周官王大食則命奏鐘鼓二曰周頌雅樂典辟雍饗射六宗社稷之樂辟雍饗射孝經所謂移風易俗莫善于樂禮記曰揖讓而治天下者禮樂之謂也社稷所謂琴瑟擊鼓以御田祖者也禮記曰夫樂施于金石越于聲音用乎宗廟社稷繫乎山川鬼神此之謂也三曰黄門鼓吹天子所以宴樂羣臣詩所謂坎坎鼓我蹲蹲舞我者也其短簫鐃歌軍樂也其傳曰黄帝岐伯所作以建威揚徳風勸士也葢周官所謂王大獻則令凱樂軍大獻則令凱歌也孝章皇帝親著歌詩四章列在食舉又制雲臺十二門詩各以其月祀而奏之熹平四年正月中出雲臺十二門新詩下大予樂官習誦彼聲與舊詩並行者皆當撰録以成樂志國家離亂大厦未安黄門舊有鼓吹今宜罷去郊祀志建武三十年太尉趙憙上言曰自古帝王毎世之隆未嘗不封禪陛下聖徳洋溢順天行誅廢亂中興作民父母修復宗廟救萬姓命黎庶賴福海内清平功成治定羣司禮官咸以為宜登封告成為民報徳百王所同當仁不讓宜登封岱宗正三雍之禮以明靈契望秩羣神以承天心案司馬彪祭祀志載光武詔書云即位三十年百姓怨氣滿腹吾誰欺欺天乎曽謂泰山不如林放何事汙七十二代之編録桓公欲封管仲非之若郡縣逺遣吏上夀盛稱虚美必髠兼令屯田從此羣臣不敢復言三十二年案是年改元中元元年羣臣奏言登封告成為民報徳百王所同陛下輒拒絶不許臣下不敢頌功述徳業謹按河雒讖書赤漢九世當巡封泰山凡三十六事傳奏左帷陛下遂以仲月令辰遵岱嶽之正禮奉圖雒之明文以和靈瑞以為兆民上曰至泰山乃復議國家徳薄災異仍至圖讖葢如此案司馬彪祭祀志三十二年正月上齋夜讀河圖㑹昌符曰赤劉之九㑹命岱宗不慎克用何益于承誠善用之姦偽不萌感此文乃詔松等復案索河雒讖文言九世封禪事者松等列奏乃許焉上東巡狩至泰山有司復奏河雒圖記表章赤漢九世尤著明者前後凡三十六事與博士充等議以為殷統未絶黎庶繼命高宗久勞猶為中興武王因父受命之列據三代郊天案二句疑有脱誤因孔子甚美其功後世謂之聖王漢統中絶王莽盜位一民莫非其臣尺土靡不其有宗廟不祀十有八年陛下無十室之資奮振于匹夫除殘去賊興復祖宗集就天下海内治平夷狄慕義功徳盛于髙宗宣王宜封禪為百姓祈福請親定刻石紀號文太常奏儀制詔曰在昔小白欲封夷吾難之季氏欲旅仲尼非焉葢齊諸侯季氏大夫皆無事于泰山今予末小子巡祭封禪徳薄而任重一則以喜一則以懼喜于得承鴻業帝堯善及子孫之餘賞葢應圖籙當得是懼于過差執徳不𢎞信道不篤為議者所誘進後世知吾罪深矣案范書光武紀中元元年二月己卯幸魯進幸泰山辛邜柴望岱宗登封泰山甲午禪于梁父攷司馬彪祭祀志辛邜二十二日甲午二十五日也封禪其玉牒文秘天子事也案以上封禪明帝宗祀五帝于明堂光武皇帝配之案司馬彪祭祀志永平二年始行此禮以上明堂孝成時匡衡奏立北郊復祠六宗至建武都雒陽制郊祀六宗廢不血食大臣上疏謂宜復舊上從公卿議由是遂祭六宗案司馬彪祭祀志安帝元初六年以尚書歐陽家説謂六宗者在天地四方之中為上下四方之宗三月庚辰初更立六宗祠于雒陽西北戌亥之地祀比大社劉昭注引李氏家書云司空李郃侍祠不見六宗祠奏曰尚書肆類于上帝禋于六宗六宗上不及天下不及地旁不及四方在六合之中助隂陽化成萬物漢初甘泉汾隂祀天地亦禋六宗孝成時匡衡奏復南北郊祀復祀六宗及王莽謂六宗即易六子建武制祀六宗廢不血食宜復舊制詔下公卿議議可者三十六人議不可者二十四人上從郃議以上六宗章帝元和二年詔曰經稱秩元祀咸秩無文祭法功施于民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之以日月星辰民所瞻仰也山林川谷邱陵民所取財用也非此族也不在祀典傳曰聖王先成民而後致力于神又曰山川之神則水旱癘疫之災于是乎禜之日月星辰之神則雪霜風雨之不時于是乎禜之孝文十二年令曰比年五穀不登欲有以増諸神之祀王制曰山川神祇有不舉者為不敬今恐山川百神應典祀者尚未盡秩其議増修羣祀宜享祀者以祈豐年以致嘉福以蕃兆民詩不云乎懷柔百神及河喬嶽有年報功不私幸望豈嫌同辭其義一焉案是時章帝將東巡狩故有是詔以上羣祀永平三年八月丁卯公卿奏議世祖廟登歌八佾舞功名案功字疑衍東平王蒼議以為漢制舊典宗廟各奏其樂不皆相襲以明功徳秦為無道殘賊百姓高皇帝受命誅暴元元各得其所萬國咸熈作武徳之舞孝文皇帝躬行節儉除誹謗去肉刑澤施四海孝景皇帝制昭徳之舞孝武皇帝功徳茂盛威震海外開地置郡傳之無窮孝宣皇帝制盛徳之舞光武皇帝受命中興撥亂反正武暢方外震服百蠻戎狄奉貢宇内治平登封告成脩建三雍肅穆典祀功徳巍巍比隆前代以兵平亂武功盛大歌所以詠徳舞所以象功世祖廟樂名宜曰大武之舞元命包曰縁天地之所雜樂為之文典文王之時民樂其興師征伐而詩人稱其武功樞機鈐曰有帝漢出徳洽作樂各與虞韶禹夏湯濩周武無異不宜以名舞叶圖徵曰大樂必易詩傳曰頌言成也一章成篇宜列徳故登歌清廟一章也漢書曰百官頌所登御者一章十四句依書文始五行武徳昭徳盛徳修之舞節損益前後之宜六十四節為武曲副八佾之數十月烝祭始御用其文始五行之舞如故勿進武徳舞歌詩曰於穆世廟肅雍顯清俊乂翼翼秉文之成越序上帝駿奔來寧建立三雍封禪泰山章明圖讖放唐之文休矣惟徳罔射協同本支百世永保厥功詔書曰驃騎將軍議可進武徳之舞如故案司馬彪祭祀志劉昭注引蔡邕表志云孝明立世祖廟以明再受命祖有功之義後嗣遵儉不復改立皆藏主其中聖明所制一王之法也自執事之吏下至學士莫能知其所以兩廟之意誠宜具録本事建武乙未元和丙寅詔書下宗廟儀及齋令宜入郊祀志永為典式章帝初即位賜東平憲王蒼書曰朕夙夜伏思念先帝躬履九徳對于八政勞謙克己終始之度比放三宗誠有其美今迫遺詔誡不起寢廟臣子悲結僉以為雖于更衣猶宜有所宗之號以克配功徳宗廟至重朕幼無知寤寐憂懼先帝每有著述典義之事未嘗不延問王以定厥中願王悉明處乃敢安之公卿議駁今皆并送及有可以持危扶顛宜勿隠思有所承公無困我太尉憙等奏禮祖有功宗有徳孝明皇帝功徳茂盛宜上尊號曰顯宗四時祫食于世祖廟如孝文皇帝在高廟之禮奏武徳文始五行之舞蒼上言昔者孝文廟樂曰昭徳之舞孝武廟樂曰盛徳之舞今皆祫食于高廟昭徳盛徳之舞不進與高廟同樂今孝明皇帝主在世祖廟當同樂盛徳之樂無所施如自立廟當作舞樂者不當與世祖廟盛徳之舞同名案前文東平王蒼請名世祖廟舞為大武詔仍進武徳之舞無盛徳舞之名此句疑有訛舛即不改作舞樂當進武徳之舞臣愚戇鄙陋廟堂之論誠非所當聞所宜言陛下體純徳之妙奮至謙之意猥歸美于載列之臣故不敢隠蔽愚情披露腹心誠知愚鄙之言不可以向仰四門賓于之議伏惟陛下以至徳當成康之隆天下乂安刑措之時也陛下盛歌元首之徳股肱貞良庶事寧康臣欽仰聖化嘉羡盛徳危顛之備非所宜稱上復報曰有司奏上尊號曰顯宗藏主更衣不敢違詔祫食世祖廟樂皆如王議以正月十八日始祠仰見榱桷俯視几筵眇眇小子哀懼戰慄無所奉承愛而勞之所望于王也案范書明帝紀帝遺詔無起寢廟藏主于光烈皇后更衣别室又章帝紀帝即位有司奏言孝明帝聖徳淳茂宜尊廟曰顯宗其四時禘祫于光武之堂間祀悉還更衣其進武徳之舞如孝文皇帝祫祭高廟故事制曰可建初四年八月上以公卿所奏明徳皇后在世祖廟坐位駁議示東平憲王蒼蒼上言文武宣元祫食高廟皆以后配先帝所制典法設張大雅曰昭兹來許繩其祖武又曰不愆不忘率由舊章明徳皇后宜配孝明皇帝案范書章帝紀建初四年六月癸丑皇太后馬氏崩秋七月壬戌葬明徳皇太后此則葬後議祔廟也司馬彪祭祀志劉昭注引謝沈書一段與此同末有與世祖廟同席而供饌句尤為完密永初六年皇太后入宗廟于世祖廟與皇帝交獻薦如光烈皇后故事案此和熹鄧皇后也攷范書安帝紀在永初七年以上宗廟車服志天子行有罼䍐永平二年正月公卿議舉南北郊東平王蒼議曰孔子曰行夏之時乗殷之輅服周之冕為漢制法高皇帝始受命創業制長冠以入宗廟光武受命中興建明堂立辟雍陛下以聖明奉遵以禮服龍袞祭五帝禮缺樂崩久無祭天地冕服之制案尊事神祗潔齋盛服敬之至也日月星辰山龍華藻天王袞冕十有二旒以則天數旂有龍章日月以備其文今祭明堂宗廟圓以法天方以則地服以華文象其物宜以降神明肅雝備思博其類也天地之祀冕冠裳衣宜如明堂之制案司馬彪輿服志漢承秦故郊祀之服皆以袀𤣥至顯宗初服旒冕衣裳文章赤舄絇履以祠天地其議實自東平發之武冠俗謂之大冠案司馬彪輿服志武冠環纓無蕤以青系為緄加雙鶡尾豎左右亦名鶡冠五中郎將羽林左右監虎賁武騎皆冠之貴人相國緑綬三采緑紫白案司馬彪輿服志作緑紫紺純緑圭公卿將軍紫綬二采紫白純紫圭公主封君同九卿中二千石青綬三采青白紅純青圭千石六百石黒綬二采青紺案司馬彪輿服志作三采青赤紺純青圭四百三百二百石黄綬純黄圭一采百石青紺綬一采宛轉繆織孝明帝作蠙珠之佩以郊祀天地案以上皆志冠服其車輿闕朝㑹志天文志案此二篇全闕今存其目東觀漢記卷五
