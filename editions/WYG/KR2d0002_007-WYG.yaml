body:
  text: 東觀漢記卷七列傳二宗室齊武王縯縯字伯升案縯光武兄攷范書本傳及太平御覽各書俱稱伯升當是以字行伯升進圍宛莽素震其名大懼使畫伯升像于埻旦起射之平陵後部攻新野不下宰潘臨登城言曰得司徒劉公一言願先下及伯升軍至即開門降伯升作攻城鬬車上曰地車不可用誰當獨居此上者伯升曰此兵法也上曰兵法但有所圖畫者實不可用伯升遂作之後有司馬犯軍令當斬坐鬭車上更始遂共謀誅伯升案此上有闕文攷范書本傳伯升拔宛光武破王尋王邑自是兄弟威名益盛更始君臣不自安遂共謀誅伯升乃大會諸將以成其計更始取伯升寶劍視之繡衣御史申屠建隨獻玉玦更始竟不能發伯升部將宗人劉稷數䧟陣潰圍勇冠三軍聞更始立怒曰本起兵圖大事者伯升兄弟更始何為者更始聞而心忌之以稷為抗威將軍稷不肯拜更始乃收稷將誅之伯升固争并執伯升即日害之有二子建武二年立長子章為太原王興為魯王十一年徙章為齊王十五年追諡伯升為齊武王章少孤光武感伯升功業不就撫育恩養甚篤以其少貴欲令親吏事故試守平隂令北海靖王興興遷𢎞農太守案興縯子范書本傳興初封魯王建武二十八年徙封北海王縣吏張申有伏罪興收申案論郡中震慄時年旱分遣文學循行屬縣理寃獄宥小過應時甘雨澍降每朝廷有異政京師雨澤秋稼好醜輒驛馬下問興其見親重如此北海敬王睦北海敬王睦案睦興子顯宗之在東宫尤見幸而睦謙恭好士名儒宿徳莫不造門案姚之駰本作時法網尚疏睦好士夙夜滋恭通賔客千里人民土地財賄結歡由是宿徳名儒造門者陸沈永平中法憲頗峻睦乃謝絶賓客放心音樂嵗終遣中大夫奉璧朝賀召而謂曰朝廷設問寡人大夫將何辭以對使者曰大王忠孝慈仁敬賢樂士臣雖螻蟻敢不以實睦曰吁子危我哉是吾幼時狂憃之行也案范書本傳狂憃作進趣大夫其對以孤襲爵以來志意衰惰聲色是娛犬馬是好使者受命而行睦善草書臨病明帝驛馬令作草書尺牘十首焉趙孝王良光武初起兵良搏手大呼曰我欲詣納言嚴將軍叱上起去出閤令人視之還白方坐啗脯良復讙呼上言不可讙露明旦欲去前白良曰欲竟何時詣嚴將軍所良意下曰我為詐汝耳當復何苦乎案良光武叔父范書本傳良字次伯初封廣陽王建武五年徙為趙王裔孫乾嗣位私出國到魏郡鄴易陽止宿亭令奴金盜取亭席金與亭佐孟常争言以刃傷常部吏追逐乾藏逃金絞殺之懸其尸道邊樹相國舉奏詔書削中邱縣宏宏案宏光武族諸父行史無追封之爵故著其名字孺孫先起義兵卒梁梁案梁宏弟字季少病筋攣卒城陽恭王祉城陽恭王初名終後改為祉案祉光武族兄范書本傳祉字巨伯父敞敞曽祖節侯買以長沙定王子封于零道之舂陵為侯敞父仁嗣侯案李善文選注節侯生戴侯戴侯生考侯考侯即仁也以舂陵地勢下濕有山林毒氣難以久處于時見户四百七十六上書求減邑内徙留子男昌守墳墓元帝許之初元四年徙南陽之白水鄉猶以舂陵為國名仁卒敞謙儉好義推父時金寶財産與昆弟荆州刺史上其義行拜廬江都尉嵗餘遭旱行縣人持枯稻自言稻皆枯吏强責租敞應曰太守事也載枯稻至太守所酒數行以語太守太守曰無有敞以枯稻示之太守曰都尉事也敞怒叱太守曰䑕子何敢爾刺史舉奏莽徴到長安免就國敞為嫡子終案終即祉也娶翟宣子女習為妻宣使嫡子姬送女入門二十餘日宣弟義起兵攻莽祉以建武二年三月見光武于懷宫案范書本傳祉建武二年封城陽王東海恭王彊案以下光武諸子東海恭王彊光武皇帝長子也母郭氏建武二年六月立為皇太子十七年十月郭后廢為中山太后自郭后廢彊不自安因左右陳誠願備藩輔十九年六月彊廢為東海王二十八年十月就國王兼食東海魯國二郡二十九縣租入倍諸王賞賜恩寵絶於倫比置虎賁髦頭宫殿設鐘簴之懸擬于乗輿彊性明達恭謹臨之國數上書讓還東海十九縣又因皇太子固辭上不許以彊章宣示公卿大夫甚嘉歎之彊薨明帝發魯相所上檄下牀伏地舉聲盡哀至長樂宫白太后因出幸津門亭發喪追念彊雅性恭儉不欲令厚葬以違其意詔中常侍杜岑東海傅相曰王恭遜好禮以徳自終勅官屬遣送務行約省茅車瓦器以成王志王孫頃王肅性謙儉永初中以西羌未平上錢二千萬元初中上縑萬匹以助國費沛獻王輔沛獻王輔善京氏易永平五年秋京師少雨上御雲臺召尚席取卦具自為卦以周易卦林卜之其繇曰蟻封穴户大雨將集明日大雨上即以詔書問輔曰道豈有是耶輔上書曰案易卦震之蹇蟻封穴户大雨將集蹇艮下坎上艮為山坎為水山出雲為雨蟻穴居而知雨將雲雨蟻封穴故以蟻為興文詔報曰善哉王次序之沛王楚王來朝就國明帝告諸王傅相王之子年五嵗以上皆命帶列侯綬復送綬十九枚為諸子在道欲急帶之也王性好經書論集經傳圖䜟作五經通論奉藩以至没身遵履法度未嘗犯禁稱為賢王案范書本傳輔初封右馮翊公進封中山王建武二十年徙封沛王楚王英楚王英案范書本傳英初封楚公建武十七年進為王永平十四年謀反自殺國除奉送黄縑三十五匹白紈五匹入贖楚相以聞詔書還入贖縑紈以助伊蒲塞桑門之盛饌案范書本傳永平八年詔令天下死罪皆入縑贖故英奉縑紈贖罪濟南安王康濟南安王康案范書本傳康初封濟南公建武十七年進為王多殖財貨大修宫室起内第奴婢至千四百人廐馬千二百匹私田八百頃奢侈恣欲游觀無節東平憲王蒼東平王蒼案范書本傳蒼初封東平公建武十七年進為王少好經書雅有智慧少有孝友之質寛仁𢎞雅明帝即位詔曰東平王蒼寛博有謀可以託六尺之孤臨大節而不可奪其以蒼為驃騎將軍位在三公上是時四方無虞蒼以天下化平宜修禮樂乃與公卿共議定南北郊冠冕車服制度及祖廟登歌八佾舞數蒼以親輔政盡心王室每有議事上未嘗不見從名稱日重蒼開東閤延英雄上書表薦賢士左馮翊桓虞等虚已禮下與參政事上愛重蒼嘗問蒼曰在家何業最樂蒼對曰為善最樂上嗟歎之蒼與諸王朝京師月餘還上臨送歸宫悽然懷思乃遣使手詔諸國曰辭别之後獨坐不樂因就車歸伏軾而吟瞻望永懷實勞我心誦及采菽以増歎息詔問東平王處家何等最樂王對曰為善最樂其言甚大副其要腹蒼體大美鬚眉要帶八尺二寸上以所自作光武皇帝本紀示蒼蒼因上世祖受命中興頌上甚善之以問校書郎此與誰等皆言類揚雄相如前世史岑之比章帝建初三年賜蒼書曰嵗月驚邁山陵浸逺孤心慘愴饗衞士于南宫因過按行閲視皇太后舊時衣物惟王孝友之徳今以光烈皇后假髻帛巾各一衣一篋遺王可時瞻視以慰凱風寒泉之思今魯國孔氏尚有仲尼車輿冠履明徳盛者光靈逺也聞武帝歌天馬沾赤汗今親見其然血從前髆上小孔中出案范書本傳并遺宛馬一匹故賜書及此上下文闕四年蒼上疏願朝上以王觸寒涉道使中謁者賜乗輿貂裘蒼到洛陽使鴻臚持節郊迎引入不在贊拜之位升殿乃拜上親答拜蒼上疏曰事過典故諸王歸國上特留蒼賜以秘書列圖道術秘方至八月飲酎畢大鴻臚奏遣發乃許之手詔賜蒼曰骨肉天性誠不以逺近親疎然數見顔色情重昔時中心戀戀惻然不能言於是車駕祖送流涕而訣復賜乗輿服御珍寶鞍馬錢布以億萬計蒼到國後病水氣喘逆上遣太醫丞相視之小黄門侍疾置驛馬傳起居以千里為程案范書本傳薨于建初八年蒼葬上詔有司加贈鑾輅乗馬龍旂九旒虎賁百人上幸東平祭東平王墓云思其人到其鄉其處在其人亡阜陵質王延阜陵質王延案范書本傳延初封淮陽公進為王永平中徙封阜陵王在國驕泰淫泆廣陵思王荆廣陵王荆案范書本傳荆初封山陽公進為王永平初徙封廣陵王自殺案范書明帝紀及本傳此永平十年事時有司以荆悖逆祝詛請誅故也中山簡王焉焉案范書本傳焉初封左馮翊公進為王建武三十年徙封中山王以郭太后少子獨留京師琅邪孝王京琅邪孝王京案范書本傳京初封琅邪公建武十七年進為王就國都雅好宫室窮極技巧壁帶珠玉案虞世南北堂書鈔作殿館壁帶飾以金銀光烈皇后崩明帝悉以太后所遺金寶賜京彭城靖王恭案以下明帝諸子永平九年恭未有國邑賜號靈壽王案范書本傳恭初封鉅鹿王後累徙江陵六安章帝崩遺詔徙封彭城王恭子男丁前妻物故案范書本傳李賢注無妻字子酺侮慢丁小妻恭怒閉酺馬廏酺亡夜詣彭城縣欲上書恭遣從官蒼頭曉令歸數責之乃自殺元初五年封恭少子丙為都鄉侯國為安鄉侯丁為魯陽鄉侯本初元年封恭孫據卞亭侯光昭陽亭侯固公梁亭侯興蒲亭侯延昌城亭侯祀梁父亭侯堅西安亭侯代林亭侯樂成靖王黨樂成靖王黨案范書本傳黨初賜號重熹王永平十五年封樂成王善史書喜正文字樂成王萇案范書黨傳黨傳國至其孫而絶安帝永寧元年以濟北惠王子萇紹封安帝詔曰樂成王居諒闇衰服在身彈棊為戲不肯謁陵下邳惠王衍和帝賜彭城靖王詔曰皇帝問彭城王始夏無恙葢聞堯舜九族萬國協和書典之所美也下邳王案范書本傳永平十五年封被病沈滯之疾昏亂不明家用不寧姬妾嫡庶諸子分争紛紛至今前太子卬頑凶失道陷于大辟是後諸子更相誣告迄今嫡嗣未知所定朕甚傷之惟王與下邳王恩義至親正此國嗣非王而誰禮重嫡庶之序春秋之義大居正孔子曰惟仁者能好人能惡人貴仁者所好惡得其中也太子國之儲嗣可不慎與王其差次下邳諸子可為太子者上名將及景風拜授印綬焉案范書本傳衍病荒忽而太子卬有罪廢諸姬争欲立子為嗣連上書相告言和帝憐之使彭城靖王恭至下邳為正其嫡庶故有是詔後遂立子成為太子孝徳皇案孝徳皇即章帝子清河孝王慶也初為皇太子為竇皇后所譖而廢和帝即位待慶極渥後慶長子祐入嗣大統是為安帝安帝建光元年追尊為孝徳皇永元四年上移幸北宫章徳殿講白虎觀慶得入省宿止平原懷王勝案勝和帝長子平原王葬案范書本傳勝少有痼疾延平元年封立八年薨葬于京師鄧太后悲傷命史官述其行迹為作傳誄藏于王府東觀漢記卷七
