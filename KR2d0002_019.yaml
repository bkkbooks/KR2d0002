body:
  text: 東觀漢記卷十九列傳十四張酺張酺字孟侯祖父充與光武同門學光武即位求問充充已死永平九年詔為四姓小侯開學置五經師酺以尚書授于南宮令入授皇太子太子家時為奢侈物未嘗不正諫甚見重焉顯宗以酺授皇太子業甚得輔導之體章帝即位出拜東郡太守賜錢三十萬酺下車擢賢俊擊豪強賞賜分明郡中肅然薦郡吏王青三世死節青從此除步兵司馬酺傷青不遂復舉其子孝廉元和二年帝東巡狩幸東郡引酺及門生郡縣掾吏並會庭中帝先備弟子之儀使酺講尚書一篇使尚書令王鮪與酺相難然後修君臣之禮賞賜殊特帝甚欣悅酺罰斷義勇遷魏郡太守百姓垂涕送之滿道和帝初酺上言臣聞王者法天熒惑奏事太微故州牧刺史入奏事所以通下問知外事也數十年以來重其道歸煩擾故時止勿奏事今因以為故事臣愚以為刺史視事滿歲可令奏事如舊典問州中風俗恐好惡過所道事所聞見考課衆職下章所告及所自舉有意者賞異之其尤無狀逆詔書行罪法冀敕戒其餘令各敬慎所職于以衰滅貪邪便佞酺拜太尉詔射聲校尉曹褒案漢舊儀制漢禮酺以為褒制禮非禎祥之特達有似異端之術上疏曰褒不被刑誅無以絶毀實亂道之路酺為太尉父尚在酺每遷轉乃一到雒父來適會正臘公卿罷朝俱賀歲奉酒上酺父壽極歡莫不嘉其榮以日食免韓棱韓棱字伯師潁川人也除為下邳令視事未朞吏人愛慕時鄰縣皆雹傷稼棱縣界獨無雹遷南陽太守下車表行義拔幽滯發摘姦盜郡中震栗權豪懾伏政號嚴平巢堪巢堪字次朗太山南城人為司空十四年自乞上印綬賜千石俸魯恭魯恭字仲康扶風人父建武初為武陵太守卒官時恭年十二弟丕年七歲晝夜號踊不絶聲郡中賻贈無所受及歸服喪禮過成人耽思閉門講誦兄弟雙高太尉趙喜聞恭志行每歲遣人送米肉辭讓不敢當恭憐丕小欲先就其名託病不仕郡數以禮請謝不肯應母強遣之恭不得已而行因留新豐教授建初中丕舉秀才恭乃始為郡吏拜中牟令宿訟許伯等爭陂澤田積年州郡不決恭平理曲直各退自相責讓時郡國螟傷稼犬牙緣界不入中牟河南尹袁安聞之疑其不實使仁恕掾肥親往察之恭隨行阡陌俱坐桑下有雉過止其旁旁有童兒親曰何不捕之兒曰雉方將雛親默然有頃與恭訣曰所以來者欲察君治迹耳今蟲不犯境此一異也化及鳥獸此二異也豎子有仁心此三異也府掾久留但擾賢者因還府具以狀白安帝時伐胸奴恭上疏諫曰竊見竇憲耿秉銜使奉命暴師于外陛下親勞憂在軍役誠欲以安定邊陲為民除害臣思之未見其便數年以來民食不足國無蓄積盛春興發擾動天下妨廢農時以事夷狄非所以垂意于中國憫念民命也恭上疏曰舉無遺策動不失其中魯丕魯丕字叔陵性沈深好學孳孳不倦兼通五經以魯詩尚書教授為當世大儒拜趙相為政尚寬惠禮讓雖有官不廢教授門生就學百餘人關東號曰五經復興魯叔陵徐防徐防上疏曰試論語本文章句但通度勿以射策冀令學者務本有所一心專精師門思核經意事得其實道得其真於此弘廣經術尊重聖業有益于化雖從來久六經衰微學問寖淺誠宜反本改矯其失安帝元年郡國被水災比州湮沒死者以千數災異數降西羌反叛殺略人吏京師淫雨蟊賊傷稼穡防比上書自陳過咎遂策免陳寵陳寵字昭公沛國人曾祖父咸哀平間以明律令為侍御史王莽篡位父子相將歸鄉里閉門不出乃收家中律令文書壁藏之以俟聖主咸常戒子孫曰為人議法當依于輕雖有百金之利慎毋與人重比故世人謂陳氏持法寬寵辟司徒鮑昱府掾屬專尚交遊以不肯親事為高寵常非之獨勤心物務為尚書性純淑周密慎重時有表薦輒自手書削草人莫得知常言人臣之義苦不畏慎自在樞機謝遣門人不復教授絶知友之路章帝時決獄多近于重寵上疏諫曰先王之政賞不僭刑不濫與其不得已寧僭故古賢君相歎息重戒者重刑之至也為廣漢太守先是雒陽城南每陰雨常有鬼哭聲聞于府中寵使案行昔歲倉卒時骸骨不葬者多寵乃敕縣埋葬由是即絶為廷尉有疑獄輒手筆作議所活者甚多陳忠陳忠為尚書令數進忠言辭采鴻麗前後所奏悉上于官閣以為故事疏曰語云迎新千里送舊不出門尹勤尹勤字叔梁南陽人治韓詩事薛漢身牧豕事親至孝無有交遊門生荊棘何熙何熙字子溫身長八尺體貌魁梧與人絶異和帝偉其貌特拜謁者熙能為威容贊拜殿中聲動左右為御史中丞群僚憚之魏霸魏霸字喬卿濟陰人也建初中為郎霸孤兄弟子來候霸以所乘車馬遣送之至成皋郎官有乘皂蓋車者見兄子乘車疑而格殺之霸聞悲淚晝夜泣涕至病為巨鹿太守妻子不到官舍常念兄與嫂在家勤苦而己獨尊樂故常服粗糲不食魚肉之味婦親蠶桑服機杼子躬耕農與兄弟子同苦樂不得有異鄉里慕其行化之性清約質朴為政寬恕正色而已不求備于人掾吏有過輒私責數不改休罷之終不暴揚其惡為將作大匠吏皆懷恩人自竭節作業無譴過之事延平元年仕為光祿大夫霸妻死長兄伯為霸取妻送至官舍霸笑曰年老兒子備具矣何用空養他家老嫗為即自入辭其妻手奉案前跪霸曰夫人視老夫復何中空而遂失計義不敢相屈即拜而出妻慚求去遂送還之應順應順字華仲汝南南頓人少與同郡許敬善敬家貧親老無子為敬去妻更娶為東平相事後母至孝精誠感應梓樹生廳前屋上徙置府庭繁茂長大應奉應奉為武陵太守興學校舉側陋政稱遠邇應劭應劭字仲遠父奉司隸校尉劭少便篤學博覽多聞鄭璩鄭璩字平卿黎陽人建初五年辟司徒府拜侍御史上疏曰臣斗筲之小吏擢在察視之官職任過分當刺邪矯枉詔書示官府曰璩盡節剛正亦何陵遲之有賜璩素六十匹由是顯名轉司隸校尉為漢陽太守以嚴刻見稱樂恢樂恢字伯奇父親為縣吏有罪令欲殺之恢年十一常伏寺東門外凍地晝夜啼泣令乃出親京兆尹張恂召恢署戶曹史竇憲出征胸奴恢上書諫曰春秋之意王者不理夷狄得其地不可墾發得其人無益于政故明王之于夷狄羈縻而已孔子曰遠人不服則修文德以來之以漢之盛不務修舜禹周公之德而無故興干戈動兵革以求無用之物臣誠惑之何敞何修生成為漢膠東相成生果為大中大夫果生比干為丹陽都尉遷廷尉正張湯為廷尉以殘酷見任增飾法律比干常爭之存者千數比干生壽蜀郡太守壽生顯京輔都尉顯生鄢光祿大夫鄢生寵濟南都尉寵生敞為汝南太守百姓化其恩禮高談等百八十五人推財相讓周榮周榮為尚書令在納言管機密盡心奉職夙夜不怠梁諷梁諷北地弋居人征胸奴屯軍于邊以大漢威靈招之胸奴畏感奔馳來降諷輒為信幡遣還營前後萬餘人相屬于道李恂李恂遭父母喪六年躬自負土樹柏常在冢下為兗州刺史所種小麥故蒜悉付從事一無所留清約率下常席羊皮布被食不二味為張掖太守有威重名時大將軍將兵屯武威天下州郡遠近莫不修禮遺恂奉公不阿為憲所奏免復徵為西域副校尉西域殷富多珍寶諸國侍子及督使賈胡數遺恂奴婢宛馬金銀香罽之屬一無所受遷武威太守後坐事免無田宅財産居山澤結草為廬餉遺無所受處新安關下拾橡實為食王渙王渙除河內溫令商賈露宿人開門臥人為作謠曰王稚子代未有平徭役百姓喜為雒陽令盜賊發不得遠走或藏溝渠或伏甕下渙以方略取之皆稱神明馬市正數從賣羹飯家乞貸不得輒毆罵之至忿煞正捕得渙聞知事實便諷吏解遣黃香黃香字文彊江夏安陸人也父況舉孝廉為郡五官掾貧無奴僕香躬執勤苦盡心供養冬無被袴而親極滋味暑即扇床枕寒即以身溫席年九歲失母慕思憔悴殆不免喪鄉人稱其至孝年十二博覽傳記家業虛貧衣食不贍舅龍鄉侯為作衣被不受帝賜香淮南孟子各一通詔令詣東觀讀所未嘗見書謂諸王曰此日下無雙江夏黃童也詔詣安福殿賜錢三萬黃白絺各一端香知古今記群書無不涉獵兼明圖讖天官星氣鍾律曆算窮極道術京師號曰天下無雙江夏黃童國士瞻重京師貴戚慕其聲名更饋衣物拜尚書郎嘗獨止宿臺上晝夜不離省闥上聞善之以香父尚在賜臥几靈壽杖香拜左丞功滿當遷詔書留增秩拜尚書遷僕射香上疏曰以錐刀小用蒙見宿留為尚書曉習邊事每行軍調度動得事理上知其勤數加賞賜香勤力憂公畏慎周密每用奏議所建畫未嘗流布然事執平法常持輕類全活非一為魏郡太守俗每太守將交代添設儲峙輒數千萬香未入界移敕悉出所設什器及到頗有即徹去到官之日不祭竈求福閉門絶客黃瓊黃瓊字世英以德行高妙公車徵拜議郎黃琬黃琬字子琰少失父曾祖香祖瓊並有高名張霸張霸字伯饒蜀郡成都人年數歲有所噉必先讓父母鄉里號曰張曾子九歲通春秋復欲進業父母語汝小何能多少以樊鯈刪嚴氏公羊春秋猶多繁辭乃減為二十萬言更名張氏之學周紆周紆字文通為勃海太守詔書到門不出先遣吏到屬縣盡決罪行刑坐徵詣廷尉繫獄數日免歸家貧無以自贍身築墼以自給食章帝知憐之復以為郎李充李充兄弟六人出入更衣家貧親老充妻勸異居充使釀酒會親戚充啓其母曰此婦勸異居不可奉祭祀請去之遂叱去其婦魯平為陳留太守請充署功曹充不受平怒乃援充以捐溝中因謫署都亭長司馬均司馬均字少賓東萊人隱居教授誠信行乎州里鄉人有爭曲直者輒言敢祝少賓乎心不直者終不敢祝也汝郁汝郁字叔異陳國人年五歲母被病不能飲食郁常抱持啼泣亦不飲食母憐之強為餐飯欺言已愈郁視母色未平輒不食宗親共異之郁再徵載病詣公車尚書敕郁自力受拜郁乘輂白衣詣止車門臺遣兩當關扶郁入拜郎中張表張表字公儀奉之子也遭父喪疾病曠年目無所見耳無所聞服闋醫藥救療歷歲乃瘳每彈琴惻愴不能成聲見酒食未嘗不泣宗人親厚節會飲食宴為表不設樂郭玉郭玉者廣漢人也學方診之伎和帝奇異之乃試令嬖臣美手腕者與女子雜處帷中使玉各診一手玉言左陽脈右陰脈有男女疾若異人臣疑其故帝歎稱善鄭衆鄭衆字季産為人謹敏有心永平中初給事太子家肅宗即位拜小黃門遷中常侍和帝初竇太后秉政兄大將軍憲等並竊威權朝臣上下莫不附之而衆獨一心王室不事豪黨帝親信焉及憲兄弟圖作不軌衆遂首謀誅之以功遷大長秋
