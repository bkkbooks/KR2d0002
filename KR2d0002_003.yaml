body:
  text: 東觀漢記卷三帝紀三恭宗孝安皇帝孝安皇帝諱祜清河孝王第二子也少聰明敏達慈仁惠和寬裕博愛好樂施豫自在邸第數有神光赤蛇嘉應照曜于室內又有赤蛇盤紆殿屋床笫之間孝王常異之年十歲善史書喜經籍和帝甚喜重焉號曰諸生數燕見在禁中特加賞賜下及玩弄之物諸王子莫得與比殤帝即位鄧后臨朝以帝幼小詔留于清河邸欲為儲副殤帝崩以王青蓋車迎齊于殿中拜為長安侯乃即帝位謙讓恪勤孜孜經學篤志供養委政長樂宮永初元年徼外羌龍橋等六種慕義降附永昌獻象牙熊子新城山泉水大出突壞人田水深三丈冬十一月帝始講尚書耽于典藝二年春正月帝加元服夏六月雨雹大如芋魁雞子風拔樹發屋秋閏七月徼外羌薄申等八種舉衆降三年鴈門烏桓及鮮卑叛五原郡兵敗于高梁谷四年新野君薨贈以玄玉赤紱賻錢三千萬布三萬匹五年漢陽人杜琦反自稱安漢將軍漢陽故吏杜習手刺殺之六年春正月甲寅皇太后率大臣命婦謁宗廟七年郡國蝗飛過調濱水縣彭城廣陽廬江九江穀九十萬斛送敖倉元初元年日南地坼長一百八十二里廣五十六里二年春正月青衣蠻夷堂律等歸義冬十月安定太守杜恢與司馬鈞并威擊羌恢乘勝深入至北地靈州丁奚城為羌所害鈞擁兵不救收下獄蠻田山高少等攻城殺長吏州郡募五里蠻夷六亭兵追擊山等皆降十二月賜五里六亭渠率金帛各有差四年春二月武庫火燒兵物百二十五種直千萬以上冬十二月虔人種羌大豪恬狼等詣度遼將軍降延光二年九真言嘉禾生禾百五十六本七百六十八穗三年鳳凰集濟南臺丞霍穆舍樹上賜帛各有差衛縣木連理定陵縣木連理潁川上言麒麟白鹿見黃龍見歷城又見諸縣四年春三月幸宛還帝崩于葉帝在位十九年時年三十二御車所止飲食百官鼓漏起居車騎鹵簿如故及還宮皇后與兄顯中常侍江京樊豐等共興為詐不容令群臣知帝道崩欲僞道得病遣司徒等分詣郊廟社稷告天請命誣罔靈祇以亡為存其夕發喪群僚百姓如喪考妣塞外蠻夷致祭涕泣葬恭陵敬宗孝順皇帝孝順皇帝諱保孝安皇帝長子也母早薨追諡恭愍皇后帝幼有簡厚之質體有敦愨之性寬仁溫惠始入小學誦孝經章句和熹皇后甚嘉之以為宜奉大統年六歲永寧元年為皇太子受業尚書兼資敏達初乳母王男廚監邴吉為大長秋江京中常侍樊豐等所譖訴殺之太子數為歎息京等懼有後害遂共搆陷太子太子坐廢為濟陰王明年三月安帝崩北鄉侯即尊位王廢黜不得上殿臨棺而悲哀泣血不下餐粥北鄉侯薨車騎將軍閻顯等議前不用濟陰王今用怨人白閻太后復徵立諸王子閉宮門屯兵自守中黃門孫程等十九人共討賊臣江京等以迎濟陰王于德陽殿西鍾下即皇帝位司空劉授以阿附惡逆辟召非其人策免永建元年太傅馮石太尉劉熹以阿黨權貴李郃以人多疾疫免三年太傅桓焉以無清介辟召策罷四年漢陽率善都尉蒲密因桂陽太守文礱獻大明珠詔曰海內頗有災異而礱不惟竭忠而遠獻明珠以求媚令封珠還蒲密太尉劉光司空張皓以陰陽不和久託病策罷司徒許敬為陵轢使者策罷以千石祿終身六年葉調國王遣使師會詣闕貢獻以師會為漢歸義葉調邑君賜其君紫綬及撣國王雍由亦賜金印紫綬陽嘉元年望都蒲陰狼殺子女九十七人為不祠北嶽所致詔曰政失厥中狼災為應至乃踐食孤幼博訪其故山嶽尊靈國所望秩而比不奉祠淫刑放濫害加孕婦也二年汝南童子謝廉河南童子趙建年十三各通一經以太學初繕召而至皆除郎中疏勒國王盤遣使文時詣闕獻師子封牛四年太尉施延以選舉貪汙策罷零陵言日食京師不覺詔曰朕以不德謫見于天永和六年冬十二月詔故將軍馬賢前伐西夷克敵深入父子三人同命其以漢中南鄭之武陽亭封賢孫承先為武陽亭侯食租稅漢安元年以遠近獻馬衆多園廄充滿始置承華廄令秩六百石其九十家不自存詔賜錢廩穀秋八月遣侍中杜喬光祿大夫周舉等八人分行州郡頒宣風化舉實臧否二年詔禁民無得酤賣酒麴建康元年秋八月帝崩于玉堂前殿在位十九年時年三十遺詔無起寢廟衣以故服珠玉玩好皆不得下務為節約葬憲陵廟曰敬宗有司奏言孝順皇帝宏秉聖哲龍興統業稽乾則古欽奉鴻烈寬裕晏晏宣恩以極躬自菲薄以崇玄默遺詔貽約顧念萬國衣無製新玩好不飾塋陵損狹不起寢廟遵履前制敬敕慎終有始有卒孝經曰愛敬盡于事親而德教加于百姓詩云敬慎威儀惟民之則臣請上尊號曰敬宗廟天子世世獻奉藏主祫祭進武德之舞如祖宗故事露布奏可孝沖皇帝孝沖皇帝諱炳順帝之少子也年三歲是時皇太子數不幸國副未定有司上言宜建聖嗣建康元年夏四月立為太子順帝崩太子即帝位尊皇后梁氏為皇太后帝幼弱太后臨朝永嘉元年春正月帝崩于玉堂前殿在位一年葬懷陵孝質皇帝孝質皇帝諱纘章帝玄孫千乘貞王之曾孫樂安王孫渤海王子也年八歲茂質純淑好學尊師有聞于郡國孝沖帝崩徵封建平侯即皇帝位九江賊馬勉敗死傳勉頭及所帶玉印鹿皮冠黃衣詣雒陽詔懸夏城門外章示百姓本初元年夏閏六月帝崩于玉堂前殿在位一年時方九歲葬靜陵威宗孝桓皇帝孝桓皇帝諱志章帝曾孫河間孝王孫蠡吾侯翼之長子也母曰匽夫人年十四襲爵始入有殊于人梁太后欲以女弟妃之本初元年四月徵詣雒陽既至未及成禮會質帝崩無嗣太后密使瞻察威儀才明任奉宗廟遂與兄冀定策于禁中迎帝即位時年十五太后猶臨朝御卻非殿改元建和建和元年芝草生中黃藏府永興二年光祿勳府吏舍夜壁下忽有氣掘之得玉玦各有鉤長七寸三分玦周五寸四分身中皆有雕鏤詔司隸蝗水為災五穀不登令所傷郡國皆種蕪菁以助民食延熹元年初置鴻德苑二年大將軍梁冀輔政縱橫為亂帝與中常侍單超等五人共謀誅之于是封超等為五侯五侯暴恣日甚毒流天下司徒韓縯司空孫朗並坐不衛宮止長壽亭減罪一等以爵贖之初置祕書監掌典圖書古今文字考合異同三年白馬令李雲坐直諫誅四年京師雨雹大如雞子五年長沙賊攻沒蒼梧取銅虎符太守甘定刺史侯輔各奔出城賊乘刺史車屯據臨湘居太守舍賊萬人以上屯益陽殺長吏以京師水旱疫病帑藏空虛虎賁羽林不任事者住寺減半奉七年冬十月上幸雲夢至新野公主壽張敬侯廟詔曰存善繼絶實藉德貞武騎都尉樊演高祖父重以光武皇帝元舅扶助中興追封壽張侯諡曰敬祖父茂封冠軍平望鄉侯五國並建其二絶者祠之八年妖賊蓋登稱大皇帝有璧二十圭五鐵劵十一後伏誅九年戴異鉏田得金印到廣陵以與龍尚名臣少府李膺等並為閹人所譖誣為黨人下獄死永康元年西河言白兔見帝好音樂善琴笙立黃老祠北宮濯龍中以文罽為壇飾淳金銀器彩色眩耀祠用三牲大官飾珍饌作倡樂以求福祥也在位二十一年崩年三十六孝靈皇帝建寧元年帝到夏門外萬壽亭群臣謁見二年故太僕杜密故長樂少府李膺各為鉤黨尚書曰下本州考治時上年十三問諸常侍曰何鉤黨諸常侍對曰鉤黨人即黨人也即可其奏熹平元年會稽許昭聚衆自稱大將軍立父生為越王攻破郡縣二年陳行相師遷奏沛相魏愔前為陳相與陳王寵交通四年使中郎將堂溪典請雨因上言復崇高山為嵩高山光和元年有白衣人入德陽殿門言梁伯夏教我上殿與中黃門桓賢語因忽不見有黑氣墮所御溫明殿庭中如車蓋隆起奮迅五色有頭體長十餘丈形貌似龍四年初置騄驥廄丞領受郡國調馬五年帝起四百尺觀于阿亭道中平二年造萬金堂于西園三年又造南宮玉堂築廣成苑鑄黃鐘二千斛懸于嘉德端門內
